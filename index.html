<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --noir: #0d0d0d;
            --charcoal: #1a1a1a;
            --slate: #2d2d2d;
            --ash: #4a4a4a;
            --ghost: #e8e8e8;
            --paper: #f5f5f5;
            --lime: #d4ff00;
            --cyan: #00fff5;
            --coral: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--noir);
            color: var(--ghost);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(212, 255, 0, 0.02) 2px,
                    rgba(212, 255, 0, 0.02) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        #root {
            position: relative;
            z-index: 2;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .masthead {
            margin-bottom: 4rem;
            text-align: center;
            position: relative;
        }

        .masthead::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--lime);
            box-shadow: 0 0 20px var(--lime);
        }

        .date-header {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--lime), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .tagline {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--ash);
            text-transform: uppercase;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
            border-radius: 2px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--lime);
            color: var(--lime);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--lime);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            color: var(--noir);
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            border-color: var(--ash);
            color: var(--ash);
        }

        .btn-secondary:hover {
            color: var(--noir);
        }

        .section {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--lime);
            padding: 2rem;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate);
        }

        .section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--lime);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--slate);
            color: var(--ash);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .icon-btn:hover {
            border-color: var(--lime);
            color: var(--lime);
            background: rgba(212, 255, 0, 0.05);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--lime);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .task:hover::before {
            transform: scaleY(1);
        }

        .task:hover {
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
        }

        .task.completed {
            opacity: 0.5;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: var(--ash);
        }

        .checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--ash);
            background: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: var(--lime);
        }

        .checkbox:checked {
            background: var(--lime);
            border-color: var(--lime);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--noir);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            color: var(--ghost);
            font-size: 0.9375rem;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .badge-daily {
            color: var(--lime);
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.1);
        }

        .badge-onetime {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0, 255, 245, 0.1);
        }

        .add-task-form {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .task-input::placeholder {
            color: var(--ash);
        }

        .type-toggle {
            display: flex;
            background: var(--slate);
            border: 1px solid var(--ash);
        }

        .type-option {
            padding: 0.875rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 1px solid var(--ash);
        }

        .type-option:last-child {
            border-right: none;
        }

        .type-option.active {
            background: var(--lime);
            color: var(--noir);
        }

        .type-option:not(.active):hover {
            background: rgba(212, 255, 0, 0.1);
            color: var(--lime);
        }

        .story-field {
            margin-bottom: 1.5rem;
        }

        .story-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .story-textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.2s;
        }

        .story-textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .auth-screen {
            max-width: 450px;
            margin: 6rem auto;
            padding: 3rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
        }

        .auth-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--lime);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ash);
        }

        .input-field {
            width: 100%;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--lime);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .message {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-left: 4px solid;
        }

        .message-error {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--coral);
            color: var(--coral);
        }

        .message-success {
            background: rgba(212, 255, 0, 0.1);
            border-color: var(--lime);
            color: var(--lime);
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 1.25rem;
            color: var(--ash);
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(212, 255, 0, 0.4)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 255, 245, 0.6)); }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 2rem 1rem;
            }

            .date-header {
                font-size: 2rem;
            }

            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .task {
                flex-wrap: wrap;
            }

            .task-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ⚠️ REPLACE THESE WITH YOUR NEW SUPABASE CREDENTIALS
        
        const SUPABASE_URL = 'https://dgxtslpwsayucznkrqih.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRneHRzbHB3c2F5dWN6bmtycWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzYxMTcsImV4cCI6MjA5MTA1MjExN30.sLiEngc7B5es_jMh_u8eaJNirUScg3cGqhO9_Ku8x-I';
        
        // DEBUG: Check for dummy values
        const hasDummyUrl = SUPABASE_URL.includes('YOUR-PROJECT-ID');
        const hasDummyKey = SUPABASE_ANON_KEY.includes('YOUR-ANON-KEY');
        
        console.log('🚀 App initializing...');
        console.log('Supabase URL valid?', !hasDummyUrl);
        console.log('Supabase Key valid?', !hasDummyKey);
        console.log('window.supabase exists?', !!window.supabase);

        let supabase;
        let initError = null;

        try {
            // FIX: Add fetch polyfill for Worker compatibility
            const originalFetch = window.fetch;
            
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    autoRefreshToken: true,
                    persistSession: true,
                    detectSessionInUrl: true,
                },
                // CRITICAL FIX: Disable Web Crypto for Worker compatibility
                global: {
                    headers: {},
                }
            });
            
            console.log('✅ Supabase client created with Worker-safe config');
        } catch (err) {
            initError = err.message;
            console.error('❌ Failed to create Supabase client:', err);
        }

        // Get current date in EST timezone
        function getCurrentDate() {
            const now = new Date();
            const estDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            return estDate.toISOString().split('T')[0];
        }

        // Cache Helper: Minimize Egress
        const cache = {
            get: (uid) => {
                const data = localStorage.getItem(`todo_cache_${uid}`);
                if (!data) return null;
                const parsed = JSON.parse(data);
                return parsed.date === getCurrentDate() ? parsed.payload : null;
            },
            set: (uid, payload) => localStorage.setItem(`todo_cache_${uid}`, JSON.stringify({ date: getCurrentDate(), payload })),
            clear: (uid) => localStorage.removeItem(`todo_cache_${uid}`)
        };

        function App() {
            // If credentials are missing, show error
            if (hasDummyUrl || hasDummyKey || initError) {
                return (
                    <div className="app-container">
                        <header className="masthead">
                            <h1 className="date-header">⚠️ Setup Required</h1>
                            <p className="tagline">Configuration Missing</p>
                        </header>
                        <div className="section" style={{borderLeftColor: 'var(--coral)'}}>
                            <h2 style={{color: 'var(--coral)', marginBottom: '1rem'}}>Configuration Error</h2>
                            {hasDummyUrl && (
                                <p style={{marginBottom: '0.5rem'}}>❌ <strong>SUPABASE_URL</strong> not updated. Replace "YOUR-PROJECT-ID" with your actual project ID.</p>
                            )}
                            {hasDummyKey && (
                                <p style={{marginBottom: '0.5rem'}}>❌ <strong>SUPABASE_ANON_KEY</strong> not updated. Replace "YOUR-ANON-KEY-HERE" with your actual anon key.</p>
                            )}
                            {initError && (
                                <p style={{marginBottom: '0.5rem'}}>❌ <strong>Initialization Error:</strong> {initError}</p>
                            )}
                            <p style={{marginTop: '1rem', fontSize: '0.9rem', color: 'var(--ash)'}}>
                                1. Open this HTML file in a text editor<br/>
                                2. Find SUPABASE_URL and SUPABASE_ANON_KEY<br/>
                                3. Replace with values from Supabase Dashboard → Settings → API<br/>
                                4. Save and refresh
                            </p>
                        </div>
                    </div>
                );
            }

            return <MainApp />;
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [sections, setSections] = useState([]);
            const [archive, setArchive] = useState(null);
            const [showArchive, setShowArchive] = useState(false);

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    if (event === 'SIGNED_OUT') cache.clear(user?.id);
                    if (session?.user) loadSections();
                });

                return () => {
                    authListener?.subscription?.unsubscribe();
                };
            }, []);

            async function checkUser() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user || null);
                    if (session?.user) {
                        const cached = cache.get(session.user.id);
                        if (cached) setSections(cached);
                        await handleNewDay(getCurrentDate());
                        await loadSections();
                    }
                } catch (err) {
                    setError('Failed to check user: ' + err.message);
                    console.error('Error checking user:', err);
                } finally {
                    setLoading(false);
                }
            }

            async function handleNewDay(date) {
                try {
                    const { data: { user: currentUser } } = await supabase.auth.getUser();
                    if (!currentUser) return;

                    // Egress Optimization: Check if already initialized today locally
                    if (localStorage.getItem(`last_init_${currentUser.id}`) === date) return;

                    const { data: existingTasks, error: checkError } = await supabase
                        .from('tasks')
                        .select('id', { count: 'exact' })
                        .eq('user_id', currentUser.id)
                        .eq('date', date)
                        .limit(1);

                    if (checkError) {
                        console.error('Error checking existing tasks:', checkError);
                        return;
                    }

                    if (existingTasks && existingTasks.length > 0) {
                        console.log('Tasks already exist for', date);
                        return;
                    }

                    const { data: templateTasks, error: templateError } = await supabase
                        .from('task_templates')
                        .select('id,section_id,text,parent_task_id')
                        .eq('user_id', currentUser.id);

                    if (templateError) {
                        console.error('Error fetching templates:', templateError);
                        return;
                    }

                    if (!templateTasks || templateTasks.length === 0) {
                        console.log('No templates found');
                        return;
                    }

                    const tasksToCreate = templateTasks.map(template => ({
                        section_id: template.section_id,
                        user_id: currentUser.id,
                        text: template.text,
                        completed: false,
                        date: date,
                        template_id: template.id,
                        parent_task_id: template.parent_task_id
                    }));

                    const { error: insertError } = await supabase
                        .from('tasks')
                        .insert(tasksToCreate);

                    if (insertError) {
                        if (insertError.code === '23505') {
                            console.log('Tasks already created by another process');
                        } else {
                            console.error('Error creating tasks:', insertError);
                        }
                    }

                    localStorage.setItem(`last_init_${currentUser.id}`, date);
                } catch (err) {
                    console.error('Unexpected error in handleNewDay:', err);
                }
            }

            async function loadSections() {
                try {
                    const today = getCurrentDate();
                    const { data: { user: currentUser } } = await supabase.auth.getUser();

                    const { data: sectionsData, error: sectionsError } = await supabase
                        .from('sections')
                        .select('id,user_id,name,order_index')
                        .eq('user_id', currentUser.id)
                        .order('order_index', { ascending: true });

                    if (sectionsError) {
                        setError(sectionsError.message);
                        return;
                    }

                    const { data: tasksData } = await supabase
                        .from('tasks')
                        .select('id,section_id,user_id,text,completed,date,template_id,parent_task_id')
                        .eq('user_id', currentUser.id)
                        .eq('date', today)
                        .order('created_at', { ascending: true });

                    const sectionsWithTasks = sectionsData.map(section => ({
                        ...section,
                        tasks: tasksData?.filter(t => t.section_id === section.id) || []
                    }));

                    setSections(sectionsWithTasks);
                    cache.set(currentUser.id, sectionsWithTasks);
                    
                } catch (err) {
                    setError('Failed to load sections: ' + err.message);
                    console.error('Error loading sections:', err);
                }
            }

            async function loadArchive() {
                if (archive) { setShowArchive(!showArchive); return; }
                try {
                    const today = new Date();
                    const sevenDaysAgo = new Date(today);
                    sevenDaysAgo.setDate(today.getDate() - 7);
                    
                    const { data, error } = await supabase
                        .from('tasks')
                        .select('text, completed, date')
                        .lt('date', getCurrentDate())
                        .gte('date', sevenDaysAgo.toISOString().split('T')[0])
                        .order('date', { ascending: false });

                    if (error) throw error;
                    setArchive(data);
                    setShowArchive(true);
                } catch (err) {
                    setError('Failed to load archive: ' + err.message);
                }
            }

            if (loading) {
                return (
                    <div className="app-container">
                        <div className="loading">⏳ Loading System...</div>
                    </div>
                );
            }

            if (!user) {
                return <AuthScreen setError={setError} />;
            }

            return (
                <TaskApp 
                    user={user} 
                    sections={sections} 
                    setSections={setSections} 
                    setError={setError} 
                    loadSections={loadSections}
                    loadArchive={loadArchive}
                    archive={archive}
                    showArchive={showArchive}
                />
            );
        }

        function AuthScreen({ setError }) {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setLocalError] = useState(null);
            const [loading, setLoading] = useState(false);

            async function handleAuth(e) {
                e.preventDefault();
                setLocalError(null);
                setLoading(true);

                try {
                    if (isLogin) {
                        const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });
                        if (signInError) throw signInError;
                    } else {
                        const { error: signUpError } = await supabase.auth.signUp({ email, password });
                        if (signUpError) throw signUpError;
                        alert('✅ Check your email to confirm your account!');
                    }
                } catch (error) {
                    setLocalError(error.message);
                    setError(error.message);
                    console.error('Auth error:', error);
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div className="app-container">
                    <div className="auth-screen">
                        <h1 className="auth-title">{isLogin ? 'Login' : 'Sign Up'}</h1>
                        {error && <div className="message message-error">❌ {error}</div>}
                        <form onSubmit={handleAuth}>
                            <div className="input-group">
                                <label className="input-label">Email</label>
                                <input
                                    type="email"
                                    className="input-field"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    required
                                    disabled={loading}
                                />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Password</label>
                                <input
                                    type="password"
                                    className="input-field"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                    disabled={loading}
                                />
                            </div>
                            <button type="submit" className="btn" style={{width: '100%', marginBottom: '0.75rem'}} disabled={loading}>
                                {loading ? '⏳ ' : ''}{isLogin ? 'Login' : 'Sign Up'}
                            </button>
                            <button
                                type="button"
                                className="btn btn-secondary"
                                style={{width: '100%'}}
                                onClick={() => setIsLogin(!isLogin)}
                                disabled={loading}
                            >
                                {isLogin ? 'Need an account?' : 'Have an account?'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function TaskApp({ user, sections, setSections, setError, loadSections, loadArchive, archive, showArchive }) {
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');

            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'America/New_York'
            });

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                try {
                    const { data, error } = await supabase
                        .from('sections')
                        .insert([{
                            user_id: user.id,
                            name: newSectionName,
                            order_index: sections.length
                        }])
                        .select();

                    if (error) throw error;

                    setSections([...sections, { ...data[0], tasks: [] }]);
                    setNewSectionName('');
                    setShowNewSection(false);
                } catch (err) {
                    setError('Failed to create section: ' + err.message);
                    console.error('Error adding section:', err);
                }
            }

            async function deleteSection(sectionId) {
                if (!confirm('Delete this section and all its tasks?')) return;

                try {
                    const { error } = await supabase
                        .from('sections')
                        .delete()
                        .eq('id', sectionId);

                    if (error) throw error;

                    setSections(sections.filter(s => s.id !== sectionId));
                } catch (err) {
                    setError('Failed to delete section: ' + err.message);
                }
            }

            return (
                <div className="app-container">
                    <header className="masthead">
                        <h1 className="date-header">{today}</h1>
                        <p className="tagline">Task Protocol</p>
                    </header>

                    <div className="control-panel">
                        <div className="control-group">
                            <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                                + New Section
                            </button>
                            <button 
                                className="btn btn-secondary"
                                onClick={loadSections}
                                title="Refresh data"
                            >
                                🔄 Refresh
                            </button>
                            <button 
                                className="btn btn-secondary"
                                onClick={loadArchive}
                            >
                                {showArchive ? 'Hide Archive' : '📜 History'}
                            </button>
                        </div>
                        <button className="btn btn-secondary" onClick={() => supabase.auth.signOut()}>
                            Sign Out
                        </button>
                    </div>

                    {showNewSection && (
                        <div className="section" style={{marginBottom: '2.5rem'}}>
                            <form onSubmit={addSection}>
                                <div className="input-group">
                                    <label className="input-label">Section Name</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={newSectionName}
                                        onChange={(e) => setNewSectionName(e.target.value)}
                                        placeholder="e.g., Work, Personal, Health"
                                        autoFocus
                                    />
                                </div>
                                <div style={{display: 'flex', gap: '0.75rem', marginTop: '1rem'}}>
                                    <button type="submit" className="btn">Create</button>
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary"
                                        onClick={() => setShowNewSection(false)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {showArchive && archive && (
                        <div className="section" style={{borderLeftColor: 'var(--gold)'}}>
                            <h2 className="section-title" style={{color: 'var(--gold)', marginBottom: '1rem'}}>Past 7 Days</h2>
                            <ul className="task-list">
                                {archive.map((t, i) => (
                                    <li key={i} className="task" style={{opacity: 0.7}}>
                                        <span style={{fontSize: '0.7rem', color: 'var(--ash)', marginRight: '1rem'}}>{t.date}</span>
                                        <span className="task-text" style={{textDecoration: t.completed ? 'line-through' : 'none'}}>{t.text}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}

                    {sections.length === 0 ? (
                        <div className="section">
                            <p style={{color: 'var(--ash)'}}>
                                👋 Welcome! Click "+ New Section" to get started. Your data is secure and private.
                            </p>
                        </div>
                    ) : (
                        sections.map((section, index) => (
                            <div 
                                key={section.id} 
                                className="section"
                                style={{animationDelay: `${index * 0.1}s`}}
                            >
                                <SectionComponent
                                    user={user}
                                    section={section}
                                    setSections={setSections}
                                    sections={sections}
                                    deleteSection={deleteSection}
                                    setError={setError}
                                />
                            </div>
                        ))
                    )}
                </div>
            );
        }

        function SectionComponent({ user, section, setSections, sections, deleteSection, setError }) {
            const [tasks, setTasks] = useState(section.tasks || []);
            const [newTaskText, setNewTaskText] = useState('');
            const [taskType, setTaskType] = useState('daily');

            useEffect(() => {
                setTasks(section.tasks || []);
            }, [section.tasks]);

            const today = getCurrentDate();

            async function addTask(e) {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                try {
                    if (taskType === 'daily') {
                        // Create template
                        const { data: templateData, error: templateError } = await supabase
                            .from('task_templates')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                parent_task_id: null
                            }])
                            .select('id');

                        if (templateError) throw templateError;

                        // Create today's instance
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: templateData[0].id,
                                parent_task_id: null
                            }])
                            .select();

                        if (error) throw error;
                        
                        setTasks([...tasks, data[0]]);
                    } else {
                        // One-time task
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: null,
                                parent_task_id: null
                            }])
                            .select();

                        if (error) throw error;
                        
                        setTasks([...tasks, data[0]]);
                    }

                    setNewTaskText('');
                } catch (err) {
                    setError('Failed to add task: ' + err.message);
                    console.error('Error adding task:', err);
                }
            }

            async function toggleTask(taskId, completed) {
                try {
                    const { error } = await supabase
                        .from('tasks')
                        .update({ completed })
                        .eq('id', taskId);

                    if (error) throw error;
                    
                    setTasks(tasks.map(t => t.id === taskId ? { ...t, completed } : t));
                } catch (err) {
                    setError('Failed to update task: ' + err.message);
                }
            }

            async function deleteTask(taskId) {
                const task = tasks.find(t => t.id === taskId);
                
                try {
                    const { error } = await supabase
                        .from('tasks')
                        .delete()
                        .or(`id.eq.${taskId},parent_task_id.eq.${taskId}`);

                    if (error) throw error;

                    if (task?.template_id) {
                        await supabase
                            .from('task_templates')
                            .delete()
                            .or(`id.eq.${task.template_id},parent_task_id.eq.${task.template_id}`);
                    }

                    setTasks(tasks.filter(t => t.id !== taskId && t.parent_task_id !== taskId));
                } catch (err) {
                    setError('Failed to delete task: ' + err.message);
                }
            }

            return (
                <>
                    <div className="section-header">
                        <h2 className="section-title">{section.name}</h2>
                        <div>
                            <button 
                                className="icon-btn"
                                onClick={() => deleteSection(section.id)}
                                title="Delete section"
                            >
                                ✕
                            </button>
                        </div>
                    </div>

                    <ul className="task-list">
                        {tasks.filter(t => !t.parent_task_id).map(task => (
                            <li key={task.id} className={`task ${task.completed ? 'completed' : ''}`}>
                                <input
                                    type="checkbox"
                                    className="checkbox"
                                    checked={task.completed}
                                    onChange={(e) => toggleTask(task.id, e.target.checked)}
                                />
                                <div className="task-content">
                                    <span className="task-text">{task.text}</span>
                                </div>
                                <div className="task-meta">
                                    <span className={task.template_id ? 'badge badge-daily' : 'badge badge-onetime'}>
                                        {task.template_id ? 'Daily' : 'One-Time'}
                                    </span>
                                    <button 
                                        className="icon-btn"
                                        onClick={() => deleteTask(task.id)}
                                        title="Delete task"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </li>
                        ))}
                    </ul>

                    <form className="add-task-form" onSubmit={addTask}>
                        <input
                            type="text"
                            className="task-input"
                            value={newTaskText}
                            onChange={(e) => setNewTaskText(e.target.value)}
                            placeholder="Add new task..."
                        />
                        <div className="type-toggle">
                            <button
                                type="button"
                                className={`type-option ${taskType === 'daily' ? 'active' : ''}`}
                                onClick={() => setTaskType('daily')}
                            >
                                Daily
                            </button>
                            <button
                                type="button"
                                className={`type-option ${taskType === 'one-time' ? 'active' : ''}`}
                                onClick={() => setTaskType('one-time')}
                            >
                                One-Time
                            </button>
                        </div>
                        <button type="submit" className="btn">Add</button>
                    </form>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
