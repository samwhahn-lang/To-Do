<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo List</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151922;
            --bg-tertiary: #1f2430;
            --text-primary: #e6e6e6;
            --text-secondary: #8a8a8a;
            --accent-green: #39ff14;
            --accent-cyan: #00ffff;
            --accent-pink: #ff006e;
            --border: #2a2f3a;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57, 255, 20, 0.03) 2px, rgba(57, 255, 20, 0.03) 4px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            border: 2px solid var(--accent-green);
            border-radius: 4px;
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan {
            to {
                left: 100%;
            }
        }

        .date-display {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            letter-spacing: 0.2em;
        }

        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
        }

        .auth-container h2 {
            color: var(--accent-cyan);
            margin-bottom: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(57, 255, 20, 0.1);
        }

        .btn {
            padding: 0.75rem 2rem;
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn-secondary:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
        }

        .section {
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            animation: slideIn 0.4s ease-out;
            animation-fill-mode: both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent-green);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            border-color: var(--accent-green);
            background: rgba(57, 255, 20, 0.05);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-green);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox:checked {
            background: var(--accent-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-primary);
            font-weight: 700;
            font-size: 0.875rem;
        }

        .task-text {
            flex: 1;
            color: var(--text-primary);
        }

        .task-badge {
            padding: 0.25rem 0.5rem;
            background: var(--accent-pink);
            color: var(--bg-primary);
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .add-task-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .add-task-form input {
            flex: 1;
        }

        .new-section-form {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 4px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .error-message {
            background: var(--accent-pink);
            color: var(--bg-primary);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--accent-cyan);
            font-size: 1.25rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .date-display {
                font-size: 1.5rem;
            }

            .section-header {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }

            .add-task-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sections, setSections] = useState([]);
            const [error, setError] = useState(null);

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) {
                        loadSections();
                    }
                });

                return () => {
                    authListener?.subscription?.unsubscribe();
                };
            }, []);

            async function checkUser() {
                const { data: { session } } = await supabase.auth.getSession();
                setUser(session?.user || null);
                if (session?.user) {
                    await loadSections();
                }
                setLoading(false);
            }

            async function loadSections() {
                const today = new Date().toISOString().split('T')[0];
                
                const { data, error } = await supabase
                    .from('sections')
                    .select('*, tasks(*)')
                    .eq('user_id', (await supabase.auth.getUser()).data.user.id)
                    .order('order_index', { ascending: true });

                if (error) {
                    setError(error.message);
                    return;
                }

                // Load tasks for today
                const { data: tasksData } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('date', today);

                setSections(data.map(section => ({
                    ...section,
                    tasks: tasksData?.filter(t => t.section_id === section.id) || []
                })));
            }

            if (loading) {
                return <div className="loading">⚡ INITIALIZING SYSTEM...</div>;
            }

            if (!user) {
                return <AuthScreen />;
            }

            return (
                <TodoApp 
                    sections={sections} 
                    setSections={setSections}
                    loadSections={loadSections}
                    error={error}
                    setError={setError}
                />
            );
        }

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(null);

            async function handleAuth(e) {
                e.preventDefault();
                setError(null);

                try {
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({
                            email,
                            password
                        });
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.auth.signUp({
                            email,
                            password
                        });
                        if (error) throw error;
                        alert('Check your email to confirm your account!');
                    }
                } catch (error) {
                    setError(error.message);
                }
            }

            return (
                <div className="auth-container">
                    <h2>{isLogin ? 'Login' : 'Sign Up'}</h2>
                    {error && <div className="error-message">{error}</div>}
                    <form onSubmit={handleAuth}>
                        <div className="input-group">
                            <label>Email</label>
                            <input
                                type="email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                            />
                        </div>
                        <div className="input-group">
                            <label>Password</label>
                            <input
                                type="password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                            />
                        </div>
                        <button type="submit" className="btn" style={{width: '100%', marginTop: '1rem'}}>
                            {isLogin ? 'Login' : 'Sign Up'}
                        </button>
                        <button
                            type="button"
                            className="btn btn-secondary"
                            style={{width: '100%', marginTop: '0.5rem'}}
                            onClick={() => setIsLogin(!isLogin)}
                        >
                            {isLogin ? 'Need an account?' : 'Already have an account?'}
                        </button>
                    </form>
                </div>
            );
        }

        function TodoApp({ sections, setSections, loadSections, error, setError }) {
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');

            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            async function handleSignOut() {
                await supabase.auth.signOut();
            }

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                const user = (await supabase.auth.getUser()).data.user;
                const { data, error } = await supabase
                    .from('sections')
                    .insert([{
                        user_id: user.id,
                        name: newSectionName,
                        order_index: sections.length
                    }])
                    .select();

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections([...sections, { ...data[0], tasks: [] }]);
                setNewSectionName('');
                setShowNewSection(false);
            }

            async function deleteSection(sectionId) {
                if (!confirm('Delete this section and all its tasks?')) return;

                const { error } = await supabase
                    .from('sections')
                    .delete()
                    .eq('id', sectionId);

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections(sections.filter(s => s.id !== sectionId));
            }

            return (
                <div className="container">
                    <div className="header">
                        <div className="date-display">{today}</div>
                        <div className="subtitle">Daily Task Protocol</div>
                    </div>

                    <div className="toolbar">
                        <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                            + New Section
                        </button>
                        <button className="btn btn-secondary" onClick={handleSignOut}>
                            Sign Out
                        </button>
                    </div>

                    {error && <div className="error-message">{error}</div>}

                    {showNewSection && (
                        <form className="new-section-form" onSubmit={addSection}>
                            <div className="input-group">
                                <label>Section Name</label>
                                <input
                                    type="text"
                                    value={newSectionName}
                                    onChange={(e) => setNewSectionName(e.target.value)}
                                    placeholder="e.g., Work, Personal, Health"
                                    autoFocus
                                />
                            </div>
                            <div style={{display: 'flex', gap: '0.5rem', marginTop: '1rem'}}>
                                <button type="submit" className="btn">Create</button>
                                <button 
                                    type="button" 
                                    className="btn btn-secondary"
                                    onClick={() => setShowNewSection(false)}
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    )}

                    {sections.map((section, index) => (
                        <Section
                            key={section.id}
                            section={section}
                            deleteSection={deleteSection}
                            loadSections={loadSections}
                            style={{animationDelay: `${index * 0.1}s`}}
                        />
                    ))}
                </div>
            );
        }

        function Section({ section, deleteSection, loadSections, style }) {
            const [tasks, setTasks] = useState(section.tasks || []);
            const [newTaskText, setNewTaskText] = useState('');
            const [isRepeating, setIsRepeating] = useState(false);

            useEffect(() => {
                setTasks(section.tasks || []);
            }, [section.tasks]);

            async function addTask(e) {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                const today = new Date().toISOString().split('T')[0];
                const user = (await supabase.auth.getUser()).data.user;

                const { data, error } = await supabase
                    .from('tasks')
                    .insert([{
                        section_id: section.id,
                        user_id: user.id,
                        text: newTaskText,
                        completed: false,
                        date: today,
                        is_repeating: isRepeating
                    }])
                    .select();

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks([...tasks, data[0]]);
                setNewTaskText('');
                setIsRepeating(false);
            }

            async function toggleTask(taskId, completed) {
                const { error } = await supabase
                    .from('tasks')
                    .update({ completed })
                    .eq('id', taskId);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.map(t => t.id === taskId ? { ...t, completed } : t));
            }

            async function deleteTask(taskId) {
                const { error } = await supabase
                    .from('tasks')
                    .delete()
                    .eq('id', taskId);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.filter(t => t.id !== taskId));
            }

            return (
                <div className="section" style={style}>
                    <div className="section-header">
                        <h2 className="section-title">{section.name}</h2>
                        <div className="section-actions">
                            <button 
                                className="icon-btn"
                                onClick={() => deleteSection(section.id)}
                                title="Delete section"
                            >
                                🗑️
                            </button>
                        </div>
                    </div>

                    <ul className="task-list">
                        {tasks.map(task => (
                            <li key={task.id} className={`task-item ${task.completed ? 'completed' : ''}`}>
                                <input
                                    type="checkbox"
                                    className="checkbox"
                                    checked={task.completed}
                                    onChange={(e) => toggleTask(task.id, e.target.checked)}
                                />
                                <span className="task-text">{task.text}</span>
                                {task.is_repeating && (
                                    <span className="task-badge">DAILY</span>
                                )}
                                <button 
                                    className="icon-btn"
                                    onClick={() => deleteTask(task.id)}
                                >
                                    ✕
                                </button>
                            </li>
                        ))}
                    </ul>

                    <form className="add-task-form" onSubmit={addTask}>
                        <input
                            type="text"
                            value={newTaskText}
                            onChange={(e) => setNewTaskText(e.target.value)}
                            placeholder="Add new task..."
                        />
                        <label style={{display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--text-secondary)'}}>
                            <input
                                type="checkbox"
                                checked={isRepeating}
                                onChange={(e) => setIsRepeating(e.target.checked)}
                            />
                            Daily
                        </label>
                        <button type="submit" className="btn">Add</button>
                    </form>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
