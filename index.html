<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --noir: #0d0d0d;
            --charcoal: #1a1a1a;
            --slate: #2d2d2d;
            --ash: #4a4a4a;
            --ghost: #e8e8e8;
            --paper: #f5f5f5;
            --lime: #d4ff00;
            --cyan: #00fff5;
            --coral: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--noir);
            color: var(--ghost);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(212, 255, 0, 0.02) 2px,
                    rgba(212, 255, 0, 0.02) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        #root {
            position: relative;
            z-index: 2;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .debug-banner {
            background: rgba(255, 107, 107, 0.15);
            border: 2px solid var(--coral);
            color: var(--coral);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .debug-banner h2 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .debug-banner code {
            display: block;
            background: var(--charcoal);
            padding: 1rem;
            margin: 0.75rem 0;
            border-left: 2px solid var(--coral);
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .debug-banner p {
            margin-bottom: 0.5rem;
        }

        .debug-banner a {
            color: var(--cyan);
            text-decoration: underline;
        }

        .masthead {
            margin-bottom: 4rem;
            text-align: center;
            position: relative;
        }

        .masthead::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--lime);
            box-shadow: 0 0 20px var(--lime);
        }

        .date-header {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--lime), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .tagline {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--ash);
            text-transform: uppercase;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
            border-radius: 2px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--lime);
            color: var(--lime);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--lime);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            color: var(--noir);
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            border-color: var(--ash);
            color: var(--ash);
        }

        .btn-secondary:hover {
            color: var(--noir);
        }

        .section {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--lime);
            padding: 2rem;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate);
        }

        .section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--lime);
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--slate);
            color: var(--ash);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .icon-btn:hover {
            border-color: var(--lime);
            color: var(--lime);
            background: rgba(212, 255, 0, 0.05);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--lime);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .task:hover::before {
            transform: scaleY(1);
        }

        .task:hover {
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
        }

        .task.completed {
            opacity: 0.5;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: var(--ash);
        }

        .checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--ash);
            background: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: var(--lime);
        }

        .checkbox:checked {
            background: var(--lime);
            border-color: var(--lime);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--noir);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            color: var(--ghost);
            font-size: 0.9375rem;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .badge-daily {
            color: var(--lime);
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.1);
        }

        .badge-onetime {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0, 255, 245, 0.1);
        }

        .add-task-form {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .task-input::placeholder {
            color: var(--ash);
        }

        .type-toggle {
            display: flex;
            background: var(--slate);
            border: 1px solid var(--ash);
        }

        .type-option {
            padding: 0.875rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 1px solid var(--ash);
        }

        .type-option:last-child {
            border-right: none;
        }

        .type-option.active {
            background: var(--lime);
            color: var(--noir);
        }

        .type-option:not(.active):hover {
            background: rgba(212, 255, 0, 0.1);
            color: var(--lime);
        }

        .story-field {
            margin-bottom: 1.5rem;
        }

        .story-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .story-textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.2s;
        }

        .story-textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .auth-screen {
            max-width: 450px;
            margin: 6rem auto;
            padding: 3rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
        }

        .auth-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--lime);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ash);
        }

        .input-field {
            width: 100%;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--lime);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .message {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-left: 4px solid;
        }

        .message-error {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--coral);
            color: var(--coral);
        }

        .message-success {
            background: rgba(212, 255, 0, 0.1);
            border-color: var(--lime);
            color: var(--lime);
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 1.25rem;
            color: var(--ash);
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(212, 255, 0, 0.4)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 255, 245, 0.6)); }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 2rem 1rem;
            }

            .date-header {
                font-size: 2rem;
            }

            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .task {
                flex-wrap: wrap;
            }

            .task-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ⚠️ REPLACE THESE WITH YOUR NEW SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://dgxtslpwsayucznkrqih.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRneHRzbHB3c2F5dWN6bmtycWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzYxMTcsImV4cCI6MjA5MTA1MjExN30.sLiEngc7B5es_jMh_u8eaJNirUScg3cGqhO9_Ku8x-I';
        
        // DEBUG: Check for dummy values
        const hasDummyUrl = SUPABASE_URL.includes('YOUR-PROJECT-ID');
        const hasDummyKey = SUPABASE_ANON_KEY.includes('YOUR-ANON-KEY');
        
        console.log('🚀 App initializing...');
        console.log('Supabase URL valid?', !hasDummyUrl);
        console.log('Supabase Key valid?', !hasDummyKey);
        console.log('window.supabase exists?', !!window.supabase);

        let supabase;
        let initError = null;

        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created');
        } catch (err) {
            initError = err.message;
            console.error('❌ Failed to create Supabase client:', err);
        }

        function DebugBanner() {
            if (!initError && !hasDummyUrl && !hasDummyKey) {
                return null; // No errors, don't show banner
            }

            return (
                <div className="debug-banner">
                    <h2>⚠️ Configuration Error Detected</h2>
                    
                    {hasDummyUrl && (
                        <div>
                            <p><strong>❌ SUPABASE_URL is not updated</strong></p>
                            <p>You still have the placeholder value:</p>
                            <code>{SUPABASE_URL}</code>
                            <p>Replace it with your actual Supabase URL from:</p>
                            <code>Supabase Dashboard → Settings → API → Project URL</code>
                        </div>
                    )}
                    
                    {hasDummyKey && (
                        <div>
                            <p><strong>❌ SUPABASE_ANON_KEY is not updated</strong></p>
                            <p>You still have the placeholder value:</p>
                            <code>YOUR-ANON-KEY-HERE</code>
                            <p>Replace it with your actual anon key from:</p>
                            <code>Supabase Dashboard → Settings → API → Project API Keys → anon</code>
                        </div>
                    )}
                    
                    {initError && (
                        <div>
                            <p><strong>❌ Supabase Client Error:</strong></p>
                            <code>{initError}</code>
                            <p>Make sure both URL and Key are valid and properly formatted.</p>
                        </div>
                    )}
                    
                    <p style={{marginTop: '1rem', fontSize: '0.8rem'}}>
                        <strong>Next steps:</strong>
                        <br/>1. Open this HTML file in a text editor (VS Code, Notepad, etc.)
                        <br/>2. Find the lines with SUPABASE_URL and SUPABASE_ANON_KEY
                        <br/>3. Replace with actual values from your Supabase dashboard
                        <br/>4. Save the file
                        <br/>5. Refresh this page
                    </p>
                </div>
            );
        }

        function App() {
            // If credentials are missing, show debug banner only
            if (hasDummyUrl || hasDummyKey || initError) {
                return (
                    <div className="app-container">
                        <header className="masthead">
                            <h1 className="date-header">⚠️ Setup Required</h1>
                            <p className="tagline">Configuration Missing</p>
                        </header>
                        <DebugBanner />
                    </div>
                );
            }

            return <MainApp />;
        }

        function MainApp() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                });

                return () => {
                    authListener?.subscription?.unsubscribe();
                };
            }, []);

            async function checkUser() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user || null);
                } catch (err) {
                    setError('Failed to check user: ' + err.message);
                    console.error('Error checking user:', err);
                } finally {
                    setLoading(false);
                }
            }

            if (loading) {
                return (
                    <div className="app-container">
                        <div className="loading">⏳ Loading System...</div>
                    </div>
                );
            }

            if (!user) {
                return <AuthScreen setError={setError} />;
            }

            return <TaskApp user={user} setError={setError} />;
        }

        function AuthScreen({ setError }) {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setLocalError] = useState(null);
            const [loading, setLoading] = useState(false);

            async function handleAuth(e) {
                e.preventDefault();
                setLocalError(null);
                setLoading(true);

                try {
                    if (isLogin) {
                        const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });
                        if (signInError) throw signInError;
                    } else {
                        const { error: signUpError } = await supabase.auth.signUp({ email, password });
                        if (signUpError) throw signUpError;
                        setLocalError(null);
                        alert('✅ Check your email to confirm your account!');
                    }
                } catch (error) {
                    setLocalError(error.message);
                    setError(error.message);
                    console.error('Auth error:', error);
                } finally {
                    setLoading(false);
                }
            }

            return (
                <div className="app-container">
                    <div className="auth-screen">
                        <h1 className="auth-title">{isLogin ? 'Login' : 'Sign Up'}</h1>
                        {error && <div className="message message-error">❌ {error}</div>}
                        <form onSubmit={handleAuth}>
                            <div className="input-group">
                                <label className="input-label">Email</label>
                                <input
                                    type="email"
                                    className="input-field"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    required
                                    disabled={loading}
                                />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Password</label>
                                <input
                                    type="password"
                                    className="input-field"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                    disabled={loading}
                                />
                            </div>
                            <button type="submit" className="btn" style={{width: '100%', marginBottom: '0.75rem'}} disabled={loading}>
                                {loading ? '⏳ ' : ''}{isLogin ? 'Login' : 'Sign Up'}
                            </button>
                            <button
                                type="button"
                                className="btn btn-secondary"
                                style={{width: '100%'}}
                                onClick={() => setIsLogin(!isLogin)}
                                disabled={loading}
                            >
                                {isLogin ? 'Need an account?' : 'Have an account?'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function TaskApp({ user, setError }) {
            const [sections, setSections] = useState([]);
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');

            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'America/New_York'
            });

            useEffect(() => {
                loadSections();
            }, []);

            async function loadSections() {
                try {
                    const { data, error } = await supabase
                        .from('sections')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('order_index', { ascending: true });

                    if (error) throw error;
                    setSections(data || []);
                } catch (err) {
                    setError('Failed to load sections: ' + err.message);
                    console.error('Error loading sections:', err);
                }
            }

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                try {
                    const { data, error } = await supabase
                        .from('sections')
                        .insert([{
                            user_id: user.id,
                            name: newSectionName,
                            order_index: sections.length
                        }])
                        .select();

                    if (error) throw error;

                    setSections([...sections, data[0]]);
                    setNewSectionName('');
                    setShowNewSection(false);
                } catch (err) {
                    setError('Failed to create section: ' + err.message);
                }
            }

            return (
                <div className="app-container">
                    <header className="masthead">
                        <h1 className="date-header">{today}</h1>
                        <p className="tagline">Task Protocol</p>
                    </header>

                    <div className="control-panel">
                        <div className="control-group">
                            <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                                + New Section
                            </button>
                        </div>
                        <button className="btn btn-secondary" onClick={() => supabase.auth.signOut()}>
                            Sign Out
                        </button>
                    </div>

                    {showNewSection && (
                        <div className="section" style={{marginBottom: '2.5rem'}}>
                            <form onSubmit={addSection}>
                                <div className="input-group">
                                    <label className="input-label">Section Name</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={newSectionName}
                                        onChange={(e) => setNewSectionName(e.target.value)}
                                        placeholder="e.g., Work, Personal, Health"
                                        autoFocus
                                    />
                                </div>
                                <div style={{display: 'flex', gap: '0.75rem', marginTop: '1rem'}}>
                                    <button type="submit" className="btn">Create</button>
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary"
                                        onClick={() => setShowNewSection(false)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {sections.length === 0 ? (
                        <div className="section">
                            <p style={{color: 'var(--ash)'}}>
                                👋 Welcome! Click "+ New Section" to get started.
                            </p>
                        </div>
                    ) : (
                        sections.map((section, index) => (
                            <div 
                                key={section.id} 
                                className="section"
                                style={{animationDelay: `${index * 0.1}s`}}
                            >
                                <div className="section-header">
                                    <h2 className="section-title">{section.name}</h2>
                                </div>
                                <p style={{color: 'var(--ash)', fontSize: '0.875rem'}}>
                                    (Full task features coming in next update)
                                </p>
                            </div>
                        ))
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
