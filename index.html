<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --noir: #0d0d0d;
            --charcoal: #1a1a1a;
            --slate: #2d2d2d;
            --ash: #4a4a4a;
            --ghost: #e8e8e8;
            --paper: #f5f5f5;
            --lime: #d4ff00;
            --cyan: #00fff5;
            --coral: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--noir);
            color: var(--ghost);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(212, 255, 0, 0.02) 2px,
                    rgba(212, 255, 0, 0.02) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .masthead {
            margin-bottom: 4rem;
            text-align: center;
            position: relative;
        }

        .masthead::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--lime);
            box-shadow: 0 0 20px var(--lime);
        }

        .date-header {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--lime), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .cache-indicator {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-cyan);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cache-indicator.show {
            opacity: 1;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(212, 255, 0, 0.4)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 255, 245, 0.6)); }
        }

        .tagline {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--ash);
            text-transform: uppercase;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
            border-radius: 2px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--lime);
            color: var(--lime);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--lime);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            color: var(--noir);
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            border-color: var(--ash);
            color: var(--ash);
        }

        .btn-secondary:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        .section {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--lime);
            padding: 2rem;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        .section.dragging {
            opacity: 0.5;
        }

        .section.drag-over {
            border-color: var(--accent-cyan);
            border-width: 2px;
        }

        .stories-section {
            border: 2px solid var(--accent-yellow);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(255, 235, 59, 0.05) 100%);
            cursor: default;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate);
        }

        .section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--lime);
        }

        .section.stories .section-title {
            color: var(--gold);
        }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--slate);
            color: var(--ash);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .icon-btn:hover {
            border-color: var(--lime);
            color: var(--lime);
            background: rgba(212, 255, 0, 0.05);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--lime);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .task:hover::before {
            transform: scaleY(1);
        }

        .task:hover {
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
        }

        .task.completed {
            opacity: 0.5;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: var(--ash);
        }

        .checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--ash);
            background: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: var(--lime);
        }

        .checkbox:checked {
            background: var(--lime);
            border-color: var(--lime);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--noir);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            color: var(--ghost);
            font-size: 0.9375rem;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .badge-daily {
            color: var(--lime);
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.1);
        }

        .badge-onetime {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0, 255, 245, 0.1);
        }

        .add-task-form {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .task-input::placeholder {
            color: var(--ash);
        }

        .type-toggle {
            display: flex;
            background: var(--slate);
            border: 1px solid var(--ash);
        }

        .type-option {
            padding: 0.875rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 1px solid var(--ash);
        }

        .type-option:last-child {
            border-right: none;
        }

        .type-option.active {
            background: var(--lime);
            color: var(--noir);
        }

        .type-option:not(.active):hover {
            background: rgba(212, 255, 0, 0.1);
            color: var(--lime);
        }

        .story-field {
            margin-bottom: 1.5rem;
        }

        .story-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .story-textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.2s;
        }

        .story-textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .auth-screen {
            max-width: 450px;
            margin: 6rem auto;
            padding: 3rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
        }

        .auth-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--lime);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ash);
        }

        .input-field {
            width: 100%;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--lime);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .archive {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--cyan);
            padding: 2rem;
        }

        .archive-dates {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .date-btn {
            padding: 0.5rem 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .date-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .date-btn.active {
            background: var(--cyan);
            color: var(--noir);
            border-color: var(--cyan);
        }

        .archive-day-title {
            color: var(--cyan);
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .archive-section {
            margin-bottom: 1.5rem;
        }

        .archive-section-title {
            color: var(--lime);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .message {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-left: 4px solid;
        }

        .message-error {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--coral);
            color: var(--coral);
        }

        .subtask-input-container {
            margin-left: 2rem;
            margin-top: 0.5rem;
        }

        .subtask-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: 2rem;
            margin-top: 0.25rem;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 2rem 1rem;
            }

            .date-header {
                font-size: 2rem;
            }

            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .task {
                flex-wrap: wrap;
            }

            .task-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="cache-indicator" class="cache-indicator"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://kjhlokwfiffsllafyvnj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqaGxva3dmaWZmc2xsYWZ5dm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjUzMTUsImV4cCI6MjA5MDA0MTMxNX0.-mflvRFi9yOP7aoFJPHfrFTc-vY8xee1u5dnQbVI2ME';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========================================
        // CACHE MANAGER - Reduces Supabase egress by 80-90%
        // ========================================
        const CacheManager = {
            CACHE_DURATION: 5 * 60 * 1000, // 5 minutes
            
            get(key) {
                try {
                    const cached = localStorage.getItem(`cache_${key}`);
                    const timestamp = localStorage.getItem(`cache_${key}_time`);
                    
                    if (!cached || !timestamp) return null;
                    
                    const age = Date.now() - parseInt(timestamp);
                    if (age > this.CACHE_DURATION) {
                        this.delete(key);
                        return null;
                    }
                    
                    this.showIndicator('Using cached data');
                    return JSON.parse(cached);
                } catch (e) {
                    console.error('Cache get error:', e);
                    return null;
                }
            },
            
            set(key, data) {
                try {
                    localStorage.setItem(`cache_${key}`, JSON.stringify(data));
                    localStorage.setItem(`cache_${key}_time`, Date.now().toString());
                } catch (e) {
                    console.error('Cache set error:', e);
                }
            },
            
            delete(key) {
                localStorage.removeItem(`cache_${key}`);
                localStorage.removeItem(`cache_${key}_time`);
            },
            
            invalidate(pattern) {
                // Invalidate all cache keys matching pattern
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('cache_') && key.includes(pattern)) {
                        localStorage.removeItem(key);
                    }
                });
            },
            
            showIndicator(message) {
                const indicator = document.getElementById('cache-indicator');
                if (indicator) {
                    indicator.textContent = message;
                    indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 2000);
                }
            }
        };

        // Get current date in EST timezone
        function getCurrentDate() {
            const now = new Date();
            const estDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            return estDate.toISOString().split('T')[0];
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sections, setSections] = useState([]);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            const [showArchive, setShowArchive] = useState(false);

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) {
                        loadSections();
                    }
                });

                // Check for new day every minute
                const dateCheckInterval = setInterval(() => {
                    const newDate = getCurrentDateEST();
                    if (newDate !== currentDate) {
                        setCurrentDate(newDate);
                        // Clear the initialization flag for the new day
                        localStorage.removeItem('lastInitDate');
                        if (user) {
                            handleNewDay(newDate);
                        }
                    }
                }, 60000);

                return () => {
                    authListener?.subscription?.unsubscribe();
                };
            }, []);

            async function checkUser() {
                const { data: { session } } = await supabase.auth.getSession();
                setUser(session?.user || null);
                if (session?.user) {
                    await handleNewDay(currentDate);
                    await loadSections();
                }
                setLoading(false);
            }

            async function handleNewDay(date) {
                // CRITICAL: Check if we've already initialized today
                if (hasInitializedToday(date)) {
                    console.log('Already initialized for', date);
                    return;
                }

                const user = (await supabase.auth.getUser()).data.user;
                if (!user) return;

                try {
                    // Step 1: Check if we already have tasks for this date
                    const { data: existingTasks, error: checkError } = await supabase
                        .from('tasks')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('date', date)
                        .limit(1);

                    if (checkError) {
                        console.error('Error checking existing tasks:', checkError);
                        return;
                    }

                    if (existingTasks && existingTasks.length > 0) {
                        console.log('Tasks already exist for', date);
                        markInitialized(date);
                        return;
                    }

                    // Step 2: Get template tasks
                    const { data: templateTasks, error: templateError } = await supabase
                        .from('task_templates')
                        .select('*')
                        .eq('user_id', user.id);

                    if (templateError) {
                        console.error('Error fetching templates:', templateError);
                        return;
                    }

                    if (!templateTasks || templateTasks.length === 0) {
                        console.log('No templates found');
                        markInitialized(date);
                        return;
                    }

                    // Step 3: Create today's tasks from templates
                    const tasksToCreate = templateTasks.map(template => ({
                        section_id: template.section_id,
                        user_id: user.id,
                        text: template.text,
                        completed: false,
                        date: date,
                        template_id: template.id,
                        parent_task_id: template.parent_task_id
                    }));

                    const { error: insertError } = await supabase
                        .from('tasks')
                        .insert(tasksToCreate);

                    if (insertError) {
                        // If we get a unique constraint violation, that's actually fine - it means
                        // another process already created the tasks
                        if (insertError.code === '23505') {
                            console.log('Tasks already created by another process');
                        } else {
                            console.error('Error creating tasks:', insertError);
                        }
                    } else {
                        console.log(`Created ${tasksToCreate.length} tasks for ${date}`);
                    }

                    // Mark as initialized regardless of success/failure to prevent loops
                    markInitialized(date);

                } catch (err) {
                    console.error('Unexpected error in handleNewDay:', err);
                    markInitialized(date); // Mark as initialized to prevent infinite loops
                }
            }

            async function loadSections() {
                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;
                
                const { data, error } = await supabase
                    .from('sections')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('order_index', { ascending: true });

                if (error) {
                    setError(error.message);
                    return;
                }

                // Load tasks for today only
                const { data: tasksData } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('date', today)
                    .order('created_at', { ascending: true });

                setSections(data.map(section => ({
                    ...section,
                    tasks: tasksData?.filter(t => t.section_id === section.id) || []
                })));
            }

            if (loading) {
                return <div className="loading">Loading System...</div>;
            }

            if (!user) {
                return <AuthScreen />;
            }

            return (
                <MainApp 
                    sections={sections}
                    setSections={setSections}
                    loadData={loadData}
                    error={error}
                    setError={setError}
                    success={success}
                    setSuccess={setSuccess}
                    showArchive={showArchive}
                    setShowArchive={setShowArchive}
                />
            );
        }

        function AuthScreen() {

        function MainApp({ sections, setSections, loadData, error, setError, success, setSuccess, showArchive, setShowArchive }) {
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');

            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'America/New_York'
            });

            async function handleSignOut() {
                await supabase.auth.signOut();
            }

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                try {
                    const user = (await supabase.auth.getUser()).data.user;
                    const { data, error } = await supabase
                        .from('sections')
                        .insert([{
                            user_id: user.id,
                            name: newSectionName,
                            order_index: sections.length
                        }])
                        .select();

                    if (error) throw error;

                setSections([...sections, { ...data[0], tasks: [] }]);
                setNewSectionName('');
                setShowNewSection(false);
            }

            async function deleteSection(sectionId) {
                if (!confirm('Delete this section and all its tasks?')) return;

                try {
                    const { error } = await supabase
                        .from('sections')
                        .delete()
                        .eq('id', sectionId);

                    if (error) throw error;

                setSections(sections.filter(s => s.id !== sectionId));
            }

            async function updateSectionName(sectionId, newName) {
                const { error } = await supabase
                    .from('sections')
                    .update({ name: newName })
                    .eq('id', sectionId);

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections(sections.map(s => 
                    s.id === sectionId ? { ...s, name: newName } : s
                ));
            }

            async function reorderSections(newOrder) {
                setSections(newOrder);

                const updates = newOrder.map((section, index) => ({
                    id: section.id,
                    order_index: index
                }));

                for (const update of updates) {
                    await supabase
                        .from('sections')
                        .update({ order_index: update.order_index })
                        .eq('id', update.id);
                }
            }

            function handleDragStart(e, index) {
                setDraggedSection(index);
                e.dataTransfer.effectAllowed = 'move';
            }

            function handleDragOver(e, index) {
                e.preventDefault();
                if (draggedSection === null || draggedSection === index) return;
                
                const newSections = [...sections];
                const draggedItem = newSections[draggedSection];
                newSections.splice(draggedSection, 1);
                newSections.splice(index, 0, draggedItem);
                
                setDraggedSection(index);
                setSections(newSections);
            }

            function handleDragEnd() {
                if (draggedSection !== null) {
                    reorderSections(sections);
                }
                setDraggedSection(null);
            }

            return (
                <div className="app-container">
                    <header className="masthead">
                        <h1 className="date-header">{today}</h1>
                        <p className="tagline">Task Protocol</p>
                    </header>

                    <div className="control-panel">
                        <div className="control-group">
                            <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                                + New Section
                            </button>
                            <button 
                                className={showArchive ? "btn" : "btn btn-secondary"}
                                onClick={() => setShowArchive(!showArchive)}
                            >
                                {showArchive ? 'Hide Archive' : 'View Archive'}
                            </button>
                        </div>
                        <button className="btn btn-secondary" onClick={() => supabase.auth.signOut()}>
                            Sign Out
                        </button>
                    </div>

                    {error && <div className="message message-error">❌ {error}</div>}
                    {success && <div className="message message-success">✓ {success}</div>}

                    {showNewSection && (
                        <div className="section" style={{marginBottom: '2.5rem'}}>
                            <form onSubmit={addSection}>
                                <div className="input-group">
                                    <label className="input-label">Section Name</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={newSectionName}
                                        onChange={(e) => setNewSectionName(e.target.value)}
                                        placeholder="e.g., Work, Personal, Health"
                                        autoFocus
                                    />
                                </div>
                                <div style={{display: 'flex', gap: '0.75rem', marginTop: '1rem'}}>
                                    <button type="submit" className="btn">Create</button>
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary"
                                        onClick={() => setShowNewSection(false)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {showArchive && <Archive />}

                    {sections.filter(s => s.name !== 'Stories').map((section, index) => (
                        <div 
                            key={section.id} 
                            className="section"
                            style={{animationDelay: `${index * 0.1}s`}}
                        >
                            <Section
                                section={section}
                                loadData={loadData}
                                deleteSection={deleteSection}
                                setError={setError}
                            />
                        </div>
                    ))}

                    <StoriesSection setError={setError} setSuccess={setSuccess} />
                </div>
            );
        }

        function Section({ section, loadData, deleteSection, setError }) {
            const [tasks, setTasks] = useState(section.tasks || []);
            const [newTaskText, setNewTaskText] = useState('');
            const [taskType, setTaskType] = useState('daily');

            useEffect(() => {
                setTasks(section.tasks || []);
            }, [section.tasks]);

            async function addTask(e) {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                const today = getCurrentDate();
                const user = (await supabase.auth.getUser()).data.user;

                try {
                    // If it's a daily task, create both template and today's instance
                    if (taskType === 'daily') {
                        // Create template
                        const { data: templateData, error: templateError } = await supabase
                            .from('task_templates')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                parent_task_id: null
                            }])
                            .select();

                        if (templateError) {
                            alert(templateError.message);
                            return;
                        }

                        // Create today's instance
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: templateData[0].id,
                                parent_task_id: null
                            }])
                            .select();

                        if (error) {
                            alert(error.message);
                            return;
                        }
                        setTasks([...tasks, data[0]]);
                    } else {
                        // One-time task - no template needed
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: null,
                                parent_task_id: null
                            }])
                            .select();

                        if (error) {
                            alert(error.message);
                            return;
                        }
                        setTasks([...tasks, data[0]]);
                    }

                    setNewTaskText('');
                } catch (err) {
                    console.error('Error adding task:', err);
                    alert('Error adding task');
                }
            }

            async function addSubtask(parentTaskId, subtaskText) {
                if (!subtaskText.trim()) return;

                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;
                const parentTask = tasks.find(t => t.id === parentTaskId);

                try {
                    // If parent has a template, this is a daily subtask
                    if (parentTask?.template_id) {
                        // Create template
                        const { data: templateData, error: templateError } = await supabase
                            .from('task_templates')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: subtaskText,
                                parent_task_id: parentTask.template_id
                            }])
                            .select();

                        if (templateError) {
                            alert(templateError.message);
                            return;
                        }

                        // Create today's instance
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: subtaskText,
                                completed: false,
                                date: today,
                                template_id: templateData[0].id,
                                parent_task_id: parentTaskId
                            }])
                            .select();

                        if (error) {
                            alert(error.message);
                            return;
                        }
                        setTasks([...tasks, data[0]]);
                    } else {
                        // One-time subtask
                        const { data, error } = await supabase
                            .from('tasks')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: subtaskText,
                                completed: false,
                                date: today,
                                template_id: null,
                                parent_task_id: parentTaskId
                            }])
                            .select();

                        if (error) {
                            alert(error.message);
                            return;
                        }
                        setTasks([...tasks, data[0]]);
                    }
                } catch (err) {
                    console.error('Error adding subtask:', err);
                    alert('Error adding subtask');
                }
            }

            async function toggleTask(taskId, completed) {
                try {
                    const { error } = await supabase
                        .from('tasks')
                        .update({ completed })
                        .eq('id', taskId);

                    if (error) throw error;

                setTasks(tasks.map(t => t.id === taskId ? { ...t, completed } : t));
            }

            async function toggleTaskType(taskId, currentHasTemplate) {
                const task = tasks.find(t => t.id === taskId);
                if (!task) return;

                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;

                try {
                    if (currentHasTemplate) {
                        // Convert from daily to one-time: delete template
                        if (task.template_id) {
                            await supabase
                                .from('task_templates')
                                .delete()
                                .eq('id', task.template_id);

                            await supabase
                                .from('tasks')
                                .update({ template_id: null })
                                .eq('id', taskId);

                            setTasks(tasks.map(t => t.id === taskId ? { ...t, template_id: null } : t));
                        }
                    } else {
                        // Convert from one-time to daily: create template
                        const { data: templateData, error: templateError } = await supabase
                            .from('task_templates')
                            .insert([{
                                section_id: section.id,
                                user_id: user.id,
                                text: task.text,
                                parent_task_id: task.parent_task_id ? tasks.find(t => t.id === task.parent_task_id)?.template_id : null
                            }])
                            .select();

                        if (templateError) {
                            alert(templateError.message);
                            return;
                        }

                        await supabase
                            .from('tasks')
                            .update({ template_id: templateData[0].id })
                            .eq('id', taskId);

                        setTasks(tasks.map(t => t.id === taskId ? { ...t, template_id: templateData[0].id } : t));
                    }
                } catch (err) {
                    console.error('Error toggling task type:', err);
                    alert('Error toggling task type');
                }
            }

            async function updateTaskText(taskId, newText) {
                if (!newText.trim()) {
                    setEditingTaskId(null);
                    return;
                }

                const task = tasks.find(t => t.id === taskId);
                
                try {
                    // Update the task
                    const { error } = await supabase
                        .from('tasks')
                        .update({ text: newText })
                        .eq('id', taskId);

                    if (error) {
                        alert(error.message);
                        return;
                    }

                    // If it has a template, update the template too
                    if (task?.template_id) {
                        await supabase
                            .from('task_templates')
                            .update({ text: newText })
                            .eq('id', task.template_id);
                    }

                    setTasks(tasks.map(t => t.id === taskId ? { ...t, text: newText } : t));
                    setEditingTaskId(null);
                } catch (err) {
                    console.error('Error updating task:', err);
                    alert('Error updating task');
                }
            }

            async function deleteTask(taskId) {
                const task = tasks.find(t => t.id === taskId);
                
                try {
                    // Delete the task and its subtasks
                    const { error } = await supabase
                        .from('tasks')
                        .delete()
                        .or(`id.eq.${taskId},parent_task_id.eq.${taskId}`);

                    if (error) {
                        alert(error.message);
                        return;
                    }

                    // If it has a template, delete the template too (and all subtask templates)
                    if (task?.template_id) {
                        await supabase
                            .from('task_templates')
                            .delete()
                            .or(`id.eq.${task.template_id},parent_task_id.eq.${task.template_id}`);
                    }

                    setTasks(tasks.filter(t => t.id !== taskId && t.parent_task_id !== taskId));
                } catch (err) {
                    console.error('Error deleting task:', err);
                    alert('Error deleting task');
                }
            }

            async function saveNameEdit() {
                if (editedName.trim() && editedName !== section.name) {
                    await updateSectionName(section.id, editedName);
                }
            }

            return (
                <>
                    <div className="section-header">
                        <h2 className="section-title">{section.name}</h2>
                        <div className="section-actions">
                            <button 
                                className="icon-btn"
                                onClick={() => deleteSection(section.id)}
                                title="Delete section"
                            >
                                ✕
                            </button>
                        </div>
                    </div>

                    <ul className="task-list">
                        {tasks.map(task => (
                            <li key={task.id} className={`task ${task.completed ? 'completed' : ''}`}>
                                <input
                                    type="checkbox"
                                    className="checkbox"
                                    checked={task.completed}
                                    onChange={(e) => toggleTask(task.id, e.target.checked)}
                                />
                                <div className="task-content">
                                    <span className="task-text">{task.text}</span>
                                </div>
                                <div className="task-meta">
                                    <span className={task.template_id ? 'badge badge-daily' : 'badge badge-onetime'}>
                                        {task.template_id ? 'Daily' : 'One-Time'}
                                    </span>
                                    <button 
                                        className="icon-btn"
                                        onClick={() => deleteTask(task.id)}
                                        title="Delete task"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </li>
                        ))}
                    </ul>

                    <form className="add-task-form" onSubmit={addTask}>
                        <input
                            type="text"
                            className="task-input"
                            value={newTaskText}
                            onChange={(e) => setNewTaskText(e.target.value)}
                            placeholder="Add new task..."
                        />
                        <div className="type-toggle">
                            <button
                                type="button"
                                className={`type-option ${taskType === 'daily' ? 'active' : ''}`}
                                onClick={() => setTaskType('daily')}
                            >
                                Daily
                            </button>
                            <button
                                type="button"
                                className={`type-option ${taskType === 'one-time' ? 'active' : ''}`}
                                onClick={() => setTaskType('one-time')}
                            >
                                One-Time
                            </button>
                        </div>
                        <button type="submit" className="btn">Add</button>
                    </form>
                </>
            );
        }

        function TaskItem({ 
            task, 
            isSubtask = false, 
            editingTaskId, 
            editedTaskText, 
            setEditedTaskText,
            toggleTask, 
            toggleTaskType, 
            startEditingTask, 
            updateTaskText, 
            deleteTask,
            addSubtask 
        }) {
            const [showSubtaskInput, setShowSubtaskInput] = useState(false);
            const [subtaskText, setSubtaskText] = useState('');
            const inputRef = useRef(null);

            function handleKeyDown(e) {
                if (e.key === 'Tab' && !isSubtask) {
                    e.preventDefault();
                    setShowSubtaskInput(true);
                    setTimeout(() => inputRef.current?.focus(), 0);
                }
                if (e.key === 'Enter' && editingTaskId === task.id) {
                    updateTaskText(task.id, editedTaskText);
                }
            }

            function handleSubtaskKeyDown(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (subtaskText.trim()) {
                        addSubtask(task.id, subtaskText);
                        setSubtaskText('');
                    }
                }
                if (e.key === 'Escape') {
                    setShowSubtaskInput(false);
                    setSubtaskText('');
                }
            }

            const isDaily = task.template_id !== null;

            return (
                <>
                    <li className={`task-item ${task.completed ? 'completed' : ''} ${isSubtask ? 'subtask-item' : ''} ${editingTaskId === task.id ? 'editing' : ''}`}>
                        <input
                            type="checkbox"
                            className="checkbox"
                            checked={task.completed}
                            onChange={(e) => toggleTask(task.id, e.target.checked)}
                        />
                        <div className="task-content">
                            {editingTaskId === task.id ? (
                                <input
                                    type="text"
                                    className="task-text-input"
                                    value={editedTaskText}
                                    onChange={(e) => setEditedTaskText(e.target.value)}
                                    onBlur={() => updateTaskText(task.id, editedTaskText)}
                                    onKeyDown={handleKeyDown}
                                    autoFocus
                                />
                            ) : (
                                <span 
                                    className="task-text"
                                    onClick={() => startEditingTask(task)}
                                    onKeyDown={handleKeyDown}
                                    tabIndex={0}
                                    style={{ cursor: 'text' }}
                                    title="Click to edit or press Tab to add subtask"
                                >
                                    {task.text}
                                </span>
                            )}
                        </div>
                        <div className="task-actions">
                            <span 
                                className={`task-badge ${isDaily ? '' : 'one-time'}`}
                                onClick={() => toggleTaskType(task.id, isDaily)}
                                style={{ cursor: 'pointer' }}
                                title="Click to toggle"
                            >
                                {isDaily ? 'DAILY' : 'ONE-TIME'}
                            </span>
                            <button 
                                className="icon-btn"
                                onClick={() => deleteTask(task.id)}
                            >
                                ✕
                            </button>
                        </div>
                    </li>
                    {showSubtaskInput && !isSubtask && (
                        <div className="subtask-input-container">
                            <input
                                ref={inputRef}
                                type="text"
                                value={subtaskText}
                                onChange={(e) => setSubtaskText(e.target.value)}
                                onKeyDown={handleSubtaskKeyDown}
                                onBlur={() => {
                                    if (subtaskText.trim()) {
                                        addSubtask(task.id, subtaskText);
                                    }
                                    setShowSubtaskInput(false);
                                    setSubtaskText('');
                                }}
                                placeholder="Add subtask... (press Enter)"
                                style={{
                                    width: '100%',
                                    padding: '0.5rem',
                                    background: 'var(--bg-primary)',
                                    border: '1px solid var(--accent-green)',
                                    borderRadius: '4px',
                                    color: 'var(--text-primary)',
                                    fontFamily: 'Space Mono, monospace',
                                    fontSize: '0.875rem'
                                }}
                            />
                        </div>
                    )}
                </>
            );
        }

                        .eq('user_id', user.id)

                        tension: data.tension || '',

                    });

                    const today = getCurrentDate();
                    const user = (await supabase.auth.getUser()).data.user;

                    const { error } = await supabase
                        .from('stories')
                        .upsert({
                            user_id: user.id,
                            date: today,
                            different: stories.different,
                            tension: stories.tension,
                            detail: stories.detail

                    </div>

                    <div className="story-field">
                        <label className="story-label">
                            What's one specific detail you'll forget by tomorrow?
                        </label>
                        <textarea
                            className="story-textarea"
                            value={stories.detail}
                            onChange={(e) => setStories({ ...stories, detail: e.target.value })}

        function Archive() {
            const [dates, setDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [archiveData, setArchiveData] = useState(null);

            useEffect(() => {
                loadDates();
            }, []);

            async function loadArchiveDates() {
                const user = (await supabase.auth.getUser()).data.user;
                
                const { data: taskDates } = await supabase
                    .from('tasks')
                    .select('date')
                    .eq('user_id', user.id)
                    .order('date', { ascending: false });

                    const { data: storyDates } = await supabase
                        .from('stories')
                        .select('date')
                        .eq('user_id', user.id)
                        .order('date', { ascending: false });

                    const allDates = new Set([
                        ...(taskDates?.map(t => t.date) || []),
                        ...(storyDates?.map(s => s.date) || [])
                    ]);

                const dates = Array.from(allDates).sort((a, b) => b.localeCompare(a));
                setArchiveDates(dates.slice(0, 30));
                
                if (dates.length > 0 && !selectedDate) {
                    setSelectedDate(dates[0]);
                    loadArchiveForDate(dates[0]);
                }
            }

            async function loadArchiveForDate(date) {
                setSelectedDate(date);
                const user = (await supabase.auth.getUser()).data.user;

                    const { data: tasks } = await supabase
                        .from('tasks')
                        .select('*, sections(name)')
                        .eq('user_id', user.id)
                        .eq('date', date);

                    const { data: stories } = await supabase
                        .from('stories')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('date', date)
                        .single();

                    const tasksBySection = {};
                    tasks?.forEach(task => {
                        const sectionName = task.sections?.name || 'Unknown';
                        if (!tasksBySection[sectionName]) {
                            tasksBySection[sectionName] = [];
                        }
                        tasksBySection[sectionName].push(task);
                    });

                setArchiveData({ tasks: tasksBySection, stories });
            }

            return (
                <div className="archive-container">
                    <div className="archive-header">
                        <h2 className="archive-title">📚 Archive</h2>
                    </div>

                    <div className="archive-dates">
                        {dates.map(date => (
                            <button
                                key={date}
                                className={`date-btn ${selectedDate === date ? 'active' : ''}`}
                                onClick={() => loadArchiveForDate(date)}
                            >
                                {new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                                    month: 'short',
                                    day: 'numeric'
                                })}
                            </button>
                        ))}
                    </div>

                    {archiveData && selectedDate && (
                        <div>
                            <h3 className="archive-day-title">
                                {new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', {
                                    weekday: 'long',
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric'
                                })}
                            </h3>

                            {Object.keys(archiveData.tasks).length > 0 && (
                                <div>
                                    {Object.entries(archiveData.tasks).map(([sectionName, tasks]) => {
                                        const parentTasks = tasks.filter(t => !t.parent_task_id);
                                        const getSubtasks = (parentId) => tasks.filter(t => t.parent_task_id === parentId);
                                        
                                        return (
                                            <div key={sectionName} className="archive-section">
                                                <h4 className="archive-section-title">{sectionName}</h4>
                                                <ul className="task-list">
                                                    {parentTasks.map(task => (
                                                        <React.Fragment key={task.id}>
                                                            <li className={`task-item ${task.completed ? 'completed' : ''}`}>
                                                                <input
                                                                    type="checkbox"
                                                                    className="checkbox"
                                                                    checked={task.completed}
                                                                    disabled
                                                                />
                                                                <span className="task-text">{task.text}</span>
                                                                {task.template_id && (
                                                                    <span className="task-badge">DAILY</span>
                                                                )}
                                                            </li>
                                                            {getSubtasks(task.id).map(subtask => (
                                                                <li key={subtask.id} className={`task-item subtask-item ${subtask.completed ? 'completed' : ''}`}>
                                                                    <input
                                                                        type="checkbox"
                                                                        className="checkbox"
                                                                        checked={subtask.completed}
                                                                        disabled
                                                                    />
                                                                    <span className="task-text">{subtask.text}</span>
                                                                </li>
                                                            ))}
                                                        </React.Fragment>
                                                    ))}
                                                </ul>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {archiveData.stories && (
                                <div className="archive-section">
                                    <h4 className="archive-section-title" style={{color: 'var(--gold)'}}>
                                        📖 Stories
                                    </h4>
                                    {archiveData.stories.different && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What was different?
                                            </div>
                                            <div>{archiveData.stories.different}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.tension && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What had tension?
                                            </div>
                                            <div>{archiveData.stories.tension}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.detail && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What specific detail?
                                            </div>
                                            <div>{archiveData.stories.detail}</div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
