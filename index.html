<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo List</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151922;
            --bg-tertiary: #1f2430;
            --text-primary: #e6e6e6;
            --text-secondary: #8a8a8a;
            --accent-green: #39ff14;
            --accent-cyan: #00ffff;
            --accent-pink: #ff006e;
            --accent-yellow: #ffeb3b;
            --border: #2a2f3a;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57, 255, 20, 0.03) 2px, rgba(57, 255, 20, 0.03) 4px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            border: 2px solid var(--accent-green);
            border-radius: 4px;
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan {
            to {
                left: 100%;
            }
        }

        .date-display {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            letter-spacing: 0.2em;
        }

        .cache-indicator {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-cyan);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .cache-indicator.show {
            opacity: 1;
        }

        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-cyan);
            border-radius: 4px;
        }

        .auth-container h2 {
            color: var(--accent-cyan);
            margin-bottom: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(57, 255, 20, 0.1);
        }

        .btn {
            padding: 0.75rem 2rem;
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn-secondary:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
        }

        .section {
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            animation: slideIn 0.4s ease-out;
            animation-fill-mode: both;
            cursor: move;
        }

        .section.dragging {
            opacity: 0.5;
        }

        .stories-section {
            border: 2px solid var(--accent-yellow);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(255, 235, 59, 0.05) 100%);
            cursor: default;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent-green);
        }

        .stories-section .section-header {
            border-bottom-color: var(--accent-yellow);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .drag-handle {
            cursor: move;
            color: var(--text-secondary);
            font-size: 1.25rem;
        }

        .stories-section .section-title {
            color: var(--accent-yellow);
        }

        .section-title-input {
            background: transparent;
            border: none;
            border-bottom: 2px dashed var(--accent-cyan);
            color: var(--accent-green);
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.5rem;
            font-family: 'Space Mono', monospace;
        }

        .section-title-input:focus {
            outline: none;
            border-bottom-color: var(--accent-green);
        }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            border-color: var(--accent-green);
            background: rgba(57, 255, 20, 0.05);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-item.editing {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--accent-cyan);
        }

        .subtask-item {
            margin-left: 2rem;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.3);
        }

        .checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-green);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        .checkbox:checked {
            background: var(--accent-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-primary);
            font-weight: 700;
            font-size: 0.875rem;
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .task-text {
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-text-input {
            background: var(--bg-primary);
            border: 1px solid var(--accent-cyan);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 0.875rem;
        }

        .task-text-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.2);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .task-badge {
            padding: 0.25rem 0.5rem;
            background: var(--accent-pink);
            color: var(--bg-primary);
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .task-badge.one-time {
            background: var(--accent-cyan);
        }

        .add-task-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            align-items: flex-end;
        }

        .add-task-form input {
            flex: 1;
        }

        .task-type-toggle {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-tertiary);
            padding: 0.5rem;
            border-radius: 4px;
        }

        .toggle-option {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .toggle-option.active {
            background: var(--accent-green);
            color: var(--bg-primary);
            border-color: var(--accent-green);
        }

        .toggle-option.one-time.active {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .new-section-form {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border: 2px dashed var(--border);
            border-radius: 4px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .error-message {
            background: var(--accent-pink);
            color: var(--bg-primary);
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--accent-cyan);
            font-size: 1.25rem;
        }

        .archive-container {
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
        }

        .archive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--accent-cyan);
        }

        .archive-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .date-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .date-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .date-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .date-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }

        .archive-day {
            margin-bottom: 2rem;
        }

        .archive-day-header {
            color: var(--accent-cyan);
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .archive-section {
            margin-bottom: 1.5rem;
        }

        .archive-section-title {
            color: var(--accent-green);
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .story-question {
            margin-bottom: 1.5rem;
        }

        .story-question-label {
            display: block;
            color: var(--accent-yellow);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .date-display {
                font-size: 1.5rem;
            }

            .section-header {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }

            .add-task-form {
                flex-direction: column;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-left {
                width: 100%;
            }

            .date-selector {
                width: 100%;
            }

            .date-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="cache-indicator" class="cache-indicator"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // REPLACE THESE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========================================
        // CACHE MANAGER - Reduces Supabase egress by 80-90%
        // ========================================
        const CacheManager = {
            CACHE_DURATION: 5 * 60 * 1000, // 5 minutes
            
            get(key) {
                try {
                    const cached = localStorage.getItem(`cache_${key}`);
                    const timestamp = localStorage.getItem(`cache_${key}_time`);
                    
                    if (!cached || !timestamp) return null;
                    
                    const age = Date.now() - parseInt(timestamp);
                    if (age > this.CACHE_DURATION) {
                        this.delete(key);
                        return null;
                    }
                    
                    this.showIndicator('Using cached data');
                    return JSON.parse(cached);
                } catch (e) {
                    console.error('Cache get error:', e);
                    return null;
                }
            },
            
            set(key, data) {
                try {
                    localStorage.setItem(`cache_${key}`, JSON.stringify(data));
                    localStorage.setItem(`cache_${key}_time`, Date.now().toString());
                } catch (e) {
                    console.error('Cache set error:', e);
                }
            },
            
            delete(key) {
                localStorage.removeItem(`cache_${key}`);
                localStorage.removeItem(`cache_${key}_time`);
            },
            
            invalidate(pattern) {
                // Invalidate all cache keys matching pattern
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('cache_') && key.includes(pattern)) {
                        localStorage.removeItem(key);
                    }
                });
            },
            
            showIndicator(message) {
                const indicator = document.getElementById('cache-indicator');
                if (indicator) {
                    indicator.textContent = message;
                    indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 2000);
                }
            }
        };

        // Get current date in EST timezone
        function getCurrentDateEST() {
            const now = new Date();
            const estDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            return estDate.toISOString().split('T')[0];
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sections, setSections] = useState([]);
            const [error, setError] = useState(null);
            const [currentDate, setCurrentDate] = useState(getCurrentDateEST());

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) {
                        loadSections();
                    }
                });

                // Check for new day every minute
                const dateCheckInterval = setInterval(() => {
                    const newDate = getCurrentDateEST();
                    if (newDate !== currentDate) {
                        setCurrentDate(newDate);
                        CacheManager.invalidate('tasks'); // Clear task cache on new day
                        if (user) {
                            generateDailyTasks(newDate);
                            loadSections(true); // Force refresh
                        }
                    }
                }, 60000);

                return () => {
                    authListener?.subscription?.unsubscribe();
                    clearInterval(dateCheckInterval);
                };
            }, [currentDate, user]);

            async function checkUser() {
                const { data: { session } } = await supabase.auth.getSession();
                setUser(session?.user || null);
                if (session?.user) {
                    await generateDailyTasks(currentDate);
                    await loadSections();
                }
                setLoading(false);
            }

            async function generateDailyTasks(date) {
                const user = (await supabase.auth.getUser()).data.user;
                if (!user) return;

                // Check cache first
                const cacheKey = `daily_tasks_generated_${date}`;
                if (CacheManager.get(cacheKey)) {
                    return; // Already generated today
                }

                const { data: repeatingTasks } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('is_repeating', true);

                if (!repeatingTasks || repeatingTasks.length === 0) {
                    CacheManager.set(cacheKey, true);
                    return;
                }

                const { data: existingTasks } = await supabase
                    .from('tasks')
                    .select('text, section_id')
                    .eq('user_id', user.id)
                    .eq('date', date);

                const existingTaskKeys = new Set(
                    existingTasks?.map(t => `${t.section_id}-${t.text}`) || []
                );

                const taskMap = new Map();
                repeatingTasks.forEach(task => {
                    const key = `${task.section_id}-${task.text}`;
                    if (!taskMap.has(key) || new Date(task.created_at) > new Date(taskMap.get(key).created_at)) {
                        taskMap.set(key, task);
                    }
                });

                const tasksToCreate = [];
                for (const [key, task] of taskMap) {
                    if (!existingTaskKeys.has(key)) {
                        tasksToCreate.push({
                            section_id: task.section_id,
                            user_id: user.id,
                            text: task.text,
                            completed: false,
                            date: date,
                            is_repeating: true,
                            parent_task_id: task.parent_task_id || null
                        });
                    }
                }

                if (tasksToCreate.length > 0) {
                    await supabase.from('tasks').insert(tasksToCreate);
                }

                CacheManager.set(cacheKey, true);
            }

            async function loadSections(forceRefresh = false) {
                const today = getCurrentDateEST();
                const cacheKey = `sections_tasks_${today}`;
                
                // Try cache first (unless force refresh)
                if (!forceRefresh) {
                    const cached = CacheManager.get(cacheKey);
                    if (cached) {
                        setSections(cached);
                        return;
                    }
                }
                
                CacheManager.showIndicator('Loading from database...');
                
                const { data, error } = await supabase
                    .from('sections')
                    .select('*')
                    .eq('user_id', (await supabase.auth.getUser()).data.user.id)
                    .order('order_index', { ascending: true });

                if (error) {
                    setError(error.message);
                    return;
                }

                const { data: tasksData } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('date', today)
                    .order('created_at', { ascending: true });

                const sectionsWithTasks = data.map(section => ({
                    ...section,
                    tasks: tasksData?.filter(t => t.section_id === section.id) || []
                }));

                setSections(sectionsWithTasks);
                CacheManager.set(cacheKey, sectionsWithTasks);
            }

            if (loading) {
                return <div className="loading">⚡ INITIALIZING SYSTEM...</div>;
            }

            if (!user) {
                return <AuthScreen />;
            }

            return (
                <TodoApp 
                    sections={sections} 
                    setSections={setSections}
                    loadSections={loadSections}
                    error={error}
                    setError={setError}
                    currentDate={currentDate}
                />
            );
        }

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(null);

            async function handleAuth(e) {
                e.preventDefault();
                setError(null);

                try {
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({
                            email,
                            password
                        });
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.auth.signUp({
                            email,
                            password
                        });
                        if (error) throw error;
                        alert('Check your email to confirm your account!');
                    }
                } catch (error) {
                    setError(error.message);
                }
            }

            return (
                <div className="auth-container">
                    <h2>{isLogin ? 'Login' : 'Sign Up'}</h2>
                    {error && <div className="error-message">{error}</div>}
                    <form onSubmit={handleAuth}>
                        <div className="input-group">
                            <label>Email</label>
                            <input
                                type="email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                            />
                        </div>
                        <div className="input-group">
                            <label>Password</label>
                            <input
                                type="password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                            />
                        </div>
                        <button type="submit" className="btn" style={{width: '100%', marginTop: '1rem'}}>
                            {isLogin ? 'Login' : 'Sign Up'}
                        </button>
                        <button
                            type="button"
                            className="btn btn-secondary"
                            style={{width: '100%', marginTop: '0.5rem'}}
                            onClick={() => setIsLogin(!isLogin)}
                        >
                            {isLogin ? 'Need an account?' : 'Already have an account?'}
                        </button>
                    </form>
                </div>
            );
        }

        function TodoApp({ sections, setSections, loadSections, error, setError, currentDate }) {
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');
            const [showArchive, setShowArchive] = useState(false);
            const [draggedSection, setDraggedSection] = useState(null);

            const today = new Date(currentDate + 'T12:00:00').toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'America/New_York'
            });

            async function handleSignOut() {
                await supabase.auth.signOut();
                // Clear all cache on logout
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('cache_')) {
                        localStorage.removeItem(key);
                    }
                });
            }

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                const user = (await supabase.auth.getUser()).data.user;
                const { data, error } = await supabase
                    .from('sections')
                    .insert([{
                        user_id: user.id,
                        name: newSectionName,
                        order_index: sections.length
                    }])
                    .select();

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections([...sections, { ...data[0], tasks: [] }]);
                CacheManager.invalidate('sections');
                setNewSectionName('');
                setShowNewSection(false);
            }

            async function deleteSection(sectionId) {
                if (!confirm('Delete this section and all its tasks?')) return;

                const { error } = await supabase
                    .from('sections')
                    .delete()
                    .eq('id', sectionId);

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections(sections.filter(s => s.id !== sectionId));
                CacheManager.invalidate('sections');
            }

            async function updateSectionName(sectionId, newName) {
                const { error } = await supabase
                    .from('sections')
                    .update({ name: newName })
                    .eq('id', sectionId);

                if (error) {
                    setError(error.message);
                    return;
                }

                setSections(sections.map(s => 
                    s.id === sectionId ? { ...s, name: newName } : s
                ));
                CacheManager.invalidate('sections');
            }

            async function reorderSections(newOrder) {
                setSections(newOrder);

                const updates = newOrder.map((section, index) => ({
                    id: section.id,
                    order_index: index
                }));

                for (const update of updates) {
                    await supabase
                        .from('sections')
                        .update({ order_index: update.order_index })
                        .eq('id', update.id);
                }
                
                CacheManager.invalidate('sections');
            }

            function handleDragStart(e, index) {
                setDraggedSection(index);
                e.dataTransfer.effectAllowed = 'move';
            }

            function handleDragOver(e, index) {
                e.preventDefault();
                if (draggedSection === null || draggedSection === index) return;
                
                const newSections = [...sections];
                const draggedItem = newSections[draggedSection];
                newSections.splice(draggedSection, 1);
                newSections.splice(index, 0, draggedItem);
                
                setDraggedSection(index);
                setSections(newSections);
            }

            function handleDragEnd() {
                if (draggedSection !== null) {
                    reorderSections(sections);
                }
                setDraggedSection(null);
            }

            return (
                <div className="container">
                    <div className="header">
                        <div className="date-display">{today}</div>
                        <div className="subtitle">Daily Task Protocol</div>
                    </div>

                    <div className="toolbar">
                        <div className="toolbar-left">
                            <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                                + New Section
                            </button>
                            <button 
                                className={`btn ${showArchive ? '' : 'btn-secondary'}`}
                                onClick={() => setShowArchive(!showArchive)}
                            >
                                {showArchive ? 'Hide Archive' : 'View Archive'}
                            </button>
                        </div>
                        <button className="btn btn-secondary" onClick={handleSignOut}>
                            Sign Out
                        </button>
                    </div>

                    {error && <div className="error-message">{error}</div>}

                    {showArchive && <Archive />}

                    {showNewSection && (
                        <form className="new-section-form" onSubmit={addSection}>
                            <div className="input-group">
                                <label>Section Name</label>
                                <input
                                    type="text"
                                    value={newSectionName}
                                    onChange={(e) => setNewSectionName(e.target.value)}
                                    placeholder="e.g., Work, Personal, Health"
                                    autoFocus
                                />
                            </div>
                            <div style={{display: 'flex', gap: '0.5rem', marginTop: '1rem'}}>
                                <button type="submit" className="btn">Create</button>
                                <button 
                                    type="button" 
                                    className="btn btn-secondary"
                                    onClick={() => setShowNewSection(false)}
                                >
                                    Cancel
                                </button>
                            </div>
                        </form>
                    )}

                    {sections.filter(s => s.name !== 'Stories').map((section, index) => (
                        <div
                            key={section.id}
                            draggable
                            onDragStart={(e) => handleDragStart(e, index)}
                            onDragOver={(e) => handleDragOver(e, index)}
                            onDragEnd={handleDragEnd}
                            className={draggedSection === index ? 'section dragging' : 'section'}
                            style={{animationDelay: `${index * 0.1}s`}}
                        >
                            <Section
                                section={section}
                                deleteSection={deleteSection}
                                updateSectionName={updateSectionName}
                                loadSections={loadSections}
                            />
                        </div>
                    ))}

                    <StoriesSection />
                </div>
            );
        }

        function Section({ section, deleteSection, updateSectionName, loadSections }) {
            const [tasks, setTasks] = useState(section.tasks || []);
            const [newTaskText, setNewTaskText] = useState('');
            const [taskType, setTaskType] = useState('daily');
            const [isEditingName, setIsEditingName] = useState(false);
            const [editedName, setEditedName] = useState(section.name);
            const [editingTaskId, setEditingTaskId] = useState(null);
            const [editedTaskText, setEditedTaskText] = useState('');

            useEffect(() => {
                setTasks(section.tasks || []);
            }, [section.tasks]);

            async function addTask(e) {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;

                const { data, error } = await supabase
                    .from('tasks')
                    .insert([{
                        section_id: section.id,
                        user_id: user.id,
                        text: newTaskText,
                        completed: false,
                        date: today,
                        is_repeating: taskType === 'daily',
                        parent_task_id: null
                    }])
                    .select();

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks([...tasks, data[0]]);
                CacheManager.invalidate('tasks');
                setNewTaskText('');
            }

            async function addSubtask(parentTaskId, subtaskText) {
                if (!subtaskText.trim()) return;

                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;
                const parentTask = tasks.find(t => t.id === parentTaskId);

                const { data, error } = await supabase
                    .from('tasks')
                    .insert([{
                        section_id: section.id,
                        user_id: user.id,
                        text: subtaskText,
                        completed: false,
                        date: today,
                        is_repeating: parentTask?.is_repeating || false,
                        parent_task_id: parentTaskId
                    }])
                    .select();

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks([...tasks, data[0]]);
                CacheManager.invalidate('tasks');
            }

            async function toggleTask(taskId, completed) {
                const { error } = await supabase
                    .from('tasks')
                    .update({ completed })
                    .eq('id', taskId);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.map(t => t.id === taskId ? { ...t, completed } : t));
                CacheManager.invalidate('tasks');
            }

            async function toggleTaskType(taskId, currentIsRepeating) {
                const newIsRepeating = !currentIsRepeating;
                
                const { error } = await supabase
                    .from('tasks')
                    .update({ is_repeating: newIsRepeating })
                    .eq('id', taskId);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.map(t => t.id === taskId ? { ...t, is_repeating: newIsRepeating } : t));
                CacheManager.invalidate('tasks');
            }

            async function updateTaskText(taskId, newText) {
                if (!newText.trim()) {
                    setEditingTaskId(null);
                    return;
                }

                const { error } = await supabase
                    .from('tasks')
                    .update({ text: newText })
                    .eq('id', taskId);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.map(t => t.id === taskId ? { ...t, text: newText } : t));
                CacheManager.invalidate('tasks');
                setEditingTaskId(null);
            }

            async function deleteTask(taskId) {
                const { error } = await supabase
                    .from('tasks')
                    .delete()
                    .or(`id.eq.${taskId},parent_task_id.eq.${taskId}`);

                if (error) {
                    alert(error.message);
                    return;
                }

                setTasks(tasks.filter(t => t.id !== taskId && t.parent_task_id !== taskId));
                CacheManager.invalidate('tasks');
            }

            async function saveNameEdit() {
                if (editedName.trim() && editedName !== section.name) {
                    await updateSectionName(section.id, editedName);
                }
                setIsEditingName(false);
            }

            function startEditingTask(task) {
                setEditingTaskId(task.id);
                setEditedTaskText(task.text);
            }

            const parentTasks = tasks.filter(t => !t.parent_task_id);
            const getSubtasks = (parentId) => tasks.filter(t => t.parent_task_id === parentId);

            return (
                <>
                    <div className="section-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', flex: 1 }}>
                            <span className="drag-handle" title="Drag to reorder">⋮⋮</span>
                            {isEditingName ? (
                                <input
                                    type="text"
                                    className="section-title-input"
                                    value={editedName}
                                    onChange={(e) => setEditedName(e.target.value)}
                                    onBlur={saveNameEdit}
                                    onKeyPress={(e) => {
                                        if (e.key === 'Enter') {
                                            saveNameEdit();
                                        }
                                    }}
                                    autoFocus
                                />
                            ) : (
                                <h2 
                                    className="section-title"
                                    onClick={() => setIsEditingName(true)}
                                    style={{ cursor: 'pointer' }}
                                    title="Click to edit name"
                                >
                                    {section.name}
                                </h2>
                            )}
                        </div>
                        <div className="section-actions">
                            <button 
                                className="icon-btn"
                                onClick={() => setIsEditingName(!isEditingName)}
                                title="Edit name"
                            >
                                ✏️
                            </button>
                            <button 
                                className="icon-btn"
                                onClick={() => deleteSection(section.id)}
                                title="Delete section"
                            >
                                🗑️
                            </button>
                        </div>
                    </div>

                    <ul className="task-list">
                        {parentTasks.map(task => (
                            <React.Fragment key={task.id}>
                                <TaskItem
                                    task={task}
                                    editingTaskId={editingTaskId}
                                    editedTaskText={editedTaskText}
                                    setEditedTaskText={setEditedTaskText}
                                    toggleTask={toggleTask}
                                    toggleTaskType={toggleTaskType}
                                    startEditingTask={startEditingTask}
                                    updateTaskText={updateTaskText}
                                    deleteTask={deleteTask}
                                    addSubtask={addSubtask}
                                />
                                {getSubtasks(task.id).map(subtask => (
                                    <TaskItem
                                        key={subtask.id}
                                        task={subtask}
                                        isSubtask={true}
                                        editingTaskId={editingTaskId}
                                        editedTaskText={editedTaskText}
                                        setEditedTaskText={setEditedTaskText}
                                        toggleTask={toggleTask}
                                        toggleTaskType={toggleTaskType}
                                        startEditingTask={startEditingTask}
                                        updateTaskText={updateTaskText}
                                        deleteTask={deleteTask}
                                    />
                                ))}
                            </React.Fragment>
                        ))}
                    </ul>

                    <form className="add-task-form" onSubmit={addTask}>
                        <input
                            type="text"
                            value={newTaskText}
                            onChange={(e) => setNewTaskText(e.target.value)}
                            placeholder="Add new task..."
                        />
                        <div className="task-type-toggle">
                            <button
                                type="button"
                                className={`toggle-option ${taskType === 'daily' ? 'active' : ''}`}
                                onClick={() => setTaskType('daily')}
                            >
                                Daily
                            </button>
                            <button
                                type="button"
                                className={`toggle-option one-time ${taskType === 'one-time' ? 'active' : ''}`}
                                onClick={() => setTaskType('one-time')}
                            >
                                One-Time
                            </button>
                        </div>
                        <button type="submit" className="btn">Add</button>
                    </form>
                </>
            );
        }

        function TaskItem({ 
            task, 
            isSubtask = false, 
            editingTaskId, 
            editedTaskText, 
            setEditedTaskText,
            toggleTask, 
            toggleTaskType, 
            startEditingTask, 
            updateTaskText, 
            deleteTask,
            addSubtask 
        }) {
            const [showSubtaskInput, setShowSubtaskInput] = useState(false);
            const [subtaskText, setSubtaskText] = useState('');
            const inputRef = useRef(null);

            function handleKeyDown(e) {
                if (e.key === 'Tab' && !isSubtask) {
                    e.preventDefault();
                    setShowSubtaskInput(true);
                    setTimeout(() => inputRef.current?.focus(), 0);
                }
                if (e.key === 'Enter' && editingTaskId === task.id) {
                    updateTaskText(task.id, editedTaskText);
                }
            }

            function handleSubtaskKeyDown(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (subtaskText.trim()) {
                        addSubtask(task.id, subtaskText);
                        setSubtaskText('');
                    }
                }
                if (e.key === 'Escape') {
                    setShowSubtaskInput(false);
                    setSubtaskText('');
                }
            }

            return (
                <>
                    <li className={`task-item ${task.completed ? 'completed' : ''} ${isSubtask ? 'subtask-item' : ''} ${editingTaskId === task.id ? 'editing' : ''}`}>
                        <input
                            type="checkbox"
                            className="checkbox"
                            checked={task.completed}
                            onChange={(e) => toggleTask(task.id, e.target.checked)}
                        />
                        <div className="task-content">
                            {editingTaskId === task.id ? (
                                <input
                                    type="text"
                                    className="task-text-input"
                                    value={editedTaskText}
                                    onChange={(e) => setEditedTaskText(e.target.value)}
                                    onBlur={() => updateTaskText(task.id, editedTaskText)}
                                    onKeyDown={handleKeyDown}
                                    autoFocus
                                />
                            ) : (
                                <span 
                                    className="task-text"
                                    onClick={() => startEditingTask(task)}
                                    onKeyDown={handleKeyDown}
                                    tabIndex={0}
                                    style={{ cursor: 'text' }}
                                    title="Click to edit or press Tab to add subtask"
                                >
                                    {task.text}
                                </span>
                            )}
                        </div>
                        <div className="task-actions">
                            <span 
                                className={`task-badge ${task.is_repeating ? '' : 'one-time'}`}
                                onClick={() => toggleTaskType(task.id, task.is_repeating)}
                                style={{ cursor: 'pointer' }}
                                title="Click to toggle"
                            >
                                {task.is_repeating ? 'DAILY' : 'ONE-TIME'}
                            </span>
                            <button 
                                className="icon-btn"
                                onClick={() => deleteTask(task.id)}
                            >
                                ✕
                            </button>
                        </div>
                    </li>
                    {showSubtaskInput && !isSubtask && (
                        <div style={{marginLeft: '2rem', marginTop: '0.5rem'}}>
                            <input
                                ref={inputRef}
                                type="text"
                                value={subtaskText}
                                onChange={(e) => setSubtaskText(e.target.value)}
                                onKeyDown={handleSubtaskKeyDown}
                                onBlur={() => {
                                    if (subtaskText.trim()) {
                                        addSubtask(task.id, subtaskText);
                                    }
                                    setShowSubtaskInput(false);
                                    setSubtaskText('');
                                }}
                                placeholder="Add subtask... (press Enter)"
                                style={{
                                    width: '100%',
                                    padding: '0.5rem',
                                    background: 'var(--bg-primary)',
                                    border: '1px solid var(--accent-green)',
                                    borderRadius: '4px',
                                    color: 'var(--text-primary)',
                                    fontFamily: 'Space Mono, monospace',
                                    fontSize: '0.875rem'
                                }}
                            />
                        </div>
                    )}
                </>
            );
        }

        function StoriesSection() {
            const [stories, setStories] = useState({
                different: '',
                tension: '',
                detail: ''
            });
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                loadStories();
            }, []);

            async function loadStories() {
                const today = getCurrentDateEST();
                const cacheKey = `stories_${today}`;
                
                // Try cache first
                const cached = CacheManager.get(cacheKey);
                if (cached) {
                    setStories(cached);
                    return;
                }

                const user = (await supabase.auth.getUser()).data.user;

                const { data, error } = await supabase
                    .from('stories')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('date', today)
                    .single();

                const storyData = {
                    different: data?.different || '',
                    tension: data?.tension || '',
                    detail: data?.detail || ''
                };

                setStories(storyData);
                CacheManager.set(cacheKey, storyData);
            }

            async function saveStories() {
                setIsSaving(true);
                const today = getCurrentDateEST();
                const user = (await supabase.auth.getUser()).data.user;

                const { error } = await supabase
                    .from('stories')
                    .upsert({
                        user_id: user.id,
                        date: today,
                        different: stories.different,
                        tension: stories.tension,
                        detail: stories.detail
                    }, {
                        onConflict: 'user_id,date'
                    });

                if (error) {
                    alert(error.message);
                } else {
                    CacheManager.invalidate('stories');
                    CacheManager.showIndicator('Stories saved!');
                }
                setIsSaving(false);
            }

            return (
                <div className="section stories-section">
                    <div className="section-header">
                        <h2 className="section-title">📖 Stories</h2>
                    </div>

                    <div className="story-question">
                        <label className="story-question-label">
                            What was different, unexpected, or slightly off today?
                        </label>
                        <textarea
                            value={stories.different}
                            onChange={(e) => setStories({ ...stories, different: e.target.value })}
                            placeholder="Write your thoughts here..."
                        />
                    </div>

                    <div className="story-question">
                        <label className="story-question-label">
                            What moment made me feel something or had tension (awkward, funny, annoying)?
                        </label>
                        <textarea
                            value={stories.tension}
                            onChange={(e) => setStories({ ...stories, tension: e.target.value })}
                            placeholder="Write your thoughts here..."
                        />
                    </div>

                    <div className="story-question">
                        <label className="story-question-label">
                            What's one specific detail or moment I will forget by tomorrow but would be fun to retell?
                        </label>
                        <textarea
                            value={stories.detail}
                            onChange={(e) => setStories({ ...stories, detail: e.target.value })}
                            placeholder="Write your thoughts here..."
                        />
                    </div>

                    <button 
                        className="btn" 
                        onClick={saveStories}
                        disabled={isSaving}
                    >
                        {isSaving ? 'Saving...' : 'Save Stories'}
                    </button>
                </div>
            );
        }

        function Archive() {
            const [archiveDates, setArchiveDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [archiveData, setArchiveData] = useState(null);

            useEffect(() => {
                loadArchiveDates();
            }, []);

            async function loadArchiveDates() {
                const cacheKey = 'archive_dates';
                
                // Try cache first
                const cached = CacheManager.get(cacheKey);
                if (cached) {
                    setArchiveDates(cached);
                    if (cached.length > 0) {
                        loadArchiveForDate(cached[0]);
                    }
                    return;
                }

                const user = (await supabase.auth.getUser()).data.user;
                
                // Only get dates, not full data (much smaller payload)
                const { data: taskDates } = await supabase
                    .from('tasks')
                    .select('date')
                    .eq('user_id', user.id)
                    .order('date', { ascending: false });

                const { data: storyDates } = await supabase
                    .from('stories')
                    .select('date')
                    .eq('user_id', user.id)
                    .order('date', { ascending: false });

                const allDates = new Set([
                    ...(taskDates?.map(t => t.date) || []),
                    ...(storyDates?.map(s => s.date) || [])
                ]);

                const dates = Array.from(allDates).sort((a, b) => b.localeCompare(a));
                const recentDates = dates.slice(0, 7); // Reduced from 30 to 7 days
                
                setArchiveDates(recentDates);
                CacheManager.set(cacheKey, recentDates);
                
                if (recentDates.length > 0) {
                    loadArchiveForDate(recentDates[0]);
                }
            }

            async function loadArchiveForDate(date) {
                setSelectedDate(date);
                
                const cacheKey = `archive_${date}`;
                
                // Try cache first
                const cached = CacheManager.get(cacheKey);
                if (cached) {
                    setArchiveData(cached);
                    return;
                }

                CacheManager.showIndicator('Loading archive...');
                
                const user = (await supabase.auth.getUser()).data.user;

                const { data: tasks } = await supabase
                    .from('tasks')
                    .select('*, sections(name)')
                    .eq('user_id', user.id)
                    .eq('date', date);

                const { data: stories } = await supabase
                    .from('stories')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('date', date)
                    .single();

                const tasksBySection = {};
                tasks?.forEach(task => {
                    const sectionName = task.sections?.name || 'Unknown';
                    if (!tasksBySection[sectionName]) {
                        tasksBySection[sectionName] = [];
                    }
                    tasksBySection[sectionName].push(task);
                });

                const archiveContent = { tasks: tasksBySection, stories };
                setArchiveData(archiveContent);
                CacheManager.set(cacheKey, archiveContent);
            }

            return (
                <div className="archive-container">
                    <div className="archive-header">
                        <h2 className="archive-title">📚 Archive (Last 7 Days)</h2>
                    </div>

                    <div className="date-selector">
                        {archiveDates.map(date => (
                            <button
                                key={date}
                                className={`date-btn ${selectedDate === date ? 'active' : ''}`}
                                onClick={() => loadArchiveForDate(date)}
                            >
                                {new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                                    month: 'short',
                                    day: 'numeric'
                                })}
                            </button>
                        ))}
                    </div>

                    {archiveData && selectedDate && (
                        <div className="archive-day">
                            <h3 className="archive-day-header">
                                {new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', {
                                    weekday: 'long',
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric'
                                })}
                            </h3>

                            {Object.keys(archiveData.tasks).length > 0 && (
                                <div>
                                    {Object.entries(archiveData.tasks).map(([sectionName, tasks]) => {
                                        const parentTasks = tasks.filter(t => !t.parent_task_id);
                                        const getSubtasks = (parentId) => tasks.filter(t => t.parent_task_id === parentId);
                                        
                                        return (
                                            <div key={sectionName} className="archive-section">
                                                <h4 className="archive-section-title">{sectionName}</h4>
                                                <ul className="task-list">
                                                    {parentTasks.map(task => (
                                                        <React.Fragment key={task.id}>
                                                            <li className={`task-item ${task.completed ? 'completed' : ''}`}>
                                                                <input
                                                                    type="checkbox"
                                                                    className="checkbox"
                                                                    checked={task.completed}
                                                                    disabled
                                                                />
                                                                <span className="task-text">{task.text}</span>
                                                                {task.is_repeating && (
                                                                    <span className="task-badge">DAILY</span>
                                                                )}
                                                            </li>
                                                            {getSubtasks(task.id).map(subtask => (
                                                                <li key={subtask.id} className={`task-item subtask-item ${subtask.completed ? 'completed' : ''}`}>
                                                                    <input
                                                                        type="checkbox"
                                                                        className="checkbox"
                                                                        checked={subtask.completed}
                                                                        disabled
                                                                    />
                                                                    <span className="task-text">{subtask.text}</span>
                                                                </li>
                                                            ))}
                                                        </React.Fragment>
                                                    ))}
                                                </ul>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {archiveData.stories && (
                                <div className="archive-section">
                                    <h4 className="archive-section-title" style={{color: 'var(--accent-yellow)'}}>
                                        📖 Stories
                                    </h4>
                                    {archiveData.stories.different && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--text-secondary)', fontSize: '0.75rem', marginBottom: '0.25rem'}}>
                                                What was different, unexpected, or slightly off?
                                            </div>
                                            <div style={{color: 'var(--text-primary)'}}>{archiveData.stories.different}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.tension && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--text-secondary)', fontSize: '0.75rem', marginBottom: '0.25rem'}}>
                                                What moment had tension?
                                            </div>
                                            <div style={{color: 'var(--text-primary)'}}>{archiveData.stories.tension}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.detail && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--text-secondary)', fontSize: '0.75rem', marginBottom: '0.25rem'}}>
                                                What specific detail would be fun to retell?
                                            </div>
                                            <div style={{color: 'var(--text-primary)'}}>{archiveData.stories.detail}</div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
