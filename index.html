<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task System</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --panel: #1a1a1a;
      --panel2: #2d2d2d;
      --line: #3a3a3a;
      --text: #e8e8e8;
      --muted: #777;
      --lime: #d4ff00;
      --cyan: #00fff5;
      --red: #ff6b6b;
      --gold: #ffd700;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 100vh;
    }

    #root {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .title {
      color: var(--lime);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .tag {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      margin-bottom: 18px;
      text-align: center;
      text-transform: uppercase;
    }

    .panel {
      background: var(--panel);
      border-left: 4px solid var(--lime);
      margin-bottom: 14px;
      padding: 14px;
    }

    .panel.error {
      border-left-color: var(--red);
      color: #ffb5b5;
    }

    .panel.gold {
      border-left-color: var(--gold);
    }

    .panel.cyan {
      border-left-color: var(--cyan);
    }

    .bar {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      text-transform: uppercase;
    }

    .btn.gray {
      border-color: var(--muted);
      color: var(--muted);
    }

    .btn.cyan {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn:hover {
      background: rgba(212,255,0,.1);
    }

    .btn:disabled {
      cursor: default;
      opacity: .35;
    }

    .btn.cyan:hover {
      background: rgba(0,255,245,.08);
    }

    .in {
      background: var(--panel2);
      border: 1px solid var(--muted);
      color: var(--text);
      flex: 1;
      font-family: inherit;
      min-width: 180px;
      padding: 10px;
      width: 100%;
    }

    .in:focus {
      border-color: var(--lime);
      outline: none;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .section-head {
      align-items: center;
      border-bottom: 1px solid var(--panel2);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
    }

    .section-title {
      color: var(--lime);
      font-weight: 800;
      text-transform: uppercase;
    }

    .tasks {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    .task {
      align-items: flex-start;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .task.sub {
      border-left: 2px solid var(--cyan);
      margin-left: 20px;
    }

    .task.done {
      opacity: .55;
    }

    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-text {
      cursor: pointer;
      word-break: break-word;
    }

    .meta {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: 6px;
      margin-left: auto;
    }

    .icon {
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      height: 30px;
      line-height: 1;
      width: 30px;
    }

    .icon:hover {
      border-color: var(--lime);
      color: var(--lime);
    }

    .drag-handle {
      align-items: center;
      background: transparent;
      border: none;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 3px;
      justify-content: center;
      padding: 4px 6px;
    }

    .drag-handle span {
      background: var(--muted);
      border-radius: 1px;
      display: block;
      height: 2px;
      width: 14px;
    }

    .drag-handle:hover span {
      background: var(--lime);
    }

    .task.dragging {
      opacity: 0.35;
    }

    .task.drag-over-top {
      border-top: 2px solid var(--lime);
    }

    .task.drag-over-bottom {
      border-bottom: 2px solid var(--lime);
    }

    .badge {
      border: 1px solid;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.type-toggle {
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .badge.type-toggle:hover {
      background: rgba(212,255,0,.1);
    }

    .check {
      accent-color: var(--lime);
      cursor: pointer;
      flex-shrink: 0;
      height: 18px;
      margin-top: 2px;
      width: 18px;
    }

    .b1 { border-color: var(--lime); color: var(--lime); }
    .b2 { border-color: var(--cyan); color: var(--cyan); }
    .b3 { border-color: var(--gold); color: var(--gold); }

    .auth {
      background: var(--panel);
      border: 1px solid var(--panel2);
      margin: 40px auto;
      max-width: 460px;
      padding: 18px;
    }

    .loading {
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }

    .subtask-form {
      margin: 8px 0 8px 24px;
    }

    .history-day {
      margin-bottom: 14px;
    }

    .history-date {
      color: var(--gold);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .learning-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .learn-item {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
    }

    @media (max-width: 700px) {
      #root { padding: 14px 8px; }

      .task {
        align-items: flex-start;
        min-height: 56px;
        padding: 10px 8px;
      }

      .task > div[style] {
        min-width: 0;
      }

      .task-text {
        display: block;
        line-height: 1.35;
        white-space: normal;
      }

      .meta {
        flex-wrap: nowrap;
        gap: 4px;
      }

      .icon {
        border-radius: 5px;
        font-size: 13px;
        height: 28px;
        width: 28px;
      }

      .badge {
        display: inline-block;
        font-size: 9px;
        padding: 2px 5px;
      }

      .task.sub {
        margin-left: 8px;
      }

      .subtask-form {
        margin-left: 10px;
      }

      .learning-grid {
        grid-template-columns: 1fr;
      }
    }

    .memory-header {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 10px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .memory-timer {
      color: var(--lime);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: .05em;
    }

    .memory-setup {
      max-width: 560px;
      margin: 0 auto;
    }

    .memory-duration-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .memory-progress-bar {
      background: var(--panel2);
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
      width: 100%;
    }

    .memory-progress-fill {
      background: var(--cyan);
      border-radius: 2px;
      height: 100%;
      transition: width .9s linear;
    }

    .memory-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 4px solid var(--cyan);
      border-radius: 4px;
      padding: 14px;
    }

    .memory-card-name {
      color: var(--cyan);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .04em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .memory-card-face {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .memory-card-detail {
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
    }

    .memory-digits-display {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .memory-digit-char {
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--lime);
      display: inline-block;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      min-width: 2rem;
      padding: 6px 4px;
      text-align: center;
    }

    .memory-choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .memory-choice {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 10px 12px;
      text-align: left;
    }

    .memory-choice:hover {
      border-color: var(--muted);
    }

    .memory-choice.selected {
      background: rgba(0,255,245,.08);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .memory-tip-box {
      background: rgba(255,215,0,.07);
      border-left: 3px solid var(--gold);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
      padding: 8px 10px;
    }

    .memory-stat-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr 1fr;
      text-align: center;
    }

    .memory-stat-value {
      font-size: 2rem;
      font-weight: 800;
    }

    .memory-stat-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

    const memoryStorage = (() => {
      const m = {};
      return {
        getItem: (k) => (k in m ? m[k] : null),
        setItem: (k, v) => { m[k] = String(v); },
        removeItem: (k) => { delete m[k]; }

    function getSafeStorage() {
      try {
        const key = "__ls_test__";
        window.localStorage.setItem(key, "1");
        window.localStorage.removeItem(key);
        return window.localStorage;
      } catch {
        return memoryStorage;
      }
    }

    const safeStorage = getSafeStorage();

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true,
        storage: safeStorage
      }

    function nyDateFrom(baseDate) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(baseDate);

      const byType = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${byType.year}-${byType.month}-${byType.day}`;
    }

    function getCurrentDate() {
      return nyDateFrom(new Date());
    }

    function getDateDaysAgo(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return nyDateFrom(d);
    }

    const cache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_cache_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_cache_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_cache_${uid}`); } catch {}
      }
    };

    const historyCache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_history_v3_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_history_v3_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_history_v3_${uid}`); } catch {}
      }
    };

    const learningCache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_learning_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_learning_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_learning_${uid}`); } catch {}
      }
    };

    function pickRandom(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    const poolCache = {
      get() {
        try {
          const raw = safeStorage.getItem("todo_pools");
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (Date.now() - parsed.ts > 7 * 24 * 60 * 60 * 1000) return null;
          return parsed.payload;
        } catch { return null; }
      },
      set(payload) {
        try {
          safeStorage.setItem("todo_pools", JSON.stringify({ ts: Date.now(), payload }));
        } catch {}
      }
    };

    async function fetchPools() {
      const cached = poolCache.get();
      if (cached) return cached;

      const [idiomsRes, vocabRes] = await Promise.all([
        supabase.from("idiom_pool").select("phrase,meaning"),
        supabase.from("vocab_pool").select("word,pos,definition")
      ]);

      if (idiomsRes.error) throw idiomsRes.error;
      if (vocabRes.error) throw vocabRes.error;

      const payload = { idioms: idiomsRes.data || [], vocab: vocabRes.data || [] };
      poolCache.set(payload);
      return payload;
    }

    const NAME_POOL = [

    const NUMBER_TIPS = [
      "Chunking: group digits into pairs or triplets (e.g. 47·291·836). Your brain handles chunks far better than lone digits.",
      "Story method: assign a vivid image to each chunk. 47 = a person running, 29 = jumping a fence — link them into one scene.",
      "Rhythm and beat: say the number aloud 3 times with a specific rhythm. Music and rhythm encode to long-term memory faster.",
      "Familiar anchors: do any chunks match ages, years, or addresses you already know? Use that existing memory as a hook.",
      "Journey method: mentally walk through a room and place each chunk at a specific object in sequence.",
    ];

    const NAME_TIPS = [
      "Face anchor: pick one striking physical feature and mentally attach the name to it — the more absurd the image, the stronger it sticks.",
      "Name substitution: turn the name into a vivid concrete word (Marcus → march, Priya → prayer) and picture it on their face.",
      "Detail story: build one vivid sentence linking name, face, and detail into a single memorable scene.",
      "3-repetition rule: say the name silently 3 times while focusing on their face description. Brief spaced repetition encodes names fast.",
      "Celebrity swap: think of a famous person with the same first name and imagine them with this person's face and detail.",

    function MemoryTrainingPage({ onBack }) {
      const [phase, setPhase] = useState('setup');
      const [durationMins, setDurationMins] = useState(5);
      const [timeLeft, setTimeLeft] = useState(0);
      const [studyTimeLeft, setStudyTimeLeft] = useState(0);
      const [studyTotal, setStudyTotal] = useState(1);
      const [level, setLevel] = useState(1);
      const [recentScores, setRecentScores] = useState([]);
      const [exercise, setExercise] = useState(null);
      const [numberInput, setNumberInput] = useState('');
      const [choiceAnswers, setChoiceAnswers] = useState({});
      const [feedbackData, setFeedbackData] = useState(null);
      const [stats, setStats] = useState({ correct: 0, total: 0, count: 0 });
      const nextLevelRef = useRef(1);
      const phaseRef = useRef('setup');

      useEffect(() => { phaseRef.current = phase; }, [phase]);

      useEffect(() => {
        if (phase === 'setup' || phase === 'done') return;
        const id = setInterval(() => {
          setTimeLeft(t => Math.max(0, t - 1));
          if (phaseRef.current === 'study') setStudyTimeLeft(t => Math.max(0, t - 1));
        }, 1000);
        return () => clearInterval(id);
      }, [phase]);

      useEffect(() => {
        if (timeLeft === 0 && phase !== 'setup' && phase !== 'done') setPhase('done');
      }, [timeLeft]);

      useEffect(() => {
        if (studyTimeLeft === 0 && phase === 'study' && exercise) setPhase('quiz');
      }, [studyTimeLeft]);

      function buildExercise(lvl) {
        const useNumbers = Math.random() < 0.5;
        if (useNumbers) {
          const len = Math.min(3 + lvl, 10);
          const digits = Array.from({ length: len }, () => Math.floor(Math.random() * 10)).join('');
          return { type: 'numbers', digits, studyTime: Math.max(5, Math.ceil(len * 1.8)) };
        }
        const count = lvl <= 2 ? 2 : lvl <= 4 ? 3 : 4;
        const pool = [...NAME_POOL].sort(() => Math.random() - 0.5);
        const shown = pool.slice(0, count);
        const distractors = pool.slice(count);
        const questions = shown.map((person, i) => {
          if (i % 2 === 0) {
            const wrongs = distractors.slice(i * 3, i * 3 + 3).map(p => p.name);
            const choices = [...wrongs, person.name].sort(() => Math.random() - 0.5);
            return { id: `q${i}`, kind: 'face-to-name', prompt: person.face, answer: person.name, choices };
          }
          const wrongs = distractors.slice(i * 3, i * 3 + 3).map(p => p.detail);
          const choices = [...wrongs, person.detail].sort(() => Math.random() - 0.5);
          return { id: `q${i}`, kind: 'name-to-detail', prompt: person.name, answer: person.detail, choices };
        });
        return { type: 'names', persons: shown, studyTime: Math.max(8, count * 6), questions };
      }

      function startSession() {
        const total = durationMins * 60;
        setTimeLeft(total);
        setLevel(1);
        nextLevelRef.current = 1;
        setRecentScores([]);
        setStats({ correct: 0, total: 0, count: 0 });
        launchExercise(1);
      }

      function launchExercise(lvl) {
        const ex = buildExercise(lvl);
        setExercise(ex);
        setNumberInput('');
        setChoiceAnswers({});
        setFeedbackData(null);
        setStudyTimeLeft(ex.studyTime);
        setStudyTotal(ex.studyTime);
        setPhase('study');
      }

      function submitAnswers() {
        let results;
        if (exercise.type === 'numbers') {
          const given = numberInput.trim();
          const correct = given === exercise.digits;
          let matched = 0;
          for (let i = 0; i < Math.min(exercise.digits.length, given.length); i++) {
            if (exercise.digits[i] === given[i]) matched++;
          }
          const partialRatio = correct ? 1 : matched / exercise.digits.length;
          results = [{ kind: 'numbers', digits: exercise.digits, given, correct, partialRatio, matched, tip: NUMBER_TIPS[Math.floor(Math.random() * NUMBER_TIPS.length)] }];
        } else {
          results = exercise.questions.map(q => {
            const given = choiceAnswers[q.id] || '';
            const correct = given === q.answer;
            return { kind: q.kind, prompt: q.prompt, given, answer: q.answer, correct, tip: NAME_TIPS[Math.floor(Math.random() * NAME_TIPS.length)] };
          });
        }

        const numCorrect = results.filter(r => r.correct).length;
        const ratio = numCorrect / results.length;
        setStats(prev => ({ correct: prev.correct + numCorrect, total: prev.total + results.length, count: prev.count + 1 }));

        const newScores = [...recentScores.slice(-4), ratio];
        setRecentScores(newScores);
        let newLevel = level;
        if (newScores.length >= 2) {
          const avg = newScores.reduce((s, v) => s + v, 0) / newScores.length;
          if (avg >= 0.8 && level < 8) newLevel = level + 1;
          else if (avg <= 0.35 && level > 1) newLevel = level - 1;
        }
        setLevel(newLevel);
        nextLevelRef.current = newLevel;
        setFeedbackData(results);
        setPhase('feedback');
      }

      function handleNext() {
        if (timeLeft <= 5) { setPhase('done'); return; }
        launchExercise(nextLevelRef.current);
      }

      function formatTime(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return `${m}:${String(s).padStart(2, '0')}`;
      }

      if (phase === 'setup') return (
        <div>
          <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
          <div className="memory-setup">
            <h1 className="title" style={{ fontSize: 'clamp(1.2rem,3vw,2rem)', marginBottom: '8px' }}>Memory Training</h1>
            <div className="tag" style={{ marginBottom: '24px' }}>Build your encoding and recall abilities</div>
            <div className="panel">
              <div className="section-head"><div className="section-title">Session Duration</div></div>
              <div className="memory-duration-row">
                {[2, 5, 10].map(m => (
                  <button key={m} className={`btn ${durationMins === m ? '' : 'gray'}`} onClick={() => setDurationMins(m)}>{m} min</button>
                ))}
                <input type="number" className="in" style={{ width: '80px', flex: 'none' }} min="1" max="60" value={durationMins}
                  onChange={e => setDurationMins(Math.max(1, Math.min(60, Number(e.target.value))))} />
              </div>
            </div>
            <div className="panel">
              <div className="section-head"><div className="section-title">What You'll Practice</div></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', color: 'var(--muted)', fontSize: '13px', lineHeight: '1.6' }}>
                <div><span style={{ color: 'var(--lime)' }}>■</span> <strong style={{ color: 'var(--text)' }}>Number Strings</strong> — Memorize digit sequences, then recall them exactly</div>
                <div><span style={{ color: 'var(--cyan)' }}>■</span> <strong style={{ color: 'var(--text)' }}>Names & Details</strong> — Study people with face descriptions and personal details, then answer questions</div>
                <div style={{ marginTop: '4px' }}>Difficulty adapts to your performance — harder when you're succeeding, easier when you're struggling.</div>
              </div>
            </div>
            <button className="btn" style={{ width: '100%', padding: '14px', fontSize: '14px', marginTop: '8px' }} onClick={startSession}>Start Session →</button>
          </div>
        </div>
      );

      if (phase === 'done') {
        const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
        return (
          <div>
            <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
            <div className="memory-setup">
              <h1 className="title" style={{ fontSize: 'clamp(1.2rem,3vw,2rem)', marginBottom: '8px' }}>Session Complete</h1>
              <div className="tag" style={{ marginBottom: '24px' }}>Here's how you did</div>
              <div className="panel">
                <div className="memory-stat-grid">
                  <div><div className="memory-stat-value" style={{ color: 'var(--lime)' }}>{accuracy}%</div><div className="memory-stat-label">Accuracy</div></div>
                  <div><div className="memory-stat-value" style={{ color: 'var(--cyan)' }}>{stats.correct}/{stats.total}</div><div className="memory-stat-label">Questions</div></div>
                  <div><div className="memory-stat-value" style={{ color: 'var(--gold)' }}>{stats.count}</div><div className="memory-stat-label">Exercises</div></div>
                </div>
              </div>
              <div className="panel" style={{ color: 'var(--muted)', fontSize: '13px', lineHeight: '1.6' }}>
                {accuracy >= 80 && <span style={{ color: 'var(--lime)' }}>Excellent encoding — you're operating at a high level. Push with longer sessions.</span>}
                {accuracy >= 50 && accuracy < 80 && <span style={{ color: 'var(--text)' }}>Solid progress. The techniques in the feedback tips will sharpen your encoding significantly.</span>}
                {accuracy < 50 && <span style={{ color: 'var(--red)' }}>Keep practicing. Memory is a skill — consistency matters more than any single session result.</span>}
              </div>
              <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                <button className="btn" style={{ flex: 1 }} onClick={startSession}>Train Again</button>
                <button className="btn gray" onClick={onBack}>← Tasks</button>
              </div>
            </div>
          </div>
        );
      }

      const studyPct = studyTotal > 0 ? (studyTimeLeft / studyTotal) * 100 : 0;

      return (
        <div>
          <div className="memory-header">
            <button className="btn gray" style={{ padding: '4px 8px', fontSize: '11px' }} onClick={onBack}>← Back</button>
            <div className="memory-timer">{formatTime(timeLeft)}</div>
            <div style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '.1em' }}>Level {level}</div>
          </div>

          {phase === 'study' && (
            <div>
              <div style={{ marginBottom: '14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--muted)', fontSize: '11px', marginBottom: '4px' }}>
                  <span>Study window</span><span>{studyTimeLeft}s</span>
                </div>
                <div className="memory-progress-bar">
                  <div className="memory-progress-fill" style={{ width: `${studyPct}%` }} />
                </div>
              </div>

              {exercise.type === 'numbers' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '12px' }}>Memorize this number</div>
                  <div className="memory-digits-display">
                    {exercise.digits.split('').map((d, i) => (
                      <React.Fragment key={i}>
                        {i > 0 && i % 3 === 0 && <span style={{ color: 'var(--panel2)', fontSize: '1.5rem' }}>·</span>}
                        <span className="memory-digit-char">{d}</span>
                      </React.Fragment>
                    ))}
                  </div>
                  <div style={{ color: 'var(--muted)', fontSize: '11px', marginTop: '10px' }}>{exercise.digits.length} digits — try chunking or linking each group to a vivid image</div>
                </div>
              )}

              {exercise.type === 'names' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  <div className="section-title" style={{ marginBottom: '2px' }}>Memorize these people</div>
                  {exercise.persons.map((person, i) => (
                    <div key={i} className="memory-card">
                      <div className="memory-card-name">{person.name}</div>
                      <div className="memory-card-face">{person.face}</div>
                      <div className="memory-card-detail">{person.detail}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {phase === 'quiz' && (
            <div>
              {exercise.type === 'numbers' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '10px' }}>Recall the number string</div>
                  <div style={{ color: 'var(--muted)', fontSize: '12px', marginBottom: '12px' }}>Type exactly what you memorized — no spaces</div>
                  <input className="in" type="text" inputMode="numeric" placeholder="Enter digits..." value={numberInput}
                    onChange={e => setNumberInput(e.target.value.replace(/\D/g, ''))} autoFocus />
                  <button className="btn" style={{ marginTop: '10px', width: '100%' }} disabled={numberInput.length === 0} onClick={submitAnswers}>Submit Answer</button>
                </div>
              )}

              {exercise.type === 'names' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <div className="section-title">Answer the questions</div>
                  {exercise.questions.map(q => (
                    <div key={q.id} className="panel">
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                        {q.kind === 'face-to-name' ? 'This person looks like:' : 'What do you know about:'}
                      </div>
                      <div style={{ color: 'var(--text)', fontWeight: 700, fontSize: '13px', lineHeight: '1.5', marginBottom: '12px' }}>"{q.prompt}"</div>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                        {q.kind === 'face-to-name' ? 'Who is this?' : 'What is their detail?'}
                      </div>
                      <div className="memory-choices">
                        {q.choices.map((choice, ci) => (
                          <button key={ci} className={`memory-choice ${choiceAnswers[q.id] === choice ? 'selected' : ''}`}
                            onClick={() => setChoiceAnswers(prev => ({ ...prev, [q.id]: choice }))}>
                            {choice}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                  <button className="btn" disabled={exercise.questions.some(q => !choiceAnswers[q.id])} onClick={submitAnswers}>Submit Answers</button>
                </div>
              )}
            </div>
          )}

          {phase === 'feedback' && feedbackData && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              <div className="section-title">Results</div>
              {feedbackData.map((result, i) => (
                <div key={i} className="panel" style={{ borderLeftColor: result.correct ? 'var(--lime)' : 'var(--red)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                    <span style={{ color: result.correct ? 'var(--lime)' : 'var(--red)', fontSize: '16px', fontWeight: 800 }}>{result.correct ? '✓' : '✗'}</span>
                    <span style={{ color: result.correct ? 'var(--lime)' : 'var(--red)', fontWeight: 700, fontSize: '13px' }}>{result.correct ? 'Correct' : 'Incorrect'}</span>
                  </div>

                  {result.kind === 'numbers' && (
                    <div>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '6px' }}>The number was:</div>
                      <div className="memory-digits-display">
                        {result.digits.split('').map((d, di) => {
                          const hit = result.given[di] === d;
                          return (
                            <React.Fragment key={di}>
                              {di > 0 && di % 3 === 0 && <span style={{ color: 'var(--panel2)', fontSize: '1.5rem' }}>·</span>}
                              <span className="memory-digit-char" style={{ color: result.correct || hit ? 'var(--lime)' : 'var(--red)', borderColor: result.correct || hit ? 'var(--lime)' : 'var(--red)' }}>{d}</span>
                            </React.Fragment>
                          );
                        })}
                      </div>
                      {!result.correct && (
                        <div style={{ marginTop: '8px' }}>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>You entered: <span style={{ color: 'var(--red)' }}>{result.given || '(nothing)'}</span></div>
                          <div style={{ color: 'var(--muted)', fontSize: '11px', marginTop: '2px' }}>{result.matched}/{result.digits.length} digits in the correct position</div>
                        </div>
                      )}
                    </div>
                  )}

                  {result.kind !== 'numbers' && (
                    <div style={{ marginBottom: result.correct ? 0 : '6px' }}>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '4px' }}>
                        {result.kind === 'face-to-name' ? 'Face: ' : 'Name: '}
                        <span style={{ color: 'var(--text)' }}>{result.prompt}</span>
                      </div>
                      {!result.correct && (
                        <div>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>You chose: <span style={{ color: 'var(--red)' }}>{result.given || '(none)'}</span></div>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>Correct: <span style={{ color: 'var(--lime)' }}>{result.answer}</span></div>
                        </div>
                      )}
                    </div>
                  )}

                  {!result.correct && <div className="memory-tip-box"><span style={{ color: 'var(--gold)', fontWeight: 700 }}>Tip: </span>{result.tip}</div>}
                </div>
              ))}
              <button className="btn" style={{ width: '100%' }} onClick={handleNext}>
                {timeLeft <= 10 ? 'End Session' : 'Next Exercise →'}
              </button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      return <MainApp />;
    }

    function MainApp() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sections, setSections] = useState([]);
      const [archive, setArchive] = useState(null);
      const [showArchive, setShowArchive] = useState(false);
      const [loadInfo, setLoadInfo] = useState(null);
      const userRef = useRef(null);
      const dateRef = useRef(getCurrentDate());

      useEffect(() => {
        userRef.current = user;
      }, [user]);

      useEffect(() => {
        const failsafe = setTimeout(() => {
          setLoading((prev) => {
            if (prev) setError("Startup took too long. If you are signed in, press Refresh.");
            return false;
          });
        }, 9000);

        const { data: authListener } = supabase.auth.onAuthStateChange(async (event, session) => {
          const nextUser = session?.user || null;
          setUser(nextUser);
          setLoading(false);

          if (event === "SIGNED_OUT") {
            if (userRef.current?.id) cache.clear(userRef.current.id);
            if (userRef.current?.id) historyCache.clear(userRef.current.id);
            if (userRef.current?.id) learningCache.clear(userRef.current.id);
            setSections([]);
            setArchive(null);
            setShowArchive(false);
            setLoadInfo(null);
            return;
          }

          if (nextUser) {
            const cached = cache.get(nextUser.id);
            if (cached) setSections(cached);
            ensureDailyTasks(getCurrentDate(), nextUser.id)
              .catch((e) => console.warn("ensureDailyTasks:", e.message))
              .finally(() => loadSections(nextUser.id, true).catch((e) => setError("Failed to load: " + e.message)));
          }
        });

        const midnightWatcher = setInterval(async () => {
          const currentDate = getCurrentDate();
          if (currentDate === dateRef.current) return;

          dateRef.current = currentDate;
          const uid = userRef.current?.id;
          if (!uid) return;

          try {
            cache.clear(uid);
            historyCache.clear(uid);
            learningCache.clear(uid);
            await ensureDailyTasks(currentDate, uid);
            await loadSections(uid, true);
            setArchive(null);
          } catch (e) {
            setError("Midnight refresh failed: " + e.message);
          }
        }, 60000);

        return () => {
          clearTimeout(failsafe);
          clearInterval(midnightWatcher);
          authListener?.subscription?.unsubscribe();
        };
      }, []);

      async function ensureDailyTasks(date, userId) {
        if (!userId) return;

        const { data: templates, error: templateError } = await supabase
          .from("task_templates")
          .select("id,section_id,text,parent_task_id,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (templateError) throw templateError;

        if (!templates || templates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const { data: existingDailyTasks, error: existingError } = await supabase
          .from("tasks")
          .select("id,template_id")
          .eq("user_id", userId)
          .eq("date", date)
          .not("template_id", "is", null);

        if (existingError) throw existingError;

        const existingTemplateIds = new Set(
          (existingDailyTasks || []).map((task) => String(task.template_id))
        );

        const missingTemplates = templates.filter(
          (template) => !existingTemplateIds.has(String(template.id))
        );

        if (missingTemplates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const rows = missingTemplates.map((template) => ({
          section_id: template.section_id,
          user_id: userId,
          text: template.text,
          completed: false,
          date,
          template_id: template.id,
          parent_task_id: null,
          order_index: template.order_index || 0
        }));

        const { data: createdTasks, error: insertError } = await supabase
          .from("tasks")
          .insert(rows)
          .select("id,template_id");

        if (insertError && insertError.code !== "23505") throw insertError;

        const taskByTemplateId = {};
        (existingDailyTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });
        (createdTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });

        const parentUpdates = missingTemplates
          .filter((template) => (
            template.parent_task_id &&
            taskByTemplateId[String(template.parent_task_id)] &&
            taskByTemplateId[String(template.id)]
          ))
          .map((template) => supabase
            .from("tasks")
            .update({ parent_task_id: taskByTemplateId[String(template.parent_task_id)] })
            .eq("id", taskByTemplateId[String(template.id)]));

        if (parentUpdates.length > 0) await Promise.all(parentUpdates);

        safeStorage.setItem(`last_init_${userId}`, date);
      }

      async function createDefaultSection(userId) {
        const { data, error } = await supabase
          .from("sections")
          .insert([{ user_id: userId, name: "Tasks", order_index: 0 }])
          .select("id,user_id,name,order_index")
          .single();

        if (error) throw error;
        return data;
      }

      async function loadSections(userIdFromCall, force = false) {
        const userId = userIdFromCall || userRef.current?.id;
        if (!userId) return;

        if (force) {
          cache.clear(userId);
          safeStorage.removeItem(`last_init_${userId}`);
        }

        if (!force) {
          const cached = cache.get(userId);
          if (cached) {
            setSections(cached);
            const hasTasks = cached.some((section) => (section.tasks || []).length > 0);
            if (hasTasks) return;
          }
        }

        const today = getCurrentDate();

        const { data: sectionsData, error: sectionsError } = await supabase
          .from("sections")
          .select("id,user_id,name,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (sectionsError) throw sectionsError;

        let availableSections = sectionsData || [];

        if (availableSections.length === 0) {
          availableSections = [await createDefaultSection(userId)];
        }

        const { data: tasksData, error: tasksError } = await supabase
          .from("tasks")
          .select("id,section_id,user_id,text,completed,date,template_id,parent_task_id,order_index")
          .eq("user_id", userId)
          .eq("date", today)
          .order("order_index", { ascending: true });

        if (tasksError) throw tasksError;

        const effectiveTasks = tasksData || [];

        let merged = availableSections.map((section) => ({
          ...section,
          tasks: effectiveTasks.filter((task) => String(task.section_id) === String(section.id))
        }));

        const knownSectionIds = new Set(availableSections.map((section) => String(section.id)));
        const orphanTasks = effectiveTasks.filter((task) => !knownSectionIds.has(String(task.section_id)));

        if (orphanTasks.length > 0) {
          const fallbackSection = availableSections[0];
          const movedTasks = orphanTasks.map((task) => ({ ...task, section_id: fallbackSection.id }));

          const movedTaskResults = await Promise.all(orphanTasks.map((task) => (
            supabase.from("tasks").update({ section_id: fallbackSection.id }).eq("id", task.id)
          )));
          const movedTaskError = movedTaskResults.find((result) => result.error)?.error;
          if (movedTaskError) throw movedTaskError;

          const movedTemplateResults = await Promise.all(orphanTasks
            .filter((task) => task.template_id)
            .map((task) => (
              supabase.from("task_templates").update({ section_id: fallbackSection.id }).eq("id", task.template_id)
            )));
          const movedTemplateError = movedTemplateResults.find((result) => result.error)?.error;
          if (movedTemplateError) throw movedTemplateError;

          merged = merged.map((section, index) => (
            index === 0
              ? { ...section, tasks: [...(section.tasks || []), ...movedTasks] }
              : section
          ));
        }

        if (effectiveTasks.length > 0 && merged.every((section) => (section.tasks || []).length === 0)) {
          merged = [{
            ...availableSections[0],
            user_id: userId,
            name: "Tasks",
            tasks: effectiveTasks
          }];
        }

        setSections(merged);
        cache.set(userId, merged);

        setLoadInfo({
          today,
          taskCount: effectiveTasks.length,
          sectionCount: availableSections.length,
          templateBackedCount: effectiveTasks.filter((task) => task.template_id).length
        });
      }

      async function loadArchive() {
        if (showArchive) {
          setShowArchive(false);
          return;
        }

        try {
          const currentUser = userRef.current;
          if (!currentUser) {
            setError("History is available after sign in.");
            return;
          }

          const { data: rawTasks, error: taskError } = await supabase
            .from("tasks")
            .select("text,completed,date,template_id,section_id")
            .eq("user_id", currentUser.id)
            .lte("date", getCurrentDate())
            .gte("date", getDateDaysAgo(30))
            .order("date", { ascending: false });

          if (taskError) throw taskError;

          const sectionIds = Array.from(new Set(
            (rawTasks || []).map((task) => task.section_id).filter(Boolean)
          ));
          const sectionNames = {};

          if (sectionIds.length > 0) {
            const { data: sectionData } = await supabase
              .from("sections")
              .select("id,name")
              .eq("user_id", currentUser.id)
              .in("id", sectionIds);

            (sectionData || []).forEach((section) => {
              sectionNames[String(section.id)] = section.name;
            });
          }

          const data = (rawTasks || [])
            .map((task) => ({
              ...task,
              sections: { name: sectionNames[String(task.section_id)] || "Tasks" }
            }))
            .sort((a, b) => String(b.date).localeCompare(String(a.date)));

          setArchive(data || []);
          historyCache.set(currentUser.id, data || []);
          setShowArchive(true);
          setError(null);
        } catch (e) {
          setError("Failed to load archive: " + e.message);
        }
      }

      if (loading) return <div className="loading">Loading System...</div>;
      if (!user) return <AuthScreen setError={setError} />;

      return (
        <>
          {error && <div className="panel error">{error}</div>}
          <TaskApp
            user={user}
            sections={sections}
            setSections={setSections}
            setError={setError}
            loadSections={loadSections}
            loadArchive={loadArchive}
            archive={archive}
            showArchive={showArchive}
            loadInfo={loadInfo}
          />
        </>
      );
    }

    function AuthScreen({ setError }) {

      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");

      async function handleAuth(e) {

        setLocalError(null);

          } else {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            alert("Check your email to confirm your account.");

          setLocalError(e.message);
          setError(e.message);
        } finally {

    function TaskApp({ user, sections, setSections, setError, loadSections, loadArchive, archive, showArchive, loadInfo }) {
      const [showMemory, setShowMemory] = useState(false);
      const [showNewSection, setShowNewSection] = useState(false);
      const [newSectionName, setNewSectionName] = useState("");
      const [undoStack, setUndoStack] = useState([]);
      const [learningCollapsed, setLearningCollapsed] = useState(false);

      function pushUndo(label, undoFn) {
        setUndoStack(prev => [...prev.slice(-4), { label, undo: undoFn }]);
      }

      async function applyUndo() {
        if (undoStack.length === 0) return;
        const top = undoStack[undoStack.length - 1];
        setUndoStack(prev => prev.slice(0, -1));
        try {
          await top.undo();
        } catch (e) {
          setError("Undo failed: " + e.message);
        }
      }

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const bar = document.querySelector('.bar');
        const offset = bar ? bar.getBoundingClientRect().height + 8 : 16;
        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - offset, behavior: 'smooth' });
      }

      function scrollToLearning(subId) {
        setLearningCollapsed(false);
        setTimeout(() => scrollToId(subId), 50);
      }

      const todayPretty = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        timeZone: "America/New_York"
      });

      const totalTasksToday = sections.reduce((sum, section) => sum + (section.tasks?.length || 0), 0);

      const groupedArchive = (archive || []).reduce((acc, item) => {
        if (!acc[item.date]) acc[item.date] = [];
        acc[item.date].push(item);
        return acc;
      }, {});

      const sortedArchiveDays = Object.entries(groupedArchive)
        .sort(([a], [b]) => b.localeCompare(a))
        .map(([day, items]) => {
          const bySection = items.reduce((acc, item) => {
            const name = item.sections?.name || "No Section";
            if (!acc[name]) acc[name] = [];
            acc[name].push(item);
            return acc;
          }, {});
          const sortedSections = Object.entries(bySection).sort(([a], [b]) => a.localeCompare(b));
          return { day, sortedSections };
        });

      async function addSection(e) {
        e.preventDefault();
        if (!newSectionName.trim()) return;

        try {
          const { data, error } = await supabase
            .from("sections")
            .insert([{ user_id: user.id, name: newSectionName.trim(), order_index: sections.length }])
            .select();

          if (error) throw error;

          const next = [...sections, { ...data[0], tasks: [] }];
          setSections(next);
          cache.set(user.id, next);
          setNewSectionName("");
          setShowNewSection(false);
        } catch (e) {
          setError("Failed to create section: " + e.message);
        }
      }

      async function deleteSection(sectionId) {
        if (!confirm("Delete this section and all its tasks?")) return;

        try {
          const { error } = await supabase.from("sections").delete().eq("id", sectionId);
          if (error) throw error;

          const next = sections.filter((section) => section.id !== sectionId);
          setSections(next);
          cache.set(user.id, next);
        } catch (e) {
          setError("Failed to delete section: " + e.message);
        }
      }

      async function moveSection(sectionId, direction) {
        const index = sections.findIndex((section) => section.id === sectionId);
        const targetIndex = index + direction;
        if (index < 0 || targetIndex < 0 || targetIndex >= sections.length) return;

        const a = sections[index];
        const b = sections[targetIndex];

        const aOrder = a.order_index ?? index;
        const bOrder = b.order_index ?? targetIndex;

        const next = sections.map((section) => {
          if (section.id === a.id) return { ...section, order_index: bOrder };
          if (section.id === b.id) return { ...section, order_index: aOrder };
          return section;
        }).sort((x, y) => x.order_index - y.order_index);

        setSections(next);
        cache.set(user.id, next);

        try {
          await Promise.all([
            supabase.from("sections").update({ order_index: bOrder }).eq("id", a.id),
            supabase.from("sections").update({ order_index: aOrder }).eq("id", b.id)
          ]);
        } catch (e) {
          setError("Failed to sync section order: " + e.message);
        }
      }

      if (showMemory) return <MemoryTrainingPage onBack={() => setShowMemory(false)} />;

      return (
        <>
          <h1 className="title">{todayPretty}</h1>
          <div className="tag">Task Protocol</div>

          <div className="bar">
            <div className="left">
              <button className="btn" onClick={() => setShowMemory(true)}>Memory Training</button>
              <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>+ New Section</button>
              <button className="btn gray" onClick={() => loadSections(user.id, true)}>Refresh</button>
              <button className="btn gray" onClick={loadArchive}>{showArchive ? "Hide Archive" : "History"}</button>
              <button
                className="btn gray"
                onClick={applyUndo}
                disabled={undoStack.length === 0}
                title={undoStack.length > 0 ? `Undo: ${undoStack[undoStack.length - 1].label}` : "Nothing to undo"}
              >Undo</button>
            </div>
            <button className="btn gray" onClick={() => supabase.auth.signOut()}>Sign Out</button>
            <div style={{ width: '100%', borderTop: '1px solid var(--line)', paddingTop: '8px', display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
              {sections.map(section => (
                <button key={section.id} className="btn gray" onClick={() => scrollToId(`section-${section.id}`)}>
                  {section.name}
                </button>
              ))}
              <button className="btn cyan" onClick={() => scrollToLearning('learning-idioms')}>Idioms</button>
              <button className="btn cyan" onClick={() => scrollToLearning('learning-vocab')}>Vocab</button>
            </div>
          </div>

          {showNewSection && (
            <div className="panel">
              <form onSubmit={addSection}>
                <input
                  className="in"
                  type="text"
                  placeholder="Section Name"
                  value={newSectionName}
                  onChange={(e) => setNewSectionName(e.target.value)}
                />
                <div className="row">
                  <button className="btn" type="submit">Create</button>
                  <button className="btn gray" type="button" onClick={() => setShowNewSection(false)}>Cancel</button>
                </div>
              </form>
            </div>
          )}

          {showArchive && archive && (
            <div className="panel gold">
              <div className="section-title" style={{ color: "var(--gold)", marginBottom: "8px" }}>
                History by Day (Last 30 Days)
              </div>

              {sortedArchiveDays.length === 0 ? (
                <div style={{ color: "var(--muted)" }}>No history for the last 30 days.</div>
              ) : (
                sortedArchiveDays.map(({ day, sortedSections }) => (
                  <div className="history-day" key={day}>
                    <div className="history-date">{day}</div>
                    {sortedSections.map(([sectionName, tasks]) => (
                      <div key={sectionName} style={{ marginBottom: "8px" }}>
                        <div style={{ color: "var(--cyan)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "4px", textTransform: "uppercase" }}>
                          {sectionName}
                        </div>
                        <ul className="tasks">
                          {tasks.map((task, index) => (
                            <li key={`${day}-${sectionName}-${index}`} className="task" style={{ opacity: 0.85 }}>
                              <span className="task-text" style={{ textDecoration: task.completed ? "line-through" : "none" }}>
                                {task.text}
                              </span>
                              <div className="meta">
                                <span className={`badge ${task.template_id ? "b1" : "b2"}`}>
                                  {task.template_id ? "Daily" : "One-Time"}
                                </span>
                                <span className={`badge ${task.completed ? "b1" : "b3"}`}>
                                  {task.completed ? "Done" : "Open"}
                                </span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                ))
              )}
            </div>
          )}

          {loadInfo && (
            <div className={`panel ${loadInfo.taskCount === 0 ? "gold" : ""}`}>
              Loaded {loadInfo.taskCount} task{loadInfo.taskCount === 1 ? "" : "s"} for {loadInfo.today}.
              {" "}Daily/template-backed: {loadInfo.templateBackedCount}. Sections: {loadInfo.sectionCount}.
            </div>
          )}

          {sections.length === 0 && (
            <div className="panel gold">
              No sections found. Use <strong>+ New Section</strong> to create one, or <strong>Refresh</strong> to retry.
            </div>
          )}

          {sections.length > 0 && totalTasksToday === 0 && (
            <div className="panel gold">
              No tasks found for today. Add a task below to get started.
            </div>
          )}

          {sections.map((section) => (
            <div className="panel" key={section.id} id={`section-${section.id}`}>
              <SectionComponent
                user={user}
                section={section}
                sections={sections}
                setSections={setSections}
                deleteSection={deleteSection}
                moveSection={moveSection}
                setError={setError}
                pushUndo={pushUndo}
              />
            </div>
          ))}

          <LearningPanel user={user} collapsed={learningCollapsed} setCollapsed={setLearningCollapsed} />
        </>
      );
    }
