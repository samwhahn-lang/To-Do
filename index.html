<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task System</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --panel: #1a1a1a;
      --panel2: #2d2d2d;
      --line: #3a3a3a;
      --text: #e8e8e8;
      --muted: #777;
      --lime: #d4ff00;
      --cyan: #00fff5;
      --red: #ff6b6b;
      --gold: #ffd700;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 100vh;
    }

    #root {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .title {
      color: var(--lime);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .tag {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      margin-bottom: 18px;
      text-align: center;
      text-transform: uppercase;
    }

    .panel {
      background: var(--panel);
      border-left: 4px solid var(--lime);
      margin-bottom: 14px;
      padding: 14px;
    }

    .panel.error {
      border-left-color: var(--red);
      color: #ffb5b5;
    }

    .panel.gold {
      border-left-color: var(--gold);
    }

    .panel.cyan {
      border-left-color: var(--cyan);
    }

    .bar {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 10px;
    }

    .left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      text-transform: uppercase;
    }

    .btn.gray {
      border-color: var(--muted);
      color: var(--muted);
    }

    .btn.cyan {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn:hover {
      background: rgba(212,255,0,.1);
    }

    .btn.cyan:hover {
      background: rgba(0,255,245,.08);
    }

    .in {
      background: var(--panel2);
      border: 1px solid var(--muted);
      color: var(--text);
      flex: 1;
      font-family: inherit;
      min-width: 180px;
      padding: 10px;
      width: 100%;
    }

    .in:focus {
      border-color: var(--lime);
      outline: none;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .section-head {
      align-items: center;
      border-bottom: 1px solid var(--panel2);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
    }

    .section-title {
      color: var(--lime);
      font-weight: 800;
      text-transform: uppercase;
    }

    .tasks {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    .task {
      align-items: flex-start;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .task.sub {
      border-left: 2px solid var(--cyan);
      margin-left: 20px;
    }

    .task.done {
      opacity: .55;
    }

    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-text {
      cursor: pointer;
      word-break: break-word;
    }

    .meta {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: 6px;
      margin-left: auto;
    }

    .icon {
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      height: 30px;
      line-height: 1;
      width: 30px;
    }

    .icon:hover {
      border-color: var(--lime);
      color: var(--lime);
    }

    .badge {
      border: 1px solid;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.type-toggle {
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .badge.type-toggle:hover {
      background: rgba(212,255,0,.1);
    }

    .check {
      accent-color: var(--lime);
      cursor: pointer;
      flex-shrink: 0;
      height: 18px;
      margin-top: 2px;
      width: 18px;
    }

    .b1 { border-color: var(--lime); color: var(--lime); }
    .b2 { border-color: var(--cyan); color: var(--cyan); }
    .b3 { border-color: var(--gold); color: var(--gold); }

    .auth {
      background: var(--panel);
      border: 1px solid var(--panel2);
      margin: 40px auto;
      max-width: 460px;
      padding: 18px;
    }

    .loading {
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }

    .subtask-form {
      margin: 8px 0 8px 24px;
    }

    .history-day {
      margin-bottom: 14px;
    }

    .history-date {
      color: var(--gold);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .learning-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .learn-item {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
    }

    @media (max-width: 700px) {
      #root { padding: 14px 8px; }

      .task {
        align-items: flex-start;
        min-height: 56px;
        padding: 10px 8px;
      }

      .task > div[style] {
        min-width: 0;
      }

      .task-text {
        display: block;
        line-height: 1.35;
        white-space: normal;
      }

      .meta {
        flex-wrap: nowrap;
        gap: 4px;
      }

      .icon {
        border-radius: 5px;
        font-size: 13px;
        height: 28px;
        width: 28px;
      }

      .badge {
        display: inline-block;
        font-size: 9px;
        padding: 2px 5px;
      }

      .task.sub {
        margin-left: 8px;
      }

      .subtask-form {
        margin-left: 10px;
      }

      .learning-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function nyDateFrom(baseDate) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(baseDate);

      const byType = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${byType.year}-${byType.month}-${byType.day}`;
    }

    function getCurrentDate() {
      return nyDateFrom(new Date());
    }

    function getDateDaysAgo(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return nyDateFrom(d);
    }

      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_cache_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_cache_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload

      clear(uid) {

    function pickRandom(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

      return shuffled.slice(0, count);

    const TEST_SECTIONS = [
      {
        id: "test-1", user_id: "test", name: "Test Section", order_index: 0,
        tasks: [
          { id: "task-1", section_id: "test-1", text: "Buy groceries", completed: false, date: getCurrentDate(), template_id: null, parent_task_id: null, order_index: 0 },
          { id: "task-2", section_id: "test-1", text: "Send weekly report", completed: true, date: getCurrentDate(), template_id: "tpl-1", parent_task_id: null, order_index: 1 },
          { id: "task-3", section_id: "test-1", text: "Review pull requests", completed: false, date: getCurrentDate(), template_id: null, parent_task_id: null, order_index: 2 },
        ]
      },
      {
        id: "test-2", user_id: "test", name: "Work", order_index: 1,
        tasks: [
          { id: "task-4", section_id: "test-2", text: "Daily standup", completed: true, date: getCurrentDate(), template_id: "tpl-2", parent_task_id: null, order_index: 0 },
          { id: "task-5", section_id: "test-2", text: "Update project board", completed: false, date: getCurrentDate(), template_id: null, parent_task_id: null, order_index: 1 },

    function App() {
      return <MainApp />;
    }

    function MainApp() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sections, setSections] = useState([]);
      const [testMode, setTestMode] = useState(false);
      const [archive, setArchive] = useState(null);
      const [showArchive, setShowArchive] = useState(false);
      const [loadInfo, setLoadInfo] = useState(null);
      const userRef = useRef(null);
      const dateRef = useRef(getCurrentDate());

      useEffect(() => {
        userRef.current = user;
      }, [user]);

      useEffect(() => {
        const failsafe = setTimeout(() => {
          setLoading((prev) => {
            if (prev) setError("Startup took too long. If you are signed in, press Refresh.");
            return false;
          });
        }, 9000);

        const { data: authListener } = supabase.auth.onAuthStateChange(async (event, session) => {
          const nextUser = session?.user || null;
          setUser(nextUser);
          setLoading(false);

          if (event === "SIGNED_OUT") {
            if (userRef.current?.id) cache.clear(userRef.current.id);
            if (userRef.current?.id) historyCache.clear(userRef.current.id);
            if (userRef.current?.id) learningCache.clear(userRef.current.id);
            setSections([]);
            setArchive(null);
            setShowArchive(false);
            setLoadInfo(null);
            return;
          }

          if (nextUser) {
            const cached = cache.get(nextUser.id);
            if (cached) setSections(cached);
            // Always force-load from Supabase on page load — skip cache
            loadSections(nextUser.id, true).catch((e) => setError("Failed to load: " + e.message));
            // Run template init in background after initial paint
            ensureDailyTasks(getCurrentDate(), nextUser.id)
              .then(() => loadSections(nextUser.id, true))
              .catch((e) => console.warn("ensureDailyTasks:", e.message));
          }
        });

        const midnightWatcher = setInterval(async () => {
          const currentDate = getCurrentDate();
          if (currentDate === dateRef.current) return;

          dateRef.current = currentDate;
          const uid = userRef.current?.id;
          if (!uid) return;

          try {
            cache.clear(uid);
            historyCache.clear(uid);
            learningCache.clear(uid);
            await ensureDailyTasks(currentDate, uid);
            await loadSections(uid, true);
            setArchive(null);
          } catch (e) {
            setError("Midnight refresh failed: " + e.message);
          }
        }, 60000);

        return () => {
          clearTimeout(failsafe);
          clearInterval(midnightWatcher);
          authListener?.subscription?.unsubscribe();
        };
      }, []);

      async function ensureDailyTasks(date, userId) {
        if (!userId) return;

        const { data: templates, error: templateError } = await supabase
          .from("task_templates")
          .select("id,section_id,text,parent_task_id,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (templateError) throw templateError;

        if (!templates || templates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const { data: existingDailyTasks, error: existingError } = await supabase
          .from("tasks")
          .select("id,template_id")
          .eq("user_id", userId)
          .eq("date", date)
          .not("template_id", "is", null);

        if (existingError) throw existingError;

        const existingTemplateIds = new Set(
          (existingDailyTasks || []).map((task) => String(task.template_id))
        );

        const missingTemplates = templates.filter(
          (template) => !existingTemplateIds.has(String(template.id))
        );

        if (missingTemplates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const rows = missingTemplates.map((template) => ({
          section_id: template.section_id,
          user_id: userId,
          text: template.text,
          completed: false,
          date,
          template_id: template.id,
          parent_task_id: null,
          order_index: template.order_index || 0
        }));

        const { data: createdTasks, error: insertError } = await supabase
          .from("tasks")
          .insert(rows)
          .select("id,template_id");

        if (insertError && insertError.code !== "23505") throw insertError;

        const taskByTemplateId = {};
        (existingDailyTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });
        (createdTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });

        const parentUpdates = missingTemplates
          .filter((template) => (
            template.parent_task_id &&
            taskByTemplateId[String(template.parent_task_id)] &&
            taskByTemplateId[String(template.id)]
          ))
          .map((template) => supabase
            .from("tasks")
            .update({ parent_task_id: taskByTemplateId[String(template.parent_task_id)] })
            .eq("id", taskByTemplateId[String(template.id)]));

        if (parentUpdates.length > 0) await Promise.all(parentUpdates);

        safeStorage.setItem(`last_init_${userId}`, date);
      }

      async function createDefaultSection(userId) {
        const { data, error } = await supabase
          .from("sections")
          .insert([{ user_id: userId, name: "Tasks", order_index: 0 }])
          .select("id,user_id,name,order_index")
          .single();

        if (error) throw error;
        return data;
      }

      async function seedTestData(userId) {
        const today = getCurrentDate();
        let section;

        const { data: existing } = await supabase
          .from("sections")
          .select("id,user_id,name,order_index")
          .eq("user_id", userId)
          .limit(1)
          .maybeSingle();

        if (existing) {
          section = existing;
        } else {
          section = await createDefaultSection(userId);
        }

        const sampleTasks = [
          { text: "Review today's priorities", order_index: 0 },
          { text: "Check email and respond", order_index: 1 },
          { text: "Daily standup / sync", order_index: 2 }
        ];

        const { error: insertError } = await supabase
          .from("tasks")
          .insert(sampleTasks.map((t) => ({
            section_id: section.id,
            user_id: userId,
            text: t.text,
            completed: false,
            date: today,
            template_id: null,
            parent_task_id: null,
            order_index: t.order_index
          })));

        if (insertError) throw insertError;

        await loadSections(userId, true);
      }

      async function loadSections(userIdFromCall, force = false) {
        const userId = userIdFromCall || userRef.current?.id;
        if (!userId) return;

        if (force) {
          cache.clear(userId);
          safeStorage.removeItem(`last_init_${userId}`);
        }

        if (!force) {
          const cached = cache.get(userId);
          if (cached) {
            setSections(cached);
            const hasTasks = cached.some((section) => (section.tasks || []).length > 0);
            if (hasTasks) return;
          }
        }

        const today = getCurrentDate();

        const { data: sectionsData, error: sectionsError } = await supabase
          .from("sections")
          .select("id,user_id,name,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (sectionsError) throw sectionsError;

        let availableSections = sectionsData || [];

        if (availableSections.length === 0) {
          availableSections = [await createDefaultSection(userId)];
        }

        const { data: tasksData, error: tasksError } = await supabase
          .from("tasks")
          .select("id,section_id,user_id,text,completed,date,template_id,parent_task_id,order_index")
          .eq("user_id", userId)
          .eq("date", today)
          .order("order_index", { ascending: true });

        if (tasksError) throw tasksError;

        const effectiveTasks = tasksData || [];

        let merged = availableSections.map((section) => ({
          ...section,
          tasks: effectiveTasks.filter((task) => String(task.section_id) === String(section.id))
        }));

        const knownSectionIds = new Set(availableSections.map((section) => String(section.id)));
        const orphanTasks = effectiveTasks.filter((task) => !knownSectionIds.has(String(task.section_id)));

        if (orphanTasks.length > 0) {
          const fallbackSection = availableSections[0];
          const movedTasks = orphanTasks.map((task) => ({ ...task, section_id: fallbackSection.id }));

          const movedTaskResults = await Promise.all(orphanTasks.map((task) => (
            supabase.from("tasks").update({ section_id: fallbackSection.id }).eq("id", task.id)
          )));
          const movedTaskError = movedTaskResults.find((result) => result.error)?.error;
          if (movedTaskError) throw movedTaskError;

          const movedTemplateResults = await Promise.all(orphanTasks
            .filter((task) => task.template_id)
            .map((task) => (
              supabase.from("task_templates").update({ section_id: fallbackSection.id }).eq("id", task.template_id)
            )));
          const movedTemplateError = movedTemplateResults.find((result) => result.error)?.error;
          if (movedTemplateError) throw movedTemplateError;

          merged = merged.map((section, index) => (
            index === 0
              ? { ...section, tasks: [...(section.tasks || []), ...movedTasks] }
              : section
          ));
        }

        if (effectiveTasks.length > 0 && merged.every((section) => (section.tasks || []).length === 0)) {
          merged = [{
            ...availableSections[0],
            user_id: userId,
            name: "Tasks",
            tasks: effectiveTasks
          }];
        }

        setSections(merged);
        cache.set(userId, merged);

        setLoadInfo({
          today,
          taskCount: effectiveTasks.length,
          sectionCount: availableSections.length,
          templateBackedCount: effectiveTasks.filter((task) => task.template_id).length
        });
      }

      async function loadArchive() {
        if (showArchive) {
          setShowArchive(false);
          return;
        }

        try {
          const currentUser = userRef.current;
          if (!currentUser) {
            setError("History is available after sign in.");
            return;
          }

          const { data: rawTasks, error: taskError } = await supabase
            .from("tasks")
            .select("text,completed,date,template_id,section_id")
            .eq("user_id", currentUser.id)
            .lte("date", getCurrentDate())
            .gte("date", getDateDaysAgo(30))
            .order("date", { ascending: false });

          if (taskError) throw taskError;

          const sectionIds = Array.from(new Set(
            (rawTasks || []).map((task) => task.section_id).filter(Boolean)
          ));
          const sectionNames = {};

          if (sectionIds.length > 0) {
            const { data: sectionData } = await supabase
              .from("sections")
              .select("id,name")
              .eq("user_id", currentUser.id)
              .in("id", sectionIds);

            (sectionData || []).forEach((section) => {
              sectionNames[String(section.id)] = section.name;
            });
          }

          const data = (rawTasks || [])
            .map((task) => ({
              ...task,
              sections: { name: sectionNames[String(task.section_id)] || "Tasks" }
            }))
            .sort((a, b) => String(b.date).localeCompare(String(a.date)));

          setArchive(data || []);
          historyCache.set(currentUser.id, data || []);
          setShowArchive(true);
          setError(null);
        } catch (e) {
          setError("Failed to load archive: " + e.message);
        }
      }

      if (loading) return <div className="loading">Loading System...</div>;
      if (!user) return <AuthScreen setError={setError} />;

      return (
        <>
          {error && <div className="panel error">{error}</div>}
          <TaskApp
            user={user}
            sections={testMode ? TEST_SECTIONS : sections}
            setSections={setSections}
            setError={setError}
            loadSections={loadSections}
            loadArchive={loadArchive}
            archive={archive}
            showArchive={showArchive}
            loadInfo={loadInfo}
            seedTestData={seedTestData}
            testMode={testMode}
            setTestMode={setTestMode}
          />
        </>
      );
    }

    function AuthScreen({ setError }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [localError, setLocalError] = useState(null);

      async function handleAuth(e) {
        e.preventDefault();
        setLoading(true);
        setLocalError(null);

        try {
          if (isLogin) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            alert("Check your email to confirm your account.");
          }
        } catch (e) {
          setLocalError(e.message);
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="auth">
          <h2 className="title" style={{ fontSize: "1.6rem", marginBottom: "8px" }}>
            {isLogin ? "Login" : "Sign Up"}
          </h2>

          {localError && <div className="panel error">{localError}</div>}

          <form onSubmit={handleAuth}>
            <div>
              <label>Email</label>
              <input
                className="in"
                type="email"
                required
                disabled={loading}
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
            </div>

            <div style={{ marginTop: "8px" }}>
              <label>Password</label>
              <input
                className="in"
                type="password"
                required
                disabled={loading}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
              />
            </div>

            <div className="row">
              <button className="btn" type="submit" disabled={loading}>
                {loading ? "Please wait..." : (isLogin ? "Login" : "Sign Up")}
              </button>
              <button
                className="btn gray"
                type="button"
                disabled={loading}
                onClick={() => setIsLogin(!isLogin)}
              >
                {isLogin ? "Need an account?" : "Have an account?"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function TaskApp({ user, sections, setSections, setError, loadSections, loadArchive, archive, showArchive, loadInfo, seedTestData, testMode, setTestMode }) {
      const [showNewSection, setShowNewSection] = useState(false);
      const [newSectionName, setNewSectionName] = useState("");

      const todayPretty = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        timeZone: "America/New_York"
      });

      const totalTasksToday = sections.reduce((sum, section) => sum + (section.tasks?.length || 0), 0);

      const groupedArchive = (archive || []).reduce((acc, item) => {
        if (!acc[item.date]) acc[item.date] = [];
        acc[item.date].push(item);
        return acc;
      }, {});

      const sortedArchiveDays = Object.entries(groupedArchive)
        .sort(([a], [b]) => b.localeCompare(a))
        .map(([day, items]) => {
          const bySection = items.reduce((acc, item) => {
            const name = item.sections?.name || "No Section";
            if (!acc[name]) acc[name] = [];
            acc[name].push(item);
            return acc;
          }, {});
          const sortedSections = Object.entries(bySection).sort(([a], [b]) => a.localeCompare(b));
          return { day, sortedSections };
        });

      async function addSection(e) {
        e.preventDefault();
        if (!newSectionName.trim()) return;

        try {
          const { data, error } = await supabase
            .from("sections")
            .insert([{ user_id: user.id, name: newSectionName.trim(), order_index: sections.length }])
            .select();

          if (error) throw error;

          const next = [...sections, { ...data[0], tasks: [] }];
          setSections(next);
          cache.set(user.id, next);
          setNewSectionName("");
          setShowNewSection(false);
        } catch (e) {
          setError("Failed to create section: " + e.message);
        }
      }

      async function deleteSection(sectionId) {
        if (!confirm("Delete this section and all its tasks?")) return;

        try {
          const { error } = await supabase.from("sections").delete().eq("id", sectionId);
          if (error) throw error;

          const next = sections.filter((section) => section.id !== sectionId);
          setSections(next);
          cache.set(user.id, next);
        } catch (e) {
          setError("Failed to delete section: " + e.message);
        }
      }

      async function moveSection(sectionId, direction) {
        const index = sections.findIndex((section) => section.id === sectionId);
        const targetIndex = index + direction;
        if (index < 0 || targetIndex < 0 || targetIndex >= sections.length) return;

        const a = sections[index];
        const b = sections[targetIndex];

        const aOrder = a.order_index ?? index;
        const bOrder = b.order_index ?? targetIndex;

        const next = sections.map((section) => {
          if (section.id === a.id) return { ...section, order_index: bOrder };
          if (section.id === b.id) return { ...section, order_index: aOrder };
          return section;
        }).sort((x, y) => x.order_index - y.order_index);

        setSections(next);
        cache.set(user.id, next);

        try {
          await Promise.all([
            supabase.from("sections").update({ order_index: bOrder }).eq("id", a.id),
            supabase.from("sections").update({ order_index: aOrder }).eq("id", b.id)
          ]);
        } catch (e) {
          setError("Failed to sync section order: " + e.message);
        }
      }

      return (
        <>
          <h1 className="title">{todayPretty}</h1>
          <div className="tag">Task Protocol</div>

          <div className="bar">
            <div className="left">
              <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>+ New Section</button>
              <button className="btn gray" onClick={() => loadSections(user.id, true)}>Refresh</button>
              <button className="btn gray" onClick={loadArchive}>{showArchive ? "Hide Archive" : "History"}</button>
              <button
                className={`btn ${testMode ? "" : "gray"}`}
                onClick={() => setTestMode((v) => !v)}
                title="Toggle fake local data to verify UI rendering"
              >{testMode ? "Exit Test Mode" : "Test Mode"}</button>
            </div>
            <button className="btn gray" onClick={() => supabase.auth.signOut()}>Sign Out</button>
          </div>

          {showNewSection && (
            <div className="panel">
              <form onSubmit={addSection}>
                <input
                  className="in"
                  type="text"
                  placeholder="Section Name"
                  value={newSectionName}
                  onChange={(e) => setNewSectionName(e.target.value)}
                />
                <div className="row">
                  <button className="btn" type="submit">Create</button>
                  <button className="btn gray" type="button" onClick={() => setShowNewSection(false)}>Cancel</button>
                </div>
              </form>
            </div>
          )}

          {showArchive && archive && (
            <div className="panel gold">
              <div className="section-title" style={{ color: "var(--gold)", marginBottom: "8px" }}>
                History by Day (Last 30 Days)
              </div>

              {sortedArchiveDays.length === 0 ? (
                <div style={{ color: "var(--muted)" }}>No history for the last 30 days.</div>
              ) : (
                sortedArchiveDays.map(({ day, sortedSections }) => (
                  <div className="history-day" key={day}>
                    <div className="history-date">{day}</div>
                    {sortedSections.map(([sectionName, tasks]) => (
                      <div key={sectionName} style={{ marginBottom: "8px" }}>
                        <div style={{ color: "var(--cyan)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "4px", textTransform: "uppercase" }}>
                          {sectionName}
                        </div>
                        <ul className="tasks">
                          {tasks.map((task, index) => (
                            <li key={`${day}-${sectionName}-${index}`} className="task" style={{ opacity: 0.85 }}>
                              <span className="task-text" style={{ textDecoration: task.completed ? "line-through" : "none" }}>
                                {task.text}
                              </span>
                              <div className="meta">
                                <span className={`badge ${task.template_id ? "b1" : "b2"}`}>
                                  {task.template_id ? "Daily" : "One-Time"}
                                </span>
                                <span className={`badge ${task.completed ? "b1" : "b3"}`}>
                                  {task.completed ? "Done" : "Open"}
                                </span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                ))
              )}
            </div>
          )}

          {loadInfo && (
            <div className={`panel ${loadInfo.taskCount === 0 ? "gold" : ""}`}>
              Loaded {loadInfo.taskCount} task{loadInfo.taskCount === 1 ? "" : "s"} for {loadInfo.today}.
              {" "}Daily/template-backed: {loadInfo.templateBackedCount}. Sections: {loadInfo.sectionCount}.
            </div>
          )}

          {sections.length === 0 && !testMode && (
            <div className="panel error">
              <div style={{ marginBottom: "10px" }}>
                No sections loaded. Click <strong>Test Mode</strong> to verify the UI with fake data, <strong>Refresh</strong> to retry loading, or <strong>Seed Test Data</strong> to insert sample data into Supabase.
              </div>
              <div className="row">
                <button className="btn" onClick={() => setTestMode(true)}>Test Mode</button>
                <button className="btn gray" onClick={() => loadSections(user.id, true)}>Refresh</button>
                <button className="btn gray" onClick={() => seedTestData(user.id).catch((e) => setError("Seed failed: " + e.message))}>
                  Seed Test Data
                </button>
              </div>
            </div>
          )}

          {sections.length > 0 && totalTasksToday === 0 && (
            <div className="panel gold">
              No tasks found for today. Add a task below to get started.
            </div>
          )}

          {sections.map((section) => (
            <div className="panel" key={section.id}>
              <SectionComponent
                user={user}
                section={section}
                sections={sections}
                setSections={setSections}
                deleteSection={deleteSection}
                moveSection={moveSection}
                setError={setError}
              />
            </div>
          ))}

          <LearningPanel user={user} />
        </>
      );
    }

    function LearningPanel({ user }) {
      const [data, setData] = useState(null);
      const [status, setStatus] = useState("loading");
      const [collapsed, setCollapsed] = useState(false);
      const [generating, setGenerating] = useState(false);
      const [errMsg, setErrMsg] = useState(null);

      useEffect(() => { loadLearning(false); }, []);

      async function loadLearning(forceNew) {
        setErrMsg(null);
        if (forceNew) {
          setGenerating(true);
        } else {
          setStatus("loading");
        }

        const today = getCurrentDate();

        if (!forceNew) {
          const cached = learningCache.get(user.id);
          if (cached) {
            setData(cached);
            setStatus("ready");
            return;
          }

          const { data: existing, error: fetchErr } = await supabase
            .from("daily_learning")
            .select("idioms,vocab")
            .eq("user_id", user.id)
            .eq("date", today)
            .maybeSingle();

          if (fetchErr) {
            setErrMsg("Could not load learning data: " + fetchErr.message);
            setStatus("error");
            return;
          }

          if (existing) {
            const payload = { idioms: existing.idioms, vocab: existing.vocab };
            setData(payload);
            learningCache.set(user.id, payload);
            setStatus("ready");
            return;
          }
        }

        const idioms = pickRandom(IDIOM_POOL, 10);
        const vocab = pickRandom(VOCAB_POOL, 10);
        const payload = { idioms, vocab };

        const { error: upsertErr } = await supabase
          .from("daily_learning")
          .upsert(
            { user_id: user.id, date: today, idioms, vocab, updated_at: new Date().toISOString() },
            { onConflict: "user_id,date" }
          );

        if (upsertErr) {
          setErrMsg("Could not save learning data: " + upsertErr.message);
        }

        setData(payload);
        learningCache.set(user.id, payload);
        setStatus("ready");
        setGenerating(false);
      }

      return (
        <div className="panel cyan">
          <div className="section-head">
            <div className="section-title" style={{ color: "var(--cyan)" }}>Learning</div>
            <div className="meta">
              <button
                className="btn cyan"
                style={{ fontSize: "11px", padding: "4px 10px" }}
                disabled={generating}
                onClick={() => loadLearning(true)}
              >
                {generating ? "Generating..." : "Generate New"}
              </button>
              <button className="icon" onClick={() => setCollapsed((v) => !v)}>
                {collapsed ? "+" : "\u2212"}
              </button>
            </div>
          </div>

          {!collapsed && (
            <>
              {status === "loading" && (
                <div style={{ color: "var(--muted)", padding: "8px 0" }}>Loading today's learning content...</div>
              )}
              {errMsg && (
                <div style={{ color: "var(--red)", marginBottom: "10px", fontSize: "12px" }}>{errMsg}</div>
              )}
              {status === "ready" && data && (
                <div className="learning-grid">
                  <div>
                    <div style={{ color: "var(--gold)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "8px", textTransform: "uppercase" }}>
                      Idioms of the Day
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                      {(data.idioms || []).map((item, i) => (
                        <div key={i} className="learn-item">
                          <div style={{ color: "var(--cyan)", fontWeight: 700, fontSize: "13px", marginBottom: "3px" }}>
                            {item.phrase}
                          </div>
                          <div style={{ color: "var(--muted)", fontSize: "12px", lineHeight: "1.45" }}>
                            {item.meaning}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <div style={{ color: "var(--gold)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "8px", textTransform: "uppercase" }}>
                      Vocabulary of the Day
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                      {(data.vocab || []).map((item, i) => (
                        <div key={i} className="learn-item">
                          <div style={{ display: "flex", alignItems: "baseline", gap: "6px", marginBottom: "3px" }}>
                            <span style={{ color: "var(--lime)", fontWeight: 700, fontSize: "13px" }}>{item.word}</span>
                            <span style={{ color: "var(--muted)", fontSize: "10px", fontStyle: "italic" }}>{item.pos}</span>
                          </div>
                          <div style={{ color: "var(--muted)", fontSize: "12px", lineHeight: "1.45" }}>
                            {item.definition}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    function SectionComponent({ user, section, sections, setSections, deleteSection, moveSection, setError }) {
      const [tasks, setTasks] = useState(section.tasks || []);
      const [newTaskText, setNewTaskText] = useState("");
      const [taskType, setTaskType] = useState("daily");
      const [isSubtaskMode, setIsSubtaskMode] = useState(false);
      const [forcedParentTaskId, setForcedParentTaskId] = useState(null);
      const newTaskInputRef = useRef(null);
      const today = getCurrentDate();

      useEffect(() => setTasks(section.tasks || []), [section.tasks]);

      function sameId(a, b) {
        return String(a) === String(b);
      }

      function applyTasks(nextTasks) {
        setTasks(nextTasks);
        const nextSections = sections.map((s) => (
          String(s.id) === String(section.id) ? { ...s, tasks: nextTasks } : s
        ));
        setSections(nextSections);
        cache.set(user.id, nextSections);
      }

      function reindexTasks(taskList) {
        return taskList.map((task, index) => ({ ...task, order_index: index }));
      }

      async function persistTaskOrder(taskList) {
        const updates = [];
        for (const task of taskList) {
          updates.push(supabase.from("tasks").update({ order_index: task.order_index }).eq("id", task.id));
          if (task.template_id) {
            updates.push(supabase.from("task_templates").update({ order_index: task.order_index }).eq("id", task.template_id));
          }
        }
        await Promise.all(updates);
      }

      function isDescendantOf(candidateId, ancestorId) {
        let current = tasks.find((task) => sameId(task.id, candidateId));
        const seen = new Set();

        while (current?.parent_task_id) {
          const key = String(current.id);
          if (seen.has(key)) break;
          seen.add(key);

          if (sameId(current.parent_task_id, ancestorId)) return true;
          current = tasks.find((task) => sameId(task.id, current.parent_task_id));
        }

        return false;
      }

      function findTaskBranchIds(rootId) {
        const ids = new Set([String(rootId)]);
        let changed = true;

        while (changed) {
          changed = false;
          tasks.forEach((task) => {
            if (task.parent_task_id && ids.has(String(task.parent_task_id)) && !ids.has(String(task.id))) {
              ids.add(String(task.id));
              changed = true;
            }
          });
        }

        return ids;
      }

      function findInsertIndexForParent(parentId) {
        const parentIndex = tasks.findIndex((task) => sameId(task.id, parentId));
        if (parentIndex < 0) return tasks.length;

        let i = parentIndex + 1;
        while (i < tasks.length && isDescendantOf(tasks[i].id, parentId)) i += 1;

        return i;
      }

      function startSubtaskFor(parentId) {
        setForcedParentTaskId(parentId);
        setIsSubtaskMode(true);
        setTimeout(() => newTaskInputRef.current?.focus(), 0);
      }

      async function addTask(e) {
        e.preventDefault();

        const text = newTaskText.trim();
        if (!text) return;

        const last = tasks[tasks.length - 1];
        const parentTaskId = forcedParentTaskId || (isSubtaskMode && last ? (last.parent_task_id || last.id) : null);
        const parentTask = parentTaskId ? tasks.find((task) => sameId(task.id, parentTaskId)) : null;
        const parentTemplateId = parentTask?.template_id || null;
        const insertIndex = parentTaskId ? findInsertIndexForParent(parentTaskId) : tasks.length;

        try {
          let createdTask = null;

          if (taskType === "daily") {
            const { data: templateData, error: templateError } = await supabase
              .from("task_templates")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                parent_task_id: parentTemplateId,
                order_index: insertIndex
              }])
              .select("id");

            if (templateError) throw templateError;

            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: templateData[0].id,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          } else {
            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: null,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          }

          const next = [...tasks];
          next.splice(insertIndex, 0, createdTask);
          const normalized = reindexTasks(next);

          applyTasks(normalized);
          await persistTaskOrder(normalized);

          setNewTaskText("");
          setIsSubtaskMode(false);
          setForcedParentTaskId(null);
        } catch (e) {
          setError("Failed to add task: " + e.message);
        }
      }

      async function toggleTask(taskId, completed) {
        const previousTasks = tasks;
        const nextTasks = tasks.map((task) => (
          sameId(task.id, taskId) ? { ...task, completed } : task
        ));

        applyTasks(nextTasks);

        try {
          const { data, error } = await supabase
            .from("tasks")
            .update({ completed })
            .eq("id", taskId)
            .eq("user_id", user.id)
            .select("id")
            .maybeSingle();

          if (error) throw error;
          if (!data) throw new Error("Supabase did not update this task.");

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to update task: " + e.message);
        }
      }

      async function deleteTask(taskId) {
        const branchIds = findTaskBranchIds(taskId);
        const tasksToDelete = tasks.filter((task) => branchIds.has(String(task.id)));
        if (tasksToDelete.length === 0) return;

        const templateIds = Array.from(new Set(
          tasksToDelete
            .map((task) => task.template_id)
            .filter(Boolean)
        ));

        const previousTasks = tasks;
        applyTasks(tasks.filter((task) => !branchIds.has(String(task.id))));

        try {
          const { error } = await supabase
            .from("tasks")
            .delete()
            .in("id", Array.from(branchIds))
            .eq("user_id", user.id);

          if (error) throw error;

          if (templateIds.length > 0) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .in("id", templateIds)
              .eq("user_id", user.id);

            if (templateError) throw templateError;
          }

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to delete task: " + e.message);
        }
      }

      async function updateTaskType(taskId, nextType) {
        const task = tasks.find((t) => sameId(t.id, taskId));
        if (!task) return;

        const isDaily = Boolean(task.template_id);
        if ((nextType === "daily" && isDaily) || (nextType === "one-time" && !isDaily)) return;

        const previousTasks = tasks;

        if (nextType === "one-time") {
          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, template_id: null } : t));

          try {
            const { error: taskError } = await supabase
              .from("tasks")
              .update({ template_id: null })
              .eq("id", taskId)
              .eq("user_id", user.id);

            if (taskError) throw taskError;

            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .eq("id", task.template_id)
              .eq("user_id", user.id);

            if (templateError) throw templateError;

            setError(null);
          } catch (e) {
            applyTasks(previousTasks);
            setError("Failed to switch task type: " + e.message);
          }

          return;
        }

        let newTemplateId = null;

        try {
          const parentTask = task.parent_task_id
            ? tasks.find((t) => sameId(t.id, task.parent_task_id))
            : null;
          const parentTemplateId = parentTask?.template_id || null;

          const { data: templateData, error: templateError } = await supabase
            .from("task_templates")
            .insert([{
              section_id: task.section_id,
              user_id: user.id,
              text: task.text,
              parent_task_id: parentTemplateId,
              order_index: task.order_index || 0
            }])
            .select("id")
            .single();

          if (templateError) throw templateError;
          newTemplateId = templateData.id;

          applyTasks(tasks.map((t) => (
            sameId(t.id, taskId) ? { ...t, template_id: newTemplateId } : t
          )));

          const { error: taskError } = await supabase
            .from("tasks")
            .update({ template_id: newTemplateId })
            .eq("id", taskId)
            .eq("user_id", user.id);

          if (taskError) throw taskError;

          setError(null);
        } catch (e) {
          if (newTemplateId) {
            try {
              await supabase
                .from("task_templates")
                .delete()
                .eq("id", newTemplateId)
                .eq("user_id", user.id);
            } catch {}
          }

          applyTasks(previousTasks);
          setError("Failed to switch task type: " + e.message);
        }
      }

      async function updateTaskParent(taskId, parentId) {
        const task = tasks.find((t) => sameId(t.id, taskId));

        try {
          if (parentId && isDescendantOf(parentId, taskId)) {
            setError("Cannot set parent to a descendant task.");
            return;
          }

          const { error } = await supabase
            .from("tasks")
            .update({ parent_task_id: parentId })
            .eq("id", taskId);

          if (error) throw error;

          if (task?.template_id) {
            const parentTask = parentId ? tasks.find((t) => sameId(t.id, parentId)) : null;
            const templateParentId = parentTask?.template_id || null;

            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ parent_task_id: templateParentId })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, parent_task_id: parentId } : t));
        } catch (e) {
          setError("Failed to update subtask status: " + e.message);
        }
      }

      async function moveTask(taskId, direction) {
        const index = tasks.findIndex((task) => sameId(task.id, taskId));
        const targetIndex = index + direction;

        if (index < 0 || targetIndex < 0 || targetIndex >= tasks.length) return;

        const a = tasks[index];
        const b = tasks[targetIndex];

        const aOrder = a.order_index ?? index;
        const bOrder = b.order_index ?? targetIndex;

        const next = tasks.map((task) => {
          if (sameId(task.id, a.id)) return { ...task, order_index: bOrder };
          if (sameId(task.id, b.id)) return { ...task, order_index: aOrder };
          return task;
        }).sort((x, y) => x.order_index - y.order_index);

        applyTasks(next);

        try {
          const updates = [
            supabase.from("tasks").update({ order_index: bOrder }).eq("id", a.id),
            supabase.from("tasks").update({ order_index: aOrder }).eq("id", b.id)
          ];

          if (a.template_id) updates.push(
            supabase.from("task_templates").update({ order_index: bOrder }).eq("id", a.template_id)
          );
          if (b.template_id) updates.push(
            supabase.from("task_templates").update({ order_index: aOrder }).eq("id", b.template_id)
          );

          await Promise.all(updates);
        } catch (e) {
          setError("Order sync failed: " + e.message);
        }
      }

      async function updateTaskText(taskId, newText) {
        const text = newText.trim();
        if (!text) return;

        try {
          const { error } = await supabase.from("tasks").update({ text }).eq("id", taskId);
          if (error) throw error;

          const task = tasks.find((t) => sameId(t.id, taskId));
          if (task?.template_id) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ text })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, text } : t));
        } catch (e) {
          setError("Update failed: " + e.message);
        }
      }

      function renderTaskComposer(isInline) {
        return (
          <form className={`row ${isInline ? "subtask-form" : ""}`} onSubmit={addTask}>
            <input
              className="in"
              ref={newTaskInputRef}
              type="text"
              value={newTaskText}
              placeholder={forcedParentTaskId ? "Add subtask under selected task..." : (isSubtaskMode ? "Add as subtask..." : "Add task...")}
              onChange={(e) => setNewTaskText(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Tab" && !forcedParentTaskId) {
                  e.preventDefault();
                  setIsSubtaskMode((v) => !v);
                }
              }}
            />
            <button type="button" className={`btn ${taskType === "daily" ? "" : "gray"}`} onClick={() => setTaskType("daily")}>Daily</button>
            <button type="button" className={`btn ${taskType === "one-time" ? "" : "gray"}`} onClick={() => setTaskType("one-time")}>One-Time</button>
            <button type="submit" className="btn">Add</button>
            {isInline && (
              <button
                type="button"
                className="btn gray"
                onClick={() => {
                  setForcedParentTaskId(null);
                  setIsSubtaskMode(false);
                  setNewTaskText("");
                }}
              >
                Cancel
              </button>
            )}
          </form>
        );
      }

      return (
        <>
          <div className="section-head">
            <div className="section-title">{section.name}</div>
            <div className="meta">
              <button className="icon" onClick={() => moveSection(section.id, -1)}>Up</button>
              <button className="icon" onClick={() => moveSection(section.id, 1)}>Dn</button>
              <button className="icon" onClick={() => deleteSection(section.id)}>Del</button>
            </div>
          </div>

          <ul className="tasks">
            {tasks.map((task) => (
              <React.Fragment key={task.id}>
                <TaskItem
                  task={task}
                  toggleTask={toggleTask}
                  deleteTask={deleteTask}
                  moveTask={moveTask}
                  updateTaskText={updateTaskText}
                  updateTaskParent={updateTaskParent}
                  updateTaskType={updateTaskType}
                  startSubtaskFor={startSubtaskFor}
                />
                {forcedParentTaskId && sameId(forcedParentTaskId, task.id) && renderTaskComposer(true)}
              </React.Fragment>
            ))}
          </ul>

          {!forcedParentTaskId && renderTaskComposer(false)}
        </>
      );
    }

    function TaskItem({ task, toggleTask, deleteTask, moveTask, updateTaskText, updateTaskParent, updateTaskType, startSubtaskFor }) {
      const [editing, setEditing] = useState(false);
      const [text, setText] = useState(task.text);

      useEffect(() => setText(task.text), [task.text]);

      function save() {
        const trimmed = text.trim();
        if (trimmed && trimmed !== task.text) updateTaskText(task.id, trimmed);
        setEditing(false);
      }

      return (
        <li className={`task ${task.completed ? "done" : ""} ${task.parent_task_id ? "sub" : ""}`}>
          <input
            className="check"
            type="checkbox"
            checked={Boolean(task.completed)}
            onChange={(e) => toggleTask(task.id, e.target.checked)}
          />

          <div style={{ flex: 1, minWidth: 0 }}>
            {editing ? (
              <input
                className="in"
                value={text}
                onChange={(e) => setText(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                  if (e.key === "Enter") save();
                  if (e.key === "Escape") {
                    setText(task.text);
                    setEditing(false);
                  }
                }}
                autoFocus
              />
            ) : (
              <span className="task-text" title="Click to edit" onClick={() => setEditing(true)}>
                {task.text}
              </span>
            )}
          </div>

          <div className="meta">
            <button className="icon" title="Add subtask below this task" onClick={() => startSubtaskFor(task.id)}>+</button>
            <button className="icon" title="Move up" onClick={() => moveTask(task.id, -1)}>{"\u2191"}</button>
            <button className="icon" title="Move down" onClick={() => moveTask(task.id, 1)}>{"\u2193"}</button>
            {task.parent_task_id && (
              <button className="icon" title="Remove parent" onClick={() => updateTaskParent(task.id, null)}>-</button>
            )}
            <button
              className={`badge type-toggle ${task.template_id ? "b1" : "b2"}`}
              title={task.template_id ? "Switch to one-time" : "Switch to daily"}
              type="button"
              onClick={() => updateTaskType(task.id, task.template_id ? "one-time" : "daily")}
            >
              {task.template_id ? "Daily" : "One-Time"}
            </button>
            <button className="icon" title="Delete task" onClick={() => deleteTask(task.id)}>{"\u00D7"}</button>
          </div>
        </li>
      );
    }

    const root = window.ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
