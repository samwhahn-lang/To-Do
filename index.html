                  <div className="acc-field-label" style={{ marginBottom: '4px' }}>{label}</div>
                  {items.map(e => (
                    <div key={e.id} style={{ fontSize: '13px', marginBottom: '4px', paddingLeft: '8px', borderLeft: '2px solid var(--line)', lineHeight: 1.45 }}>
                      <span style={{ color: 'var(--gold)', fontSize: '11px', marginRight: '8px' }}>
                        {fmtDate(e.entry_date, { weekday: 'short', month: 'short', day: 'numeric' })}
                      </span>
                      {e[field]}
                    </div>
                  ))}
                </div>
              );
            })}
          </>
        );
      }

      if (loading) return (
        <div>
          <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
          <div className="loading">Loading…</div>
        </div>
      );

      return (
        <div>
          <div className="friend-page-header">
            <button className="btn gray" style={{ padding: '4px 8px', fontSize: '11px' }} onClick={onBack}>← Back</button>
            <h1 style={{ color: 'var(--lime)', fontWeight: 800, fontSize: '1.1rem', textTransform: 'uppercase', letterSpacing: '.05em' }}>Accomplishments</h1>
            <div style={{ color: 'var(--muted)', fontSize: '11px' }}>{entries.length} entries</div>
          </div>

          <div className="acc-nav">
            {[['log', 'Log'], ['history', 'History'], ['summary', 'Summary'], ['export', 'Export'], ['audit', 'Audit']].map(([v, label]) => (
              <button key={v} className={`btn ${view === v ? '' : 'gray'}`} style={{ fontSize: '11px', padding: '5px 10px' }}
                onClick={() => setView(v)}>{label}</button>
            ))}
          </div>

          {pageError && <div className="panel error">{pageError}</div>}

          {view === 'log' && (
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
                <button className="btn gray" style={{ fontSize: '12px', padding: '5px 10px' }} onClick={() => shiftDate(-1)}>←</button>
                <input type="date" className="in" style={{ flex: 'none', width: 'auto' }} value={formDate}
                  onChange={e => { setFormDate(e.target.value); setSaved(false); }} />
                <button className="btn gray" style={{ fontSize: '12px', padding: '5px 10px' }} onClick={() => shiftDate(1)}>→</button>
                {editId
                  ? <span style={{ color: 'var(--cyan)', fontSize: '11px' }}>Editing saved entry</span>
                  : <span style={{ color: 'var(--muted)', fontSize: '11px' }}>No entry for this date</span>}
              </div>

              {[
                ['delivery',   'Delivery',   'What did you ship, complete, or hand off?'],
                ['management', 'Management', 'What did you do for your team or a direct report?'],
                ['unblocking', 'Unblocking', 'What obstacle did you remove?'],
              ].map(([key, label, placeholder]) => {
                const val = key === 'delivery' ? formDelivery : key === 'management' ? formManagement : formUnblocking;
                const setter = key === 'delivery' ? setFormDelivery : key === 'management' ? setFormManagement : setFormUnblocking;
                return (
                  <div key={key} style={{ marginBottom: '12px' }}>
                    <div className="acc-field-label" style={{ marginBottom: '4px' }}>{label}</div>
                    <textarea className="in" rows={2} placeholder={placeholder} value={val}
                      onChange={e => { setter(e.target.value); setSaved(false); }}
                      style={{ width: '100%', resize: 'vertical' }} />
                  </div>
                );
              })}

              <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
                <button className="btn" onClick={saveEntry} disabled={saving}>
                  {saving ? 'Saving…' : editId ? 'Update Entry' : 'Save Entry'}
                </button>
                {saved && <span style={{ color: 'var(--lime)', fontSize: '12px' }}>Saved</span>}
                {editId && (
                  <button className="btn gray" style={{ fontSize: '11px', marginLeft: 'auto', borderColor: 'var(--red)', color: 'var(--red)' }}
                    onClick={() => deleteEntry(editId)}>Delete</button>
                )}
              </div>
            </div>
          )}

          {view === 'history' && (
            <div>
              {entries.length === 0 ? (
                <div className="panel" style={{ color: 'var(--muted)', textAlign: 'center' }}>No entries yet.</div>
              ) : entries.map(entry => (
                <div key={entry.id} className="acc-card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                    <div className="acc-card-date">
                      {fmtDate(entry.entry_date, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
                    </div>
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <button className="btn gray" style={{ fontSize: '10px', padding: '3px 7px' }} onClick={() => jumpToEdit(entry)}>Edit</button>
                      <button className="btn gray" style={{ fontSize: '10px', padding: '3px 7px', borderColor: 'var(--red)', color: 'var(--red)' }}
                        onClick={() => deleteEntry(entry.id)}>×</button>
                    </div>
                  </div>
                  {[['Delivery', entry.delivery], ['Management', entry.management], ['Unblocking', entry.unblocking]].map(([label, val]) =>
                    nn(val) ? (
                      <div key={label} className="acc-field">
                        <div className="acc-field-label">{label}</div>
                        <div className="acc-field-value">{val}</div>
                      </div>
                    ) : null
                  )}
                  {!nn(entry.delivery) && !nn(entry.management) && !nn(entry.unblocking) && (
                    <div style={{ color: 'var(--muted)', fontSize: '12px', fontStyle: 'italic' }}>All none</div>
                  )}
                </div>
              ))}
            </div>
          )}

          {view === 'summary' && (
            <div>
              <div style={{ display: 'flex', gap: '6px', marginBottom: '16px' }}>
                {[['week', 'By Week'], ['month', 'By Month']].map(([k, label]) => (
                  <button key={k} className={`btn ${summaryWindow === k ? '' : 'gray'}`} style={{ fontSize: '11px', padding: '5px 10px' }}
                    onClick={() => setSummaryWindow(k)}>{label}</button>
                ))}
              </div>
              {entries.length === 0 ? (
                <div className="panel" style={{ color: 'var(--muted)', textAlign: 'center' }}>No entries to summarize yet.</div>
              ) : summaryWindow === 'week' ? (
                buildWeekGroups().map(group => (
                  <div key={group.key} className="acc-week-group">
                    <div className="acc-week-header">
                      {group.label} — {group.entries.length} {group.entries.length === 1 ? 'entry' : 'entries'}
                      {group.gaps.length > 0 && <span className="acc-gap-badge">{group.gaps.length} gap{group.gaps.length > 1 ? 's' : ''}</span>}
                    </div>
                    <SummaryEntryList groupEntries={group.entries} />
                    {group.gaps.length > 0 && (
                      <div style={{ color: 'var(--red)', fontSize: '11px', marginTop: '6px' }}>
                        Gaps: {group.gaps.map(g => {
                          const ds = g.replace(':allnone', '');
                          const fmt = fmtDate(ds, { weekday: 'short', month: 'short', day: 'numeric' });
                          return g.endsWith(':allnone') ? `${fmt} (all none)` : fmt;
                        }).join(', ')}
                      </div>
                    )}
                  </div>
                ))
              ) : (
                buildMonthGroups().map(group => (
                  <div key={group.key} className="acc-week-group">
                    <div className="acc-week-header">
                      {group.label} — {group.entries.length} {group.entries.length === 1 ? 'entry' : 'entries'}
                    </div>
                    <SummaryEntryList groupEntries={group.entries} />
                  </div>
                ))
              )}
            </div>
          )}

          {view === 'export' && (
            <div>
              <div style={{ display: 'flex', gap: '6px', marginBottom: '12px' }}>
                {[['30d', 'Last 30 days'], ['90d', 'Last 90 days'], ['all', 'All time']].map(([k, label]) => (
                  <button key={k} className={`btn ${exportWindow === k ? '' : 'gray'}`} style={{ fontSize: '11px', padding: '5px 10px' }}
                    onClick={() => setExportWindow(k)}>{label}</button>
                ))}
              </div>
              <textarea className="acc-export-box" rows={18} readOnly value={buildExport()} />
              <div style={{ marginTop: '8px' }}>
                <button className="btn cyan" style={{ fontSize: '11px' }} onClick={copyExport}>
                  {copied ? 'Copied!' : 'Copy to Clipboard'}
                </button>
              </div>
            </div>
          )}

          {view === 'audit' && (
            <div>
              {auditLog.length === 0 ? (
                <div className="panel" style={{ color: 'var(--muted)', textAlign: 'center' }}>No audit events yet.</div>
              ) : auditLog.map(event => (
                <div key={event.id} style={{ display: 'flex', gap: '10px', alignItems: 'flex-start', marginBottom: '8px', padding: '10px 12px', background: 'var(--panel)', border: '1px solid var(--line)', borderRadius: '4px' }}>
                  <span className={`badge ${event.action === 'insert' ? 'b1' : event.action === 'update' ? 'b2' : 'b3'}`}
                    style={{ flexShrink: 0, marginTop: '1px' }}>
                    {event.action.toUpperCase()}
                  </span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ marginBottom: '4px' }}>
                      <span style={{ color: 'var(--gold)', fontWeight: 700, fontSize: '11px' }}>
                        {fmtDate(event.entry_date, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
                      </span>
                      <span style={{ color: 'var(--muted)', fontSize: '11px', marginLeft: '10px' }}>
                        {new Date(event.created_at).toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}
                      </span>
                    </div>
                    {['delivery', 'management', 'unblocking'].map(field =>
                      event.snapshot[field] && event.snapshot[field] !== 'none' ? (
                        <div key={field} style={{ fontSize: '12px', color: 'var(--muted)', marginBottom: '2px' }}>
                          <span style={{ textTransform: 'uppercase', fontSize: '10px', fontWeight: 700, marginRight: '6px', color: 'var(--muted)' }}>{field}</span>
                          {event.snapshot[field]}
                        </div>
                      ) : null
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    const FRIEND_TIER_DEFAULTS = {
      close:     { contact: 21,  inperson: 90  },
      maintain:  { contact: 42,  inperson: 180 },
      dont_lose: { contact: 90,  inperson: 365 }
    };
    const FRIEND_TIER_LABELS = { close: 'Close', maintain: 'Maintain', dont_lose: "Don't Lose" };

    function FriendCard({
      friend, friendInteractions, stats,
      isLogOpen, logType, logDate, logNote, logSaving,
      onOpenLog, onSaveLog, onCancelLog, onSetLogType, onSetLogDate, onSetLogNote,
      isHistoryOpen, onToggleHistory, onDeleteInteraction,
      isEditOpen, editData, onStartEdit, onSaveEdit, onCancelEdit, onSetEditData,
      onDeleteFriend
    }) {
      function fmtDays(days) {
        if (days === null) return 'never';
        if (days === 0) return 'today';
        return `${days}d ago`;
      }

      if (isEditOpen) return (
        <div className="friend-card">
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '10px' }}>
            <input className="in" style={{ flex: 2, minWidth: '120px' }} value={editData.name}
              onChange={e => onSetEditData({ ...editData, name: e.target.value })} placeholder="Name" />
            <input className="in" style={{ flex: 1, minWidth: '100px' }} value={editData.city}
              onChange={e => onSetEditData({ ...editData, city: e.target.value })} placeholder="City (optional)" />
          </div>
          <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', flexWrap: 'wrap' }}>
            {['close', 'maintain', 'dont_lose'].map(t => (
              <button key={t} className={`btn ${editData.tier === t ? '' : 'gray'}`} style={{ fontSize: '11px', padding: '5px 8px' }}
                onClick={() => onSetEditData({ ...editData, tier: t, contact_interval_days: FRIEND_TIER_DEFAULTS[t].contact, inperson_interval_days: FRIEND_TIER_DEFAULTS[t].inperson })}>
                {FRIEND_TIER_LABELS[t]}
              </button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap', marginBottom: '10px' }}>
            <span style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase' }}>Contact every</span>
            <input className="in" type="number" min={1} style={{ width: '64px', flex: 'none' }}
              value={editData.contact_interval_days}
              onChange={e => onSetEditData({ ...editData, contact_interval_days: e.target.value })} />
            <span style={{ color: 'var(--muted)', fontSize: '11px' }}>days</span>
            <span style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase', marginLeft: '8px' }}>In-person every</span>
            <input className="in" type="number" min={1} style={{ width: '64px', flex: 'none' }}
              value={editData.inperson_interval_days}
              onChange={e => onSetEditData({ ...editData, inperson_interval_days: e.target.value })} />
            <span style={{ color: 'var(--muted)', fontSize: '11px' }}>days</span>
          </div>
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            <button className="btn" style={{ fontSize: '11px' }} onClick={onSaveEdit}>Save</button>
            <button className="btn gray" style={{ fontSize: '11px' }} onClick={onCancelEdit}>Cancel</button>
            <button className="btn gray" style={{ fontSize: '11px', marginLeft: 'auto', borderColor: 'var(--red)', color: 'var(--red)' }}
              onClick={() => onDeleteFriend(friend.id, friend.name)}>Delete</button>
          </div>
        </div>
      );

      return (
        <div className={`friend-card${stats.contactOverdue ? ' overdue' : ''}`}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap', marginBottom: '6px' }}>
            <span style={{ fontWeight: 800, fontSize: '14px' }}>{friend.name}</span>
            <span className={`friend-tier ${friend.tier}`}>{FRIEND_TIER_LABELS[friend.tier]}</span>
            {friend.city && <span style={{ color: 'var(--muted)', fontSize: '11px' }}>{friend.city}</span>}
            {stats.inPersonOverdue && (
              <span title="In-person gap exceeded" style={{ color: 'var(--gold)', fontSize: '11px', fontWeight: 700 }}>⚠ In-person overdue</span>
            )}
          </div>
          <div style={{ fontSize: '12px', color: stats.contactOverdue ? 'var(--red)' : 'var(--muted)', marginBottom: '8px' }}>
            Last contact: {fmtDays(stats.daysSinceContact)}
            {stats.contactOverdue && stats.daysSinceContact !== null && (
              <span> — {stats.overdueBy}d overdue</span>
            )}
            {stats.daysSinceInPerson !== null && (
              <span style={{ color: 'var(--muted)', marginLeft: '12px' }}>In-person: {fmtDays(stats.daysSinceInPerson)}</span>
            )}
          </div>
          <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
            <button className="btn cyan" style={{ fontSize: '11px', padding: '5px 8px' }}
              onClick={() => isLogOpen ? onCancelLog() : onOpenLog(friend.id)}>
              {isLogOpen ? 'Cancel' : '+ Log'}
            </button>
            <button className="btn gray" style={{ fontSize: '11px', padding: '5px 8px' }}
              onClick={() => onToggleHistory(friend.id)}>
              {isHistoryOpen ? 'Hide' : `History (${friendInteractions.length})`}
            </button>
            <button className="btn gray" style={{ fontSize: '11px', padding: '5px 8px' }}
              onClick={() => onStartEdit(friend)}>Edit</button>
          </div>

          {isLogOpen && (
            <div className="friend-log-form">
              <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', flexWrap: 'wrap' }}>
                {[['in_person', 'In Person'], ['text_exchange', 'Text / Call'], ['one_way_checkin', 'One-Way']].map(([val, label]) => (
                  <button key={val} className={`btn ${logType === val ? '' : 'gray'}`} style={{ fontSize: '11px', padding: '5px 8px' }}
                    onClick={() => onSetLogType(val)}>{label}</button>
                ))}
              </div>
              <div style={{ marginBottom: '8px' }}>
                <input type="date" className="in" style={{ width: 'auto' }} value={logDate} onChange={e => onSetLogDate(e.target.value)} />
              </div>
              <textarea className="in" rows={2} placeholder="Notes (optional)" value={logNote} onChange={e => onSetLogNote(e.target.value)}
                style={{ width: '100%', resize: 'vertical', marginBottom: '8px' }} />
              <div style={{ display: 'flex', gap: '6px' }}>
                <button className="btn" style={{ fontSize: '11px' }} onClick={onSaveLog} disabled={logSaving}>{logSaving ? 'Saving…' : 'Save'}</button>
                <button className="btn gray" style={{ fontSize: '11px' }} onClick={onCancelLog}>Cancel</button>
              </div>
            </div>
          )}

          {isHistoryOpen && (
            <div className="friend-history">
              {friendInteractions.length === 0 ? (
                <div style={{ color: 'var(--muted)', fontSize: '12px' }}>No interactions logged yet.</div>
              ) : (
                friendInteractions.map(i => (
                  <div key={i.id} className={`friend-interaction-row${i.interaction_type === 'one_way_checkin' ? ' one-way' : ''}`}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                      <div>
                        <span style={{ color: 'var(--gold)', fontWeight: 700 }}>{i.interacted_at}</span>
                        {' — '}
                        <span>{i.interaction_type === 'in_person' ? 'In Person' : i.interaction_type === 'text_exchange' ? 'Text / Call' : 'One-Way'}</span>
                        {i.notes && <div style={{ marginTop: '2px', opacity: .85 }}>{i.notes}</div>}
                      </div>
                      <button className="icon" style={{ fontSize: '11px', width: '22px', height: '22px', marginLeft: '8px', flexShrink: 0 }}
                        onClick={() => onDeleteInteraction(i.id)}>×</button>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      );
    }

    function FriendshipPage({ onBack, user }) {
      const [friends, setFriends] = useState([]);
      const [interactions, setInteractions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [pageError, setPageError] = useState(null);

      const [openFriend, setOpenFriend] = useState(null);
      const [logFor, setLogFor] = useState(null);
      const [logType, setLogType] = useState('text_exchange');
      const [logDate, setLogDate] = useState(getCurrentDate());
      const [logNote, setLogNote] = useState('');
      const [logSaving, setLogSaving] = useState(false);

      const [editFriend, setEditFriend] = useState(null);
      const [editData, setEditData] = useState({});

      const [addOpen, setAddOpen] = useState(false);
      const [addName, setAddName] = useState('');
      const [addCity, setAddCity] = useState('');
      const [addTier, setAddTier] = useState('maintain');
      const [addSaving, setAddSaving] = useState(false);

      const [overdueOpen, setOverdueOpen] = useState(true);

      useEffect(() => { loadData(); }, []);

      async function loadData() {
        setLoading(true);
        setPageError(null);
        try {
          const { data: fData, error: fErr } = await supabase
            .from('friends').select('*').eq('user_id', user.id).order('name');
          if (fErr) throw fErr;

          if (!fData.length) { setFriends([]); setInteractions([]); setLoading(false); return; }

          const ids = fData.map(f => f.id);
          const { data: iData, error: iErr } = await supabase
            .from('friend_interactions').select('*').in('friend_id', ids)
            .order('interacted_at', { ascending: false });
          if (iErr) throw iErr;

          setFriends(fData);
          setInteractions(iData || []);
        } catch (e) {
          setPageError(e.message);
        }
        setLoading(false);
      }

      function computeStats(friend) {
        const fi = interactions.filter(i => i.friend_id === friend.id);
        const byDate = [...fi].sort((a, b) => b.interacted_at.localeCompare(a.interacted_at));
        const lastAny = byDate[0];
        const lastIP = byDate.find(i => i.interaction_type === 'in_person');
        function daysDiff(dateStr) {
          if (!dateStr) return null;
          return Math.floor((new Date(getCurrentDate()) - new Date(dateStr)) / 86400000);
        }
        const daysSinceContact = daysDiff(lastAny?.interacted_at);
        const inPersonBaseline = lastIP?.interacted_at || (friend.created_at ? friend.created_at.split('T')[0] : null);
        const daysSinceInPerson = daysDiff(inPersonBaseline);
        const contactOverdue = daysSinceContact === null || daysSinceContact > friend.contact_interval_days;
        const inPersonOverdue = daysSinceInPerson === null || daysSinceInPerson > friend.inperson_interval_days;
        const overdueBy = daysSinceContact === null ? 9999 : Math.max(0, daysSinceContact - friend.contact_interval_days);
        return { daysSinceContact, daysSinceInPerson, contactOverdue, inPersonOverdue, overdueBy };
      }

      const overdueFriends = friends
        .map(f => ({ friend: f, stats: computeStats(f) }))
        .filter(({ stats }) => stats.contactOverdue)
        .sort((a, b) => b.stats.overdueBy - a.stats.overdueBy);

      function openLog(friendId) {
        setLogFor(friendId);
        setLogType('text_exchange');
        setLogDate(getCurrentDate());
        setLogNote('');
        setEditFriend(null);
        setOpenFriend(null);
      }

      async function saveLog() {
        if (!logFor) return;
        setLogSaving(true);
        try {
          const { error } = await supabase.from('friend_interactions').insert([{
            friend_id: logFor, user_id: user.id,
            interaction_type: logType, interacted_at: logDate,
            notes: logNote.trim() || null
          }]);
          if (error) throw error;
          setLogFor(null);
          await loadData();
        } catch (e) { setPageError(e.message); }
        setLogSaving(false);
      }

      async function addFriend(e) {
        e.preventDefault();
        if (!addName.trim()) return;
        setAddSaving(true);
        const def = FRIEND_TIER_DEFAULTS[addTier];
        try {
          const { error } = await supabase.from('friends').insert([{
            user_id: user.id, name: addName.trim(),
            city: addCity.trim() || null, tier: addTier,
            contact_interval_days: def.contact, inperson_interval_days: def.inperson
          }]);
          if (error) throw error;
          setAddName(''); setAddCity(''); setAddTier('maintain'); setAddOpen(false);
          await loadData();
        } catch (e) { setPageError(e.message); }
        setAddSaving(false);
      }

      function startEdit(friend) {
        setEditFriend(friend.id);
        setEditData({
          name: friend.name, city: friend.city || '',
          tier: friend.tier,
          contact_interval_days: friend.contact_interval_days,
          inperson_interval_days: friend.inperson_interval_days
        });
        setLogFor(null);
        setOpenFriend(null);
      }

      async function saveEdit() {
        try {
          const { error } = await supabase.from('friends').update({
            name: editData.name.trim(), city: editData.city.trim() || null,
            tier: editData.tier,
            contact_interval_days: parseInt(editData.contact_interval_days) || 1,
            inperson_interval_days: parseInt(editData.inperson_interval_days) || 1
          }).eq('id', editFriend);
          if (error) throw error;
          setEditFriend(null);
          await loadData();
        } catch (e) { setPageError(e.message); }
      }

      async function deleteFriend(friendId, name) {
        if (!confirm(`Remove ${name} from your list?`)) return;
        try {
          await supabase.from('friend_interactions').delete().eq('friend_id', friendId);
          const { error } = await supabase.from('friends').delete().eq('id', friendId);
          if (error) throw error;
          if (editFriend === friendId) setEditFriend(null);
          if (logFor === friendId) setLogFor(null);
          if (openFriend === friendId) setOpenFriend(null);
          await loadData();
        } catch (e) { setPageError(e.message); }
      }

      async function deleteInteraction(id) {
        try {
          const { error } = await supabase.from('friend_interactions').delete().eq('id', id);
          if (error) throw error;
          await loadData();
        } catch (e) { setPageError(e.message); }
      }

      function toggleHistory(friendId) {
        setOpenFriend(prev => prev === friendId ? null : friendId);
      }

      function renderCard(friend) {
        const stats = computeStats(friend);
        const fi = interactions
          .filter(i => i.friend_id === friend.id)
          .sort((a, b) => b.interacted_at.localeCompare(a.interacted_at));
        return (
          <FriendCard
            key={friend.id}
            friend={friend}
            friendInteractions={fi}
            stats={stats}
            isLogOpen={logFor === friend.id}
            logType={logType} logDate={logDate} logNote={logNote} logSaving={logSaving}
            onOpenLog={openLog} onSaveLog={saveLog} onCancelLog={() => setLogFor(null)}
            onSetLogType={setLogType} onSetLogDate={setLogDate} onSetLogNote={setLogNote}
            isHistoryOpen={openFriend === friend.id}
            onToggleHistory={toggleHistory}
            onDeleteInteraction={deleteInteraction}
            isEditOpen={editFriend === friend.id}
            editData={editData}
            onStartEdit={startEdit} onSaveEdit={saveEdit}
            onCancelEdit={() => setEditFriend(null)}
            onSetEditData={setEditData}
            onDeleteFriend={deleteFriend}
          />
        );
      }

      if (loading) return (
        <div>
          <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
          <div className="loading">Loading…</div>
        </div>
      );

      return (
        <div>
          <div className="friend-page-header">
            <button className="btn gray" style={{ padding: '4px 8px', fontSize: '11px' }} onClick={onBack}>← Back</button>
            <h1 style={{ color: 'var(--lime)', fontWeight: 800, fontSize: '1.1rem', textTransform: 'uppercase', letterSpacing: '.05em' }}>Friendships</h1>
            <button className="btn cyan" style={{ fontSize: '11px', padding: '5px 8px' }}
              onClick={() => setAddOpen(o => !o)}>{addOpen ? 'Cancel' : '+ Friend'}</button>
          </div>

          {pageError && <div className="panel error">{pageError}</div>}

          {addOpen && (
            <div className="panel">
              <form onSubmit={addFriend}>
                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '10px' }}>
                  <input className="in" style={{ flex: 2 }} value={addName} onChange={e => setAddName(e.target.value)} placeholder="Name" autoFocus />
                  <input className="in" style={{ flex: 1, minWidth: '120px' }} value={addCity} onChange={e => setAddCity(e.target.value)} placeholder="City (optional)" />
                </div>
                <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', flexWrap: 'wrap' }}>
                  {['close', 'maintain', 'dont_lose'].map(t => (
                    <button key={t} type="button" className={`btn ${addTier === t ? '' : 'gray'}`} style={{ fontSize: '11px' }}
                      onClick={() => setAddTier(t)}>{FRIEND_TIER_LABELS[t]}</button>
                  ))}
                </div>
                <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '10px' }}>
                  {FRIEND_TIER_LABELS[addTier]}: contact every {FRIEND_TIER_DEFAULTS[addTier].contact}d · in-person every {FRIEND_TIER_DEFAULTS[addTier].inperson}d
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button className="btn" type="submit" disabled={addSaving}>{addSaving ? 'Adding…' : 'Add'}</button>
                  <button className="btn gray" type="button" onClick={() => setAddOpen(false)}>Cancel</button>
                </div>
              </form>
            </div>
          )}

          {overdueFriends.length > 0 && (
            <div className="friend-overdue-section">
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: overdueOpen ? '10px' : 0 }}>
                <span style={{ color: 'var(--red)', fontWeight: 700, fontSize: '12px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                  Overdue — {overdueFriends.length}
                </span>
                <button className="btn gray" style={{ fontSize: '10px', padding: '3px 6px' }} onClick={() => setOverdueOpen(o => !o)}>
                  {overdueOpen ? 'Collapse' : 'Expand'}
                </button>
              </div>
              {overdueOpen && overdueFriends.map(({ friend }) => renderCard(friend))}
            </div>
          )}

          {friends.length === 0 ? (
            <div className="panel" style={{ textAlign: 'center' }}>
              <div style={{ color: 'var(--muted)', marginBottom: '8px' }}>No friends added yet.</div>
              <button className="btn cyan" style={{ fontSize: '11px' }} onClick={() => setAddOpen(true)}>+ Add your first friend</button>
            </div>
          ) : (
            <div>
              <div style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: '8px' }}>
                All — {friends.length}
              </div>
              {friends.map(f => renderCard(f))}
            </div>
          )}
        </div>
      );
    }

    function TaskApp({ user, sections, setSections, setError, loadSections, loadArchive, archive, showArchive, loadInfo }) {
      const [showMemory, setShowMemory] = useState(false);
      const [showFriendship, setShowFriendship] = useState(false);
      const [showAccomplishments, setShowAccomplishments] = useState(false);
      const [showNewSection, setShowNewSection] = useState(false);
      const [newSectionName, setNewSectionName] = useState("");
      const [undoStack, setUndoStack] = useState([]);
      const [learningCollapsed, setLearningCollapsed] = useState(false);

      function pushUndo(label, undoFn) {
        setUndoStack(prev => [...prev.slice(-4), { label, undo: undoFn }]);
      }

      async function applyUndo() {
        if (undoStack.length === 0) return;
        const top = undoStack[undoStack.length - 1];
        setUndoStack(prev => prev.slice(0, -1));
        try {
          await top.undo();
        } catch (e) {
          setError("Undo failed: " + e.message);
        }
      }

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const bar = document.querySelector('.bar');
        const offset = bar ? bar.getBoundingClientRect().height + 8 : 16;
        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - offset, behavior: 'smooth' });
      }

      function scrollToLearning(subId) {
        setLearningCollapsed(false);
        setTimeout(() => scrollToId(subId), 50);
      }

      const todayPretty = new Date().toLocaleDateString("en-US", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        timeZone: "America/New_York"
      });

      const totalTasksToday = sections.reduce((sum, section) => sum + (section.tasks?.length || 0), 0);

      const groupedArchive = (archive || []).reduce((acc, item) => {
        if (!acc[item.date]) acc[item.date] = [];
        acc[item.date].push(item);
        return acc;
      }, {});

      const sortedArchiveDays = Object.entries(groupedArchive)
        .sort(([a], [b]) => b.localeCompare(a))
        .map(([day, items]) => {
          const bySection = items.reduce((acc, item) => {
            const name = item.sections?.name || "No Section";
            if (!acc[name]) acc[name] = [];
            acc[name].push(item);
            return acc;
          }, {});
          const sortedSections = Object.entries(bySection).sort(([a], [b]) => a.localeCompare(b));
          return { day, sortedSections };
        });

      async function addSection(e) {
        e.preventDefault();
        if (!newSectionName.trim()) return;

        try {
          const { data, error } = await supabase
            .from("sections")
            .insert([{ user_id: user.id, name: newSectionName.trim(), order_index: sections.length }])
            .select();

          if (error) throw error;

          const next = [...sections, { ...data[0], tasks: [] }];
          setSections(next);
          cache.set(user.id, next);
          setNewSectionName("");
          setShowNewSection(false);
        } catch (e) {
          setError("Failed to create section: " + e.message);
        }
      }

      async function deleteSection(sectionId) {
        if (!confirm("Delete this section and all its tasks?")) return;

        try {
          const { error } = await supabase.from("sections").delete().eq("id", sectionId);
          if (error) throw error;

          const next = sections.filter((section) => section.id !== sectionId);
          setSections(next);
          cache.set(user.id, next);
        } catch (e) {
          setError("Failed to delete section: " + e.message);
        }
      }

      async function moveSection(sectionId, direction) {
        const index = sections.findIndex((section) => section.id === sectionId);
        const targetIndex = index + direction;
        if (index < 0 || targetIndex < 0 || targetIndex >= sections.length) return;

        const a = sections[index];
        const b = sections[targetIndex];

        const aOrder = a.order_index ?? index;
        const bOrder = b.order_index ?? targetIndex;

        const next = sections.map((section) => {
          if (section.id === a.id) return { ...section, order_index: bOrder };
          if (section.id === b.id) return { ...section, order_index: aOrder };
          return section;
        }).sort((x, y) => x.order_index - y.order_index);

        setSections(next);
        cache.set(user.id, next);

        try {
          await Promise.all([
            supabase.from("sections").update({ order_index: bOrder }).eq("id", a.id),
            supabase.from("sections").update({ order_index: aOrder }).eq("id", b.id)
          ]);
        } catch (e) {
          setError("Failed to sync section order: " + e.message);
        }
      }

      if (showMemory) return <MemoryTrainingPage user={user} onBack={() => setShowMemory(false)} />;
      if (showFriendship) return <FriendshipPage user={user} onBack={() => setShowFriendship(false)} />;
      if (showAccomplishments) return <AccomplishmentsPage user={user} onBack={() => setShowAccomplishments(false)} />;

      return (
        <>
          <h1 className="title">{todayPretty}</h1>
          <div className="tag">Task Protocol</div>

          <div className="bar">
            <div className="bar-top">
              <div className="left">
                <button className="btn gray" onClick={() => loadSections(user.id, true)}>Refresh</button>
                <button className="btn gray" onClick={loadArchive}>{showArchive ? "Hide Archive" : "History"}</button>
                <button
                  className="btn gray"
                  onClick={applyUndo}
                  disabled={undoStack.length === 0}
                  title={undoStack.length > 0 ? `Undo: ${undoStack[undoStack.length - 1].label}` : "Nothing to undo"}
                >Undo</button>
              </div>
              <button className="btn gray" onClick={() => supabase.auth.signOut()}>Sign Out</button>
            </div>
            <div className="bar-groups">
              <div className="bar-group">
                <div className="bar-group-label">Skill Building</div>
                <div className="bar-group-btns">
                  <button className="btn cyan" onClick={() => setShowMemory(true)}>Memory Training</button>
                  <button className="btn cyan" onClick={() => scrollToLearning('learning-idioms')}>Idioms</button>
                  <button className="btn cyan" onClick={() => scrollToLearning('learning-vocab')}>Vocab</button>
                </div>
              </div>
              <div className="bar-group">
                <div className="bar-group-label">Tracking</div>
                <div className="bar-group-btns">
                  <button className="btn" onClick={() => setShowAccomplishments(true)}>Accomplishments</button>
                  <button className="btn" onClick={() => setShowFriendship(true)}>Friendships</button>
                </div>
              </div>
              <div className="bar-group">
                <div className="bar-group-label">To-Do List</div>
                <div className="bar-group-btns">
                  {sections.map(section => (
                    <button key={section.id} className="btn gray" onClick={() => scrollToId(`section-${section.id}`)}>
                      {section.name}
                    </button>
                  ))}
                  <button className="btn gray" onClick={() => setShowNewSection(!showNewSection)}>+ New Section</button>
                </div>
              </div>
            </div>
          </div>

          {showNewSection && (
            <div className="panel">
              <form onSubmit={addSection}>
                <input
                  className="in"
                  type="text"
                  placeholder="Section Name"
                  value={newSectionName}
                  onChange={(e) => setNewSectionName(e.target.value)}
                />
                <div className="row">
                  <button className="btn" type="submit">Create</button>
                  <button className="btn gray" type="button" onClick={() => setShowNewSection(false)}>Cancel</button>
                </div>
              </form>
            </div>
          )}

          {showArchive && archive && (
            <div className="panel gold">
              <div className="section-title" style={{ color: "var(--gold)", marginBottom: "8px" }}>
                History by Day (Last 30 Days)
              </div>

              {sortedArchiveDays.length === 0 ? (
                <div style={{ color: "var(--muted)" }}>No history for the last 30 days.</div>
              ) : (
                sortedArchiveDays.map(({ day, sortedSections }) => (
                  <div className="history-day" key={day}>
                    <div className="history-date">{day}</div>
                    {sortedSections.map(([sectionName, tasks]) => (
                      <div key={sectionName} style={{ marginBottom: "8px" }}>
                        <div style={{ color: "var(--cyan)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "4px", textTransform: "uppercase" }}>
                          {sectionName}
                        </div>
                        <ul className="tasks">
                          {tasks.map((task, index) => (
                            <li key={`${day}-${sectionName}-${index}`} className="task" style={{ opacity: 0.85 }}>
                              <span className="task-text" style={{ textDecoration: task.completed ? "line-through" : "none" }}>
                                {task.text}
                              </span>
                              <div className="meta">
                                <span className={`badge ${task.template_id ? "b1" : "b2"}`}>
                                  {task.template_id ? "Daily" : "One-Time"}
                                </span>
                                <span className={`badge ${task.completed ? "b1" : "b3"}`}>
                                  {task.completed ? "Done" : "Open"}
                                </span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                ))
              )}
            </div>
          )}

          {loadInfo && (
            <div className={`panel ${loadInfo.taskCount === 0 ? "gold" : ""}`}>
              Loaded {loadInfo.taskCount} task{loadInfo.taskCount === 1 ? "" : "s"} for {loadInfo.today}.
              {" "}Daily/template-backed: {loadInfo.templateBackedCount}. Sections: {loadInfo.sectionCount}.
            </div>
          )}

          {sections.length === 0 && (
            <div className="panel gold">
              No sections found. Use <strong>+ New Section</strong> to create one, or <strong>Refresh</strong> to retry.
            </div>
          )}

          {sections.length > 0 && totalTasksToday === 0 && (
            <div className="panel gold">
              No tasks found for today. Add a task below to get started.
            </div>
          )}

          {sections.map((section) => (
            <div className="panel" key={section.id} id={`section-${section.id}`}>
              <SectionComponent
                user={user}
                section={section}
                sections={sections}
                setSections={setSections}
                deleteSection={deleteSection}
                moveSection={moveSection}
                setError={setError}
                pushUndo={pushUndo}
              />
            </div>
          ))}

          <LearningPanel user={user} collapsed={learningCollapsed} setCollapsed={setLearningCollapsed} />
        </>
      );
    }

    function LearningPanel({ user, collapsed, setCollapsed }) {
      const [data, setData] = useState(null);
      const [status, setStatus] = useState("loading");
      const [generating, setGenerating] = useState(false);
      const [errMsg, setErrMsg] = useState(null);

      useEffect(() => { loadLearning(false); }, []);

      async function loadLearning(forceNew) {
        setErrMsg(null);
        if (forceNew) {
          setGenerating(true);
        } else {
          setStatus("loading");
        }

        const today = getCurrentDate();

        if (!forceNew) {
          const cached = learningCache.get(user.id);
          if (cached) {
            setData(cached);
            setStatus("ready");
            return;
          }

          const { data: existing, error: fetchErr } = await supabase
            .from("daily_learning")
            .select("idioms,vocab")
            .eq("user_id", user.id)
            .eq("date", today)
            .maybeSingle();

          if (fetchErr) {
            setErrMsg("Could not load learning data: " + fetchErr.message);
            setStatus("error");
            return;
          }

          if (existing) {
            const payload = { idioms: existing.idioms, vocab: existing.vocab };
            setData(payload);
            learningCache.set(user.id, payload);
            setStatus("ready");
            return;
          }
        }

        const pools = await fetchPools();
        const idioms = pickRandom(pools.idioms, 10);
        const vocab = pickRandom(pools.vocab, 10);
        const payload = { idioms, vocab };

        const { error: upsertErr } = await supabase
          .from("daily_learning")
          .upsert(
            { user_id: user.id, date: today, idioms, vocab, updated_at: new Date().toISOString() },
            { onConflict: "user_id,date" }
          );

        if (upsertErr) {
          setErrMsg("Could not save learning data: " + upsertErr.message);
        }

        setData(payload);
        learningCache.set(user.id, payload);
        setStatus("ready");
        setGenerating(false);
      }

      return (
        <div className="panel cyan" id="learning-panel">
          <div className="section-head">
            <div className="section-title" style={{ color: "var(--cyan)" }}>Learning</div>
            <div className="meta">
              <button
                className="btn cyan"
                style={{ fontSize: "11px", padding: "4px 10px" }}
                disabled={generating}
                onClick={() => loadLearning(true)}
              >
                {generating ? "Generating..." : "Generate New"}
              </button>
              <button className="icon" onClick={() => setCollapsed((v) => !v)}>
                {collapsed ? "+" : "\u2212"}
              </button>
            </div>
          </div>

          {!collapsed && (
            <>
              {status === "loading" && (
                <div style={{ color: "var(--muted)", padding: "8px 0" }}>Loading today's learning content...</div>
              )}
              {errMsg && (
                <div style={{ color: "var(--red)", marginBottom: "10px", fontSize: "12px" }}>{errMsg}</div>
              )}
              {status === "ready" && data && (
                <div className="learning-grid">
                  <div id="learning-idioms">
                    <div style={{ color: "var(--gold)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "8px", textTransform: "uppercase" }}>
                      Idioms of the Day
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                      {(data.idioms || []).map((item, i) => (
                        <div key={i} className="learn-item">
                          <div style={{ color: "var(--cyan)", fontWeight: 700, fontSize: "13px", marginBottom: "3px" }}>
                            {item.phrase}
                          </div>
                          <div style={{ color: "var(--muted)", fontSize: "12px", lineHeight: "1.45" }}>
                            {item.meaning}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div id="learning-vocab">
                    <div style={{ color: "var(--gold)", fontSize: "11px", fontWeight: 700, letterSpacing: ".1em", marginBottom: "8px", textTransform: "uppercase" }}>
                      Vocabulary of the Day
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                      {(data.vocab || []).map((item, i) => (
                        <div key={i} className="learn-item">
                          <div style={{ display: "flex", alignItems: "baseline", gap: "6px", marginBottom: "3px" }}>
                            <span style={{ color: "var(--lime)", fontWeight: 700, fontSize: "13px" }}>{item.word}</span>
                            <span style={{ color: "var(--muted)", fontSize: "10px", fontStyle: "italic" }}>{item.pos}</span>
                          </div>
                          <div style={{ color: "var(--muted)", fontSize: "12px", lineHeight: "1.45" }}>
                            {item.definition}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    function SectionComponent({ user, section, sections, setSections, deleteSection, moveSection, setError, pushUndo }) {
      const [tasks, setTasks] = useState(section.tasks || []);
      const [newTaskText, setNewTaskText] = useState("");
      const [taskType, setTaskType] = useState("daily");
      const [isSubtaskMode, setIsSubtaskMode] = useState(false);
      const [forcedParentTaskId, setForcedParentTaskId] = useState(null);
      const [draggedId, setDraggedId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const [dropAbove, setDropAbove] = useState(true);
      const newTaskInputRef = useRef(null);
      const sectionsRef = useRef(sections);
      const today = getCurrentDate();

      useEffect(() => setTasks(section.tasks || []), [section.tasks]);
      useEffect(() => { sectionsRef.current = sections; }, [sections]);

      function sameId(a, b) {
        return String(a) === String(b);
      }

      function applyTasks(nextTasks) {
        setTasks(nextTasks);
        const nextSections = sectionsRef.current.map((s) => (
          String(s.id) === String(section.id) ? { ...s, tasks: nextTasks } : s
        ));
        setSections(nextSections);
        cache.set(user.id, nextSections);
      }

      function reindexTasks(taskList) {
        return taskList.map((task, index) => ({ ...task, order_index: index }));
      }

      async function persistTaskOrder(taskList) {
        const updates = [];
        for (const task of taskList) {
          updates.push(supabase.from("tasks").update({ order_index: task.order_index }).eq("id", task.id));
          if (task.template_id) {
            updates.push(supabase.from("task_templates").update({ order_index: task.order_index }).eq("id", task.template_id));
          }
        }
        await Promise.all(updates);
      }

      function isDescendantOf(candidateId, ancestorId) {
        let current = tasks.find((task) => sameId(task.id, candidateId));
        const seen = new Set();

        while (current?.parent_task_id) {
          const key = String(current.id);
          if (seen.has(key)) break;
          seen.add(key);

          if (sameId(current.parent_task_id, ancestorId)) return true;
          current = tasks.find((task) => sameId(task.id, current.parent_task_id));
        }

        return false;
      }

      function findTaskBranchIds(rootId) {
        const ids = new Set([String(rootId)]);
        let changed = true;

        while (changed) {
          changed = false;
          tasks.forEach((task) => {
            if (task.parent_task_id && ids.has(String(task.parent_task_id)) && !ids.has(String(task.id))) {
              ids.add(String(task.id));
              changed = true;
            }
          });
        }

        return ids;
      }

      function findInsertIndexForParent(parentId) {
        const parentIndex = tasks.findIndex((task) => sameId(task.id, parentId));
        if (parentIndex < 0) return tasks.length;

        let i = parentIndex + 1;
        while (i < tasks.length && isDescendantOf(tasks[i].id, parentId)) i += 1;

        return i;
      }

      function startSubtaskFor(parentId) {
        setForcedParentTaskId(parentId);
        setIsSubtaskMode(true);
        setTimeout(() => newTaskInputRef.current?.focus(), 0);
      }

      async function addTask(e) {
        e.preventDefault();

        const text = newTaskText.trim();
        if (!text) return;

        const previousTasks = tasks;

        const last = tasks[tasks.length - 1];
        const parentTaskId = forcedParentTaskId || (isSubtaskMode && last ? (last.parent_task_id || last.id) : null);
        const parentTask = parentTaskId ? tasks.find((task) => sameId(task.id, parentTaskId)) : null;
        const parentTemplateId = parentTask?.template_id || null;
        const insertIndex = parentTaskId ? findInsertIndexForParent(parentTaskId) : tasks.length;

        try {
          let createdTask = null;

          if (taskType === "daily") {
            const { data: templateData, error: templateError } = await supabase
              .from("task_templates")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                parent_task_id: parentTemplateId,
                order_index: insertIndex
              }])
              .select("id");

            if (templateError) throw templateError;

            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: templateData[0].id,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          } else {
            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: null,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          }

          const next = [...tasks];
          next.splice(insertIndex, 0, createdTask);
          const normalized = reindexTasks(next);

          applyTasks(normalized);
          await persistTaskOrder(normalized);

          pushUndo(`Add "${text}"`, async () => {
            await supabase.from("tasks").delete().eq("id", createdTask.id).eq("user_id", user.id);
            if (createdTask.template_id) {
              await supabase.from("task_templates").delete().eq("id", createdTask.template_id).eq("user_id", user.id);
            }
            applyTasks(previousTasks);
          });

          setNewTaskText("");
          setIsSubtaskMode(false);
          setForcedParentTaskId(null);
        } catch (e) {
          setError("Failed to add task: " + e.message);
        }
      }

      async function toggleTask(taskId, completed) {
        const previousTasks = tasks;
        const nextTasks = tasks.map((task) => (
          sameId(task.id, taskId) ? { ...task, completed } : task
        ));

        const taskText = previousTasks.find(t => sameId(t.id, taskId))?.text ?? '';
        pushUndo(`${completed ? "Complete" : "Uncomplete"} "${taskText}"`, async () => {
          await supabase.from("tasks").update({ completed: !completed }).eq("id", taskId).eq("user_id", user.id);
          applyTasks(previousTasks);
        });

        applyTasks(nextTasks);

        try {
          const { data, error } = await supabase
            .from("tasks")
            .update({ completed })
            .eq("id", taskId)
            .eq("user_id", user.id)
            .select("id")
            .maybeSingle();

          if (error) throw error;
          if (!data) throw new Error("Supabase did not update this task.");

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to update task: " + e.message);
        }
      }

      async function deleteTask(taskId) {
        const branchIds = findTaskBranchIds(taskId);
        const tasksToDelete = tasks.filter((task) => branchIds.has(String(task.id)));
        if (tasksToDelete.length === 0) return;

        const templateIds = Array.from(new Set(
          tasksToDelete
            .map((task) => task.template_id)
            .filter(Boolean)
        ));

        let templatesToRestore = [];
        if (templateIds.length > 0) {
          const { data } = await supabase
            .from("task_templates")
            .select("*")
            .in("id", templateIds)
            .eq("user_id", user.id);
          templatesToRestore = data || [];
        }

        const previousTasks = tasks;
        applyTasks(tasks.filter((task) => !branchIds.has(String(task.id))));

        const rootText = tasksToDelete.find(t => sameId(t.id, taskId))?.text ?? "task";
        pushUndo(`Delete "${rootText}"`, async () => {
          if (templatesToRestore.length > 0) {
            await supabase.from("task_templates").insert(templatesToRestore);
          }
          await supabase.from("tasks").insert(tasksToDelete.map(t => ({ ...t, user_id: user.id })));
          applyTasks(previousTasks);
        });

        try {
          const { error } = await supabase
            .from("tasks")
            .delete()
            .in("id", Array.from(branchIds))
            .eq("user_id", user.id);

          if (error) throw error;

          if (templateIds.length > 0) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .in("id", templateIds)
              .eq("user_id", user.id);

            if (templateError) throw templateError;
          }

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to delete task: " + e.message);
        }
      }

      async function updateTaskType(taskId, nextType) {
        const task = tasks.find((t) => sameId(t.id, taskId));
        if (!task) return;

        const isDaily = Boolean(task.template_id);
        if ((nextType === "daily" && isDaily) || (nextType === "one-time" && !isDaily)) return;

        const previousTasks = tasks;

        if (nextType === "one-time") {
          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, template_id: null } : t));

          try {
            const { error: taskError } = await supabase
              .from("tasks")
              .update({ template_id: null })
              .eq("id", taskId)
              .eq("user_id", user.id);

            if (taskError) throw taskError;

            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .eq("id", task.template_id)
              .eq("user_id", user.id);

            if (templateError) throw templateError;

            setError(null);
          } catch (e) {
            applyTasks(previousTasks);
            setError("Failed to switch task type: " + e.message);
          }

          return;
        }

        let newTemplateId = null;

        try {
          const parentTask = task.parent_task_id
            ? tasks.find((t) => sameId(t.id, task.parent_task_id))
            : null;
          const parentTemplateId = parentTask?.template_id || null;

          const { data: templateData, error: templateError } = await supabase
            .from("task_templates")
            .insert([{
              section_id: task.section_id,
              user_id: user.id,
              text: task.text,
              parent_task_id: parentTemplateId,
              order_index: task.order_index || 0
            }])
            .select("id")
            .single();

          if (templateError) throw templateError;
          newTemplateId = templateData.id;

          applyTasks(tasks.map((t) => (
            sameId(t.id, taskId) ? { ...t, template_id: newTemplateId } : t
          )));

          const { error: taskError } = await supabase
            .from("tasks")
            .update({ template_id: newTemplateId })
            .eq("id", taskId)
            .eq("user_id", user.id);

          if (taskError) throw taskError;

          setError(null);
        } catch (e) {
          if (newTemplateId) {
            try {
              await supabase
                .from("task_templates")
                .delete()
                .eq("id", newTemplateId)
                .eq("user_id", user.id);
            } catch {}
          }

          applyTasks(previousTasks);
          setError("Failed to switch task type: " + e.message);
        }
      }

      async function updateTaskParent(taskId, parentId) {
        const task = tasks.find((t) => sameId(t.id, taskId));

        try {
          if (parentId && isDescendantOf(parentId, taskId)) {
            setError("Cannot set parent to a descendant task.");
            return;
          }

          const { error } = await supabase
            .from("tasks")
            .update({ parent_task_id: parentId })
            .eq("id", taskId);

          if (error) throw error;

          if (task?.template_id) {
            const parentTask = parentId ? tasks.find((t) => sameId(t.id, parentId)) : null;
            const templateParentId = parentTask?.template_id || null;

            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ parent_task_id: templateParentId })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, parent_task_id: parentId } : t));
        } catch (e) {
          setError("Failed to update subtask status: " + e.message);
        }
      }

      async function moveTask(taskId, direction) {
        const previousNormalized = reindexTasks([...tasks]);
        const blockStart = tasks.findIndex((task) => sameId(task.id, taskId));
        if (blockStart < 0) return;

        // Collect the entire branch (this task + all descendants)
        const branchIds = findTaskBranchIds(taskId);
        const branchTasks = tasks.filter((t) => branchIds.has(String(t.id)));
        const otherTasks = tasks.filter((t) => !branchIds.has(String(t.id)));

        // No branch elements appear before the root, so position in otherTasks equals blockStart
        const newPos = blockStart + direction;
        if (newPos < 0 || newPos > otherTasks.length) return;

        const next = [
          ...otherTasks.slice(0, newPos),
          ...branchTasks,
          ...otherTasks.slice(newPos)
        ];

        const normalized = reindexTasks(next);
        applyTasks(normalized);

        const movedText = tasks.find(t => sameId(t.id, taskId))?.text ?? "task";
        pushUndo(`Move "${movedText}"`, async () => {
          applyTasks(previousNormalized);
          await persistTaskOrder(previousNormalized);
        });

        try {
          await persistTaskOrder(normalized);
        } catch (e) {
          setError("Order sync failed: " + e.message);
        }
      }

      async function moveTaskToPosition(fromTaskId, toTaskId, above) {
        if (sameId(fromTaskId, toTaskId)) return;
        const previousNormalized = reindexTasks([...tasks]);
        const branchIds = findTaskBranchIds(fromTaskId);
        if (branchIds.has(String(toTaskId))) return;

        const branchTasks = tasks.filter(t => branchIds.has(String(t.id)));
        const otherTasks = tasks.filter(t => !branchIds.has(String(t.id)));

        const targetIdx = otherTasks.findIndex(t => sameId(t.id, toTaskId));
        if (targetIdx < 0) return;

        const insertAt = above ? targetIdx : targetIdx + 1;
        const next = [
          ...otherTasks.slice(0, insertAt),
          ...branchTasks,
          ...otherTasks.slice(insertAt)
        ];

        const normalized = reindexTasks(next);
        applyTasks(normalized);

        const movedText = tasks.find(t => sameId(t.id, fromTaskId))?.text ?? "task";
        pushUndo(`Move "${movedText}"`, async () => {
          applyTasks(previousNormalized);
          await persistTaskOrder(previousNormalized);
        });

        try {
          await persistTaskOrder(normalized);
        } catch (e) {
          setError("Order sync failed: " + e.message);
        }
      }

      async function updateTaskText(taskId, newText) {
        const text = newText.trim();
        if (!text) return;

        try {
          const { error } = await supabase.from("tasks").update({ text }).eq("id", taskId);
          if (error) throw error;

          const task = tasks.find((t) => sameId(t.id, taskId));
          if (task?.template_id) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ text })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, text } : t));
        } catch (e) {
          setError("Update failed: " + e.message);
        }
      }

      function renderTaskComposer(isInline) {
        return (
          <form className={`row ${isInline ? "subtask-form" : ""}`} onSubmit={addTask}>
            <input
              className="in"
              ref={newTaskInputRef}
              type="text"
              value={newTaskText}
              placeholder={forcedParentTaskId ? "Add subtask under selected task..." : (isSubtaskMode ? "Add as subtask..." : "Add task...")}
              onChange={(e) => setNewTaskText(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Tab" && !forcedParentTaskId) {
                  e.preventDefault();
                  setIsSubtaskMode((v) => !v);
                }
              }}
            />
            <button type="button" className={`btn ${taskType === "daily" ? "" : "gray"}`} onClick={() => setTaskType("daily")}>Daily</button>
            <button type="button" className={`btn ${taskType === "one-time" ? "" : "gray"}`} onClick={() => setTaskType("one-time")}>One-Time</button>
            <button type="submit" className="btn">Add</button>
            {isInline && (
              <button
                type="button"
                className="btn gray"
                onClick={() => {
                  setForcedParentTaskId(null);
                  setIsSubtaskMode(false);
                  setNewTaskText("");
                }}
              >
                Cancel
              </button>
            )}
          </form>
        );
      }

      return (
        <>
          <div className="section-head">
            <div className="section-title">{section.name}</div>
            <div className="meta">
              <button className="icon" onClick={() => moveSection(section.id, -1)}>Up</button>
              <button className="icon" onClick={() => moveSection(section.id, 1)}>Dn</button>
              <button className="icon" onClick={() => deleteSection(section.id)}>Del</button>
            </div>
          </div>

          <ul className="tasks">
            {tasks.map((task) => (
              <React.Fragment key={task.id}>
                <TaskItem
                  task={task}
                  toggleTask={toggleTask}
                  deleteTask={deleteTask}
                  updateTaskText={updateTaskText}
                  updateTaskParent={updateTaskParent}
                  updateTaskType={updateTaskType}
                  startSubtaskFor={startSubtaskFor}
                  draggedId={draggedId}
                  dragOverId={dragOverId}
                  dropAbove={dropAbove}
                  onDragStart={(id) => setDraggedId(id)}
                  onDragOver={(id, above) => { setDragOverId(id); setDropAbove(above); }}
                  onDragEnd={() => { setDraggedId(null); setDragOverId(null); }}
                  onDrop={(targetId, above) => {
                    if (draggedId && !sameId(draggedId, targetId)) {
                      moveTaskToPosition(draggedId, targetId, above);
                    }
                    setDraggedId(null);
                    setDragOverId(null);
                  }}
                />
                {forcedParentTaskId && sameId(forcedParentTaskId, task.id) && renderTaskComposer(true)}
              </React.Fragment>
            ))}
          </ul>

          {!forcedParentTaskId && renderTaskComposer(false)}
        </>
      );
    }

    function TaskItem({ task, toggleTask, deleteTask, updateTaskText, updateTaskParent, updateTaskType, startSubtaskFor, draggedId, dragOverId, dropAbove, onDragStart, onDragOver, onDragEnd, onDrop }) {
      const [editing, setEditing] = useState(false);
      const [text, setText] = useState(task.text);

      useEffect(() => setText(task.text), [task.text]);

      function save() {
        const trimmed = text.trim();
        if (trimmed && trimmed !== task.text) updateTaskText(task.id, trimmed);
        setEditing(false);
      }

      const isDragging = String(draggedId) === String(task.id);
      const isDragOver = String(dragOverId) === String(task.id) && !isDragging;

      return (
        <li
          className={`task ${task.completed ? "done" : ""} ${task.parent_task_id ? "sub" : ""} ${isDragging ? "dragging" : ""} ${isDragOver && dropAbove ? "drag-over-top" : ""} ${isDragOver && !dropAbove ? "drag-over-bottom" : ""}`}
          draggable={true}
          onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; onDragStart(task.id); }}
          onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; const rect = e.currentTarget.getBoundingClientRect(); onDragOver(task.id, e.clientY < rect.top + rect.height / 2); }}
          onDragEnd={onDragEnd}
          onDrop={(e) => { e.preventDefault(); const rect = e.currentTarget.getBoundingClientRect(); onDrop(task.id, e.clientY < rect.top + rect.height / 2); }}
        >
          <input
            className="check"
            type="checkbox"
            checked={Boolean(task.completed)}
            onChange={(e) => toggleTask(task.id, e.target.checked)}
          />

          <div style={{ flex: 1, minWidth: 0 }}>
            {editing ? (
              <input
                className="in"
                value={text}
                onChange={(e) => setText(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                  if (e.key === "Enter") save();
                  if (e.key === "Escape") {
                    setText(task.text);
                    setEditing(false);
                  }
                }}
                autoFocus
              />
            ) : (
              <span className="task-text" title="Click to edit" onClick={() => setEditing(true)}>
                {task.text}
              </span>
            )}
          </div>

          <div className="meta">
            <div className="drag-handle" title="Drag to reorder">
              <span></span><span></span><span></span>
            </div>
            <button className="icon" title="Add subtask below this task" onClick={() => startSubtaskFor(task.id)}>+</button>
            {task.parent_task_id && (
              <button className="icon" title="Remove parent" onClick={() => updateTaskParent(task.id, null)}>-</button>
            )}
            <button
              className={`badge type-toggle ${task.template_id ? "b1" : "b2"}`}
              title={task.template_id ? "Switch to one-time" : "Switch to daily"}
              type="button"
              onClick={() => updateTaskType(task.id, task.template_id ? "one-time" : "daily")}
            >
              {task.template_id ? "Daily" : "One-Time"}
            </button>
            <button className="icon" title="Delete task" onClick={() => deleteTask(task.id)}>{"\u00D7"}</button>
          </div>
        </li>
      );
    }

    const root = window.ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
