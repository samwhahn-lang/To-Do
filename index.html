<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task System</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --panel: #1a1a1a;
      --panel2: #2d2d2d;
      --line: #3a3a3a;
      --text: #e8e8e8;
      --muted: #777;
      --lime: #d4ff00;
      --cyan: #00fff5;
      --red: #ff6b6b;
      --gold: #ffd700;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 100vh;
    }

    #root {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .title {
      color: var(--lime);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .tag {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      margin-bottom: 18px;
      text-align: center;
      text-transform: uppercase;
    }

    .panel {
      background: var(--panel);
      border-left: 4px solid var(--lime);
      margin-bottom: 14px;
      padding: 14px;
    }

    .panel.error {
      border-left-color: var(--red);
      color: #ffb5b5;
    }

    .panel.gold {
      border-left-color: var(--gold);
    }

    .panel.cyan {
      border-left-color: var(--cyan);
    }

    .bar {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .bar-top {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      padding-bottom: 8px;
      width: 100%;
    }

    .bar-groups {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      width: 100%;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .bar-group-label {
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .bar-group-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 10px;
      text-transform: uppercase;
    }

    .btn.gray {
      border-color: var(--muted);
      color: var(--muted);
    }

    .btn.cyan {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn:hover {
      background: rgba(212,255,0,.1);
    }

    .btn:disabled {
      cursor: default;
      opacity: .35;
    }

    .btn.cyan:hover {
      background: rgba(0,255,245,.08);
    }

    .in {
      background: var(--panel2);
      border: 1px solid var(--muted);
      color: var(--text);
      flex: 1;
      font-family: inherit;
      min-width: 180px;
      padding: 10px;
      width: 100%;
    }

    .in:focus {
      border-color: var(--lime);
      outline: none;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .section-head {
      align-items: center;
      border-bottom: 1px solid var(--panel2);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
    }

    .section-title {
      color: var(--lime);
      font-weight: 800;
      text-transform: uppercase;
    }

    .tasks {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    .task {
      align-items: flex-start;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .task.sub {
      border-left: 2px solid var(--cyan);
      margin-left: 20px;
    }

    .task.done {
      opacity: .55;
    }

    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-text {
      cursor: pointer;
      word-break: break-word;
    }

    .meta {
      align-items: center;
      display: flex;
      flex-shrink: 0;
      gap: 6px;
      margin-left: auto;
    }

    .icon {
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      height: 30px;
      line-height: 1;
      width: 30px;
    }

    .icon:hover {
      border-color: var(--lime);
      color: var(--lime);
    }

    .drag-handle {
      align-items: center;
      background: transparent;
      border: none;
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 3px;
      justify-content: center;
      padding: 4px 6px;
    }

    .drag-handle span {
      background: var(--muted);
      border-radius: 1px;
      display: block;
      height: 2px;
      width: 14px;
    }

    .drag-handle:hover span {
      background: var(--lime);
    }

    .task.dragging {
      opacity: 0.35;
    }

    .task.drag-over-top {
      border-top: 2px solid var(--lime);
    }

    .task.drag-over-bottom {
      border-bottom: 2px solid var(--lime);
    }

    .badge {
      border: 1px solid;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.type-toggle {
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .badge.type-toggle:hover {
      background: rgba(212,255,0,.1);
    }

    .check {
      accent-color: var(--lime);
      cursor: pointer;
      flex-shrink: 0;
      height: 18px;
      margin-top: 2px;
      width: 18px;
    }

    .b1 { border-color: var(--lime); color: var(--lime); }
    .b2 { border-color: var(--cyan); color: var(--cyan); }
    .b3 { border-color: var(--gold); color: var(--gold); }

    .auth {
      background: var(--panel);
      border: 1px solid var(--panel2);
      margin: 40px auto;
      max-width: 460px;
      padding: 18px;
    }

    .loading {
      color: var(--muted);
      padding: 30px;
      text-align: center;
    }

    .subtask-form {
      margin: 8px 0 8px 24px;
    }

    .history-day {
      margin-bottom: 14px;
    }

    .history-date {
      color: var(--gold);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .learning-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .learn-item {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
    }

    @media (max-width: 700px) {
      #root { padding: 14px 8px; }

      .task {
        align-items: flex-start;
        min-height: 56px;
        padding: 10px 8px;
      }

      .task > div[style] {
        min-width: 0;
      }

      .task-text {
        display: block;
        line-height: 1.35;
        white-space: normal;
      }

      .meta {
        flex-wrap: nowrap;
        gap: 4px;
      }

      .icon {
        border-radius: 5px;
        font-size: 13px;
        height: 28px;
        width: 28px;
      }

      .badge {
        display: inline-block;
        font-size: 9px;
        padding: 2px 5px;
      }

      .task.sub {
        margin-left: 8px;
      }

      .subtask-form {
        margin-left: 10px;
      }

      .learning-grid {
        grid-template-columns: 1fr;
      }
    }

    .memory-header {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 10px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .memory-timer {
      color: var(--lime);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: .05em;
    }

    .memory-setup {
      max-width: 560px;
      margin: 0 auto;
    }

    .memory-duration-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .memory-progress-bar {
      background: var(--panel2);
      border-radius: 2px;
      height: 6px;
      overflow: hidden;
      width: 100%;
    }

    .memory-progress-fill {
      background: var(--cyan);
      border-radius: 2px;
      height: 100%;
      transition: width .9s linear;
    }

    .memory-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 4px solid var(--cyan);
      border-radius: 4px;
      padding: 14px;
    }

    .memory-card-name {
      color: var(--cyan);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .04em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .memory-card-face {
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .memory-card-detail {
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
    }

    .memory-digits-display {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .memory-digit-char {
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--lime);
      display: inline-block;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      min-width: 2rem;
      padding: 6px 4px;
      text-align: center;
    }

    .memory-choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .memory-choice {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 10px 12px;
      text-align: left;
    }

    .memory-choice:hover {
      border-color: var(--muted);
    }

    .memory-choice.selected {
      background: rgba(0,255,245,.08);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .memory-tip-box {
      background: rgba(255,215,0,.07);
      border-left: 3px solid var(--gold);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
      padding: 8px 10px;
    }

    .memory-word-chip {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--lime);
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 6px 10px;
      text-transform: uppercase;
    }

    .memory-mnemonic-box {
      background: rgba(0,255,245,.05);
      border-left: 3px solid var(--cyan);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 10px;
      padding: 8px 10px;
    }

    .memory-stat-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr 1fr;
      text-align: center;
    }

    .memory-stat-value {
      font-size: 2rem;
      font-weight: 800;
    }

    .memory-stat-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* Accomplishment Tracker */
    .acc-nav {
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      padding-bottom: 10px;
    }

    .acc-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 4px solid var(--lime);
      border-radius: 4px;
      margin-bottom: 10px;
      padding: 12px 14px;
    }

    .acc-card-date {
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .acc-field { margin-bottom: 6px; }

    .acc-field-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .acc-field-value {
      font-size: 13px;
      line-height: 1.45;
      margin-top: 2px;
    }

    .acc-week-group { margin-bottom: 20px; }

    .acc-week-header {
      align-items: center;
      border-bottom: 1px solid var(--line);
      color: var(--cyan);
      display: flex;
      font-size: 11px;
      font-weight: 700;
      gap: 8px;
      letter-spacing: .08em;
      margin-bottom: 10px;
      padding-bottom: 6px;
      text-transform: uppercase;
    }

    .acc-gap-badge {
      background: rgba(255,107,107,.1);
      border: 1px solid var(--red);
      border-radius: 3px;
      color: var(--red);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      text-transform: uppercase;
    }

    .acc-export-box {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.6;
      padding: 12px;
      resize: vertical;
      width: 100%;
    }

    /* Friendship Tracker */
    .friend-page-header {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--panel2);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 10px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .friend-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 8px;
      padding: 12px 14px;
    }

    .friend-card.overdue {
      border-left: 4px solid var(--red);
    }

    .friend-tier {
      border: 1px solid;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 2px 6px;
      text-transform: uppercase;
    }

    .friend-tier.close    { border-color: var(--lime); color: var(--lime); }
    .friend-tier.maintain { border-color: var(--cyan); color: var(--cyan); }
    .friend-tier.dont_lose { border-color: var(--gold); color: var(--gold); }

    .friend-log-form {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 6px;
      margin-top: 10px;
      padding: 12px;
    }

    .friend-history {
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }

    .friend-interaction-row {
      border-left: 2px solid var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      padding-left: 8px;
    }

    .friend-interaction-row.one-way {
      color: var(--muted);
      font-style: italic;
    }

    .friend-overdue-section {
      background: rgba(255,107,107,.05);
      border: 1px solid rgba(255,107,107,.2);
      border-radius: 6px;
      margin-bottom: 16px;
      padding: 12px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    if (!window.React || !window.ReactDOM || !window.supabase) {
      document.getElementById("root").innerHTML =
        '<div class="panel error">Missing required CDN scripts. Check React, Babel, and Supabase script loading.</div>';
      throw new Error("Library preload failure");
    }

    const { useEffect, useRef, useState } = window.React;

    const SUPABASE_URL = "https://dgxtslpwsayucznkrqih.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DQnkByElOKvZPt6HlxmrPg_DhSHnhpN";

    const memoryStorage = (() => {
      const m = {};
      return {
        getItem: (k) => (k in m ? m[k] : null),
        setItem: (k, v) => { m[k] = String(v); },
        removeItem: (k) => { delete m[k]; }
      };
    })();

    function getSafeStorage() {
      try {
        const key = "__ls_test__";
        window.localStorage.setItem(key, "1");
        window.localStorage.removeItem(key);
        return window.localStorage;
      } catch {
        return memoryStorage;
      }
    }

    const safeStorage = getSafeStorage();

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true,
        storage: safeStorage
      }
    });

    function nyDateFrom(baseDate) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(baseDate);

      const byType = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${byType.year}-${byType.month}-${byType.day}`;
    }

    function getCurrentDate() {
      return nyDateFrom(new Date());
    }

    function getDateDaysAgo(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return nyDateFrom(d);
    }

    const cache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_cache_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_cache_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_cache_${uid}`); } catch {}
      }
    };

    const historyCache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_history_v3_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_history_v3_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_history_v3_${uid}`); } catch {}
      }
    };

    const learningCache = {
      get(uid) {
        try {
          const raw = safeStorage.getItem(`todo_learning_${uid}`);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed.date === getCurrentDate() ? parsed.payload : null;
        } catch {
          return null;
        }
      },
      set(uid, payload) {
        try {
          safeStorage.setItem(`todo_learning_${uid}`, JSON.stringify({
            date: getCurrentDate(),
            payload
          }));
        } catch {}
      },
      clear(uid) {
        try { safeStorage.removeItem(`todo_learning_${uid}`); } catch {}
      }
    };

    function pickRandom(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    const poolCache = {
      get() {
        try {
          const raw = safeStorage.getItem("todo_pools");
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (Date.now() - parsed.ts > 7 * 24 * 60 * 60 * 1000) return null;
          return parsed.payload;
        } catch { return null; }
      },
      set(payload) {
        try {
          safeStorage.setItem("todo_pools", JSON.stringify({ ts: Date.now(), payload }));
        } catch {}
      }
    };

    async function fetchPools() {
      const cached = poolCache.get();
      if (cached) return cached;

      const [idiomsRes, vocabRes] = await Promise.all([
        supabase.from("idiom_pool").select("phrase,meaning"),
        supabase.from("vocab_pool").select("word,pos,definition")
      ]);

      if (idiomsRes.error) throw idiomsRes.error;
      if (vocabRes.error) throw vocabRes.error;

      const payload = { idioms: idiomsRes.data || [], vocab: vocabRes.data || [] };
      poolCache.set(payload);
      return payload;
    }

    const NAME_POOL = [
      { name: "Marcus Chen", face: "Sharp jawline, round glasses, short black hair", detail: "Marine biologist who collects vintage maps", mnemonic: "MARCHING through the sea — picture Marcus MARCHING, sharp jaw cutting waves, reading a vintage map on waterproof paper through his round glasses." },
      { name: "Priya Okonkwo", face: "High cheekbones, braided hair with gold beads", detail: "Structural engineer who plays the sitar", mnemonic: "PRAYER (Priya): she's PRAYING over each gold bead in her braid, each prayer engineering a stronger sitar bridge note by note." },
      { name: "Dalia Rosenstein", face: "Warm brown eyes, curly auburn hair, freckles across the nose", detail: "Pediatric surgeon who brews her own kombucha", mnemonic: "DAHLIA (Dalia): a dahlia blooms in her auburn curls, each petal a tiny kombucha bottle — she snips them off with surgical scissors." },
      { name: "Tariq Weston", face: "Broad forehead, neat close-cropped beard, deep-set dark eyes", detail: "High school history teacher and amateur boxer", mnemonic: "TEARING (Tariq) + WEST (Weston): he's TEARING his neat beard while boxing a WESTERN-sunset history textbook into submission." },
      { name: "Ingrid Nakamura", face: "Pale blue eyes, platinum blonde hair, high sharp cheekbones", detail: "Forensic accountant who speaks four languages", mnemonic: "INGOT (Ingrid): a platinum ingot with pale blue eyes — speaks four languages simultaneously while auditing a frozen vault, cheekbones sharp as a ledger." },

      { name: "Dmitri Osei", face: "Broad nose, close-cropped hair, intense steady gaze", detail: "Cryptographer who collects rare chess sets", mnemonic: "THREE (Dmitri sounds like 'the three'): THREE rare chess pieces locked in a safe — each encrypted, his intense gaze cracking each code in silence." },
      { name: "Yuki Patel", face: "Soft features, straight dark hair, small delicate ears", detail: "Transplant surgeon who paints miniature landscapes", mnemonic: "YUCKY (Yuki): 'How do you paint something so YUCKY tiny?!' — she uses surgical tools to create miniature landscapes, small ears alert for the OR pager." },

      { name: "Cormac Delacroix", face: "Red beard, weathered skin, blue-gray eyes", detail: "Geologist who writes murder mysteries", mnemonic: "CORE (Cormac) + CROSS (Delacroix): dig to the EARTH'S CORE and find him writing murder mysteries by volcanic light, red beard singed, blue-gray eyes scanning the scene." },
      { name: "Amara Stellenbosch", face: "Long lashes, sculpted brows, close-cropped natural hair", detail: "Neuroscientist who makes her own cheese", mnemonic: "STELLAR (Stellenbosch): she reaches for STELLAR heights with her sculpted brows, drawing neuron diagrams in freshly made cheese while her long lashes sweep the data." },
      { name: "Ivan Chakraborty", face: "Prominent cheekbones, salt-and-pepper hair, narrow eyes", detail: "Civil engineer who teaches ballroom dancing", mnemonic: "IVAN the Terrible + CHA-CHA (Chakraborty): Ivan the Terrible doing the CHA-CHA, salt-and-pepper hair spinning, narrow eyes focused on engineering a perfect pivot." },
      { name: "Leonora Voss", face: "Almond-shaped eyes, ash blonde hair, wide expressive mouth", detail: "Forensic pathologist who writes poetry", mnemonic: "LION (Leonora): a LION with ash-blonde hair writes forensic POETRY, almond eyes scanning each crime-scene stanza, wide mouth reciting the findings." },
      { name: "Obinna Walsh", face: "Strong brow ridge, wide-set eyes, easy relaxed grin", detail: "Tax attorney who breeds tropical fish", mnemonic: "OH BEEN A (Obinna): 'I've always been a tropical fish lawyer!' he grins — wide-set eyes watching neon fish swim through stacked tax returns." },
      { name: "Hana Johansson", face: "Button nose, high cheekbones, dramatically dark eyebrows", detail: "Biostatistician who runs ultramarathons", mnemonic: "BANANA (Hana sounds like banana): a biostatistician running a BANANA MARATHON, dramatically dark eyebrows furrowed at the mile-marker data, button nose leading the pace." },
      { name: "Felix Mensah", face: "Square jaw, gap between front teeth, warm brown eyes", detail: "Pediatric dentist who builds model trains", mnemonic: "FELIX the Cat (Felix): Felix the Cat in the dental chair, gap grin gleaming, building a model train set between appointments with warm brown eyes." },
      { name: "Renata Okafor", face: "Expressive dark eyes, full lips, cropped natural hair", detail: "Structural architect who studies falconry", mnemonic: "REBORN (Renata = reborn): REBORN as a falconer each morning — her expressive eyes locked on a falcon perched on a blueprint she designed." },
      { name: "Soren Bhatia", face: "Thin lips, high hairline, calm and steady gaze", detail: "Climate scientist who does woodcarving", mnemonic: "SOARING (Soren): he's SOARING through climate charts mid-air, woodcarving a tiny windmill with his thin lips pursed in concentration, totally unruffled." },
      { name: "Chidinma Park", face: "Round wide eyes, warm complexion, short textured hair", detail: "Pharmacologist who restores antique clocks", mnemonic: "CHIDING IN THE PARK (Chidinma Park): picture her CHIDING a broken clock IN THE PARK — round eyes wide, adjusting gears with pharmaceutical precision." },
      { name: "Augustus Yamamoto", face: "Lean angular face, deep-set dark eyes, silvering temples", detail: "Maritime historian who sculpts in clay", mnemonic: "AUGUST + MOUNTAIN (Yamamoto = mountain base): every AUGUST, he sculpts a clay ocean liner at the base of a MOUNTAIN, silver temples glinting in the summer light." },
    ];

    const WORD_POOL = [
      "apple", "bridge", "candle", "desert", "eagle", "fence", "guitar",
      "hammer", "island", "jacket", "kettle", "ladder", "marble", "needle",
      "ocean", "piano", "quilt", "river", "shovel", "tower", "umbrella",
      "valley", "wallet", "anchor", "basket", "cloud", "dragon", "engine",
      "forest", "globe", "helmet", "jungle", "lemon", "mirror", "napkin",
      "olive", "pencil", "rocket", "saddle", "tunnel", "volcano", "window",
      "arrow", "barrel", "castle", "diamond", "feather", "glacier", "harbor",
      "lantern", "meadow", "oyster", "palace", "ribbon", "sailor", "trophy",
      "viper", "walrus", "zipper", "almond", "bison", "cactus", "dolphin",
      "fabric", "garlic", "harvest", "insect", "jaguar", "kernel", "lobster",
      "mustard", "nomad", "pebble", "quarry", "sphinx", "tandem", "velvet",
      "wrench", "canopy", "debris", "emblem", "falcon", "goblet", "hatchet",
      "ibis", "jewel", "kestrel", "lagoon", "mango", "nozzle", "pillar",
    ];

    const WORD_TIPS = [
      "Story link: weave all the words into a single vivid, absurd story — the stranger the scene, the more memorable it becomes.",
      "Method of loci: mentally place each word at a specific spot in a room you know well, then walk through it to recall them.",
      "Category grouping: mentally sort words into clusters (animals, tools, nature). Recalling one category brings back all its members.",
      "Emotional hook: attach a strong feeling or personal memory to each word. Emotion dramatically strengthens recall.",
      "Visual chaining: picture the words as physical objects colliding or interacting — movement and interaction encode better than static images.",
    ];

    const NUMBER_TIPS = [
      "Chunking: group digits into pairs or triplets (e.g. 47·291·836). Your brain handles chunks far better than lone digits.",
      "Story method: assign a vivid image to each chunk. 47 = a person running, 29 = jumping a fence — link them into one scene.",
      "Rhythm and beat: say the number aloud 3 times with a specific rhythm. Music and rhythm encode to long-term memory faster.",
      "Familiar anchors: do any chunks match ages, years, or addresses you already know? Use that existing memory as a hook.",
      "Journey method: mentally walk through a room and place each chunk at a specific object in sequence.",
    ];

    const NAME_TIPS = [
      "Face anchor (strongest technique): hang the name on one physical feature. Zara has green eyes — picture them spelling Z-A-R-A in neon. The weirder the image, the harder it sticks.",
      "Sound-swap: replace the name with a word it sounds like, then act it out on their face. Marcus → 'marching'. Felix → 'Felix the Cat'. Imagine that action happening right on their forehead.",
      "Three-link sentence: one vivid sentence connecting name + face + detail. 'Elias (eel) slid across his tall forehead, camera aimed at a crumbling building.' Absurd = memorable.",
      "Micro-repetition: say the name silently 3 times with a 1-second gap between each, while holding the face description in your mind. Three spaced beats outperform ten rapid repetitions.",
      "Celebrity bridge: think of a famous [Name] and picture them morphing into this person's face and detail. Ivan → Ivan the Terrible doing the cha-cha in a hard hat.",
    ];

    const CORRECT_LABELS = ["Locked in!", "Nailed it!", "Solid recall!", "Got it!", "Sharp memory!"];
    const WRONG_LABELS = ["Slipped away", "Not quite", "Blanked on this one", "Close miss", "Missed this one"];

    function MemoryTrainingPage({ onBack, user }) {
      const CACHE_KEY = `memory_perf_${user?.id || 'guest'}`;

      const [phase, setPhase] = useState('setup');
      const [durationMins, setDurationMins] = useState(5);
      const [timeLeft, setTimeLeft] = useState(0);
      const [studyTimeLeft, setStudyTimeLeft] = useState(0);
      const [studyTotal, setStudyTotal] = useState(1);
      const [level, setLevel] = useState(1);
      const [recentScores, setRecentScores] = useState([]);
      const [exercise, setExercise] = useState(null);
      const [numberInput, setNumberInput] = useState('');
      const [wordInput, setWordInput] = useState('');
      const [choiceAnswers, setChoiceAnswers] = useState({});
      const [feedbackData, setFeedbackData] = useState(null);
      const [stats, setStats] = useState({ correct: 0, total: 0, count: 0 });
      const [lastPerf, setLastPerf] = useState(null);
      const nextLevelRef = useRef(1);
      const phaseRef = useRef('setup');

      useEffect(() => { phaseRef.current = phase; }, [phase]);

      useEffect(() => {
        try {
          const saved = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
          if (saved) {
            setLastPerf(saved);
            const startLevel = Math.max(1, Math.min(8, saved.level || 1));
            setLevel(startLevel);
            nextLevelRef.current = startLevel;
          }
        } catch(e) {}
      }, []);

      useEffect(() => {
        if (phase === 'setup' || phase === 'done') return;
        const id = setInterval(() => {
          setTimeLeft(t => Math.max(0, t - 1));
          if (phaseRef.current === 'study') setStudyTimeLeft(t => Math.max(0, t - 1));
        }, 1000);
        return () => clearInterval(id);
      }, [phase]);

      useEffect(() => {
        if (timeLeft === 0 && phase !== 'setup' && phase !== 'done' && phase !== 'quiz' && phase !== 'feedback') setPhase('done');
      }, [timeLeft]);

      useEffect(() => {
        if (studyTimeLeft === 0 && phase === 'study' && exercise) setPhase('quiz');
      }, [studyTimeLeft]);

      function buildExercise(lvl) {
        const roll = Math.random();
        if (roll < 0.34) {
          const len = Math.min(3 + lvl, 10);
          const digits = Array.from({ length: len }, () => Math.floor(Math.random() * 10)).join('');
          return { type: 'numbers', digits, studyTime: Math.max(4, Math.ceil(len * 1.2)) };
        }
        if (roll < 0.67) {
          const count = Math.min(3 + lvl, 10);
          const words = [...WORD_POOL].sort(() => Math.random() - 0.5).slice(0, count);
          return { type: 'words', words, studyTime: Math.max(6, Math.ceil(count * 2.5)) };
        }
        const count = lvl <= 2 ? 2 : lvl <= 4 ? 3 : 4;
        const pool = [...NAME_POOL].sort(() => Math.random() - 0.5);
        const shown = pool.slice(0, count);
        const distractors = pool.slice(count);
        const questions = shown.map((person, i) => {
          if (i % 2 === 0) {
            const wrongs = distractors.slice(i * 3, i * 3 + 3).map(p => p.name);
            const choices = [...wrongs, person.name].sort(() => Math.random() - 0.5);
            return { id: `q${i}`, kind: 'face-to-name', prompt: person.face, answer: person.name, choices, mnemonic: person.mnemonic, personName: person.name };
          }
          const wrongs = distractors.slice(i * 3, i * 3 + 3).map(p => p.detail);
          const choices = [...wrongs, person.detail].sort(() => Math.random() - 0.5);
          return { id: `q${i}`, kind: 'name-to-detail', prompt: person.name, answer: person.detail, choices, mnemonic: person.mnemonic, personName: person.name };
        });
        return { type: 'names', persons: shown, studyTime: Math.max(10, count * 8), questions: questions.sort(() => Math.random() - 0.5) };
      }

      function startSession() {
        const total = durationMins * 60;
        setTimeLeft(total);
        const startLevel = nextLevelRef.current;
        setLevel(startLevel);
        setRecentScores([]);
        setStats({ correct: 0, total: 0, count: 0 });
        launchExercise(startLevel);
      }

      function launchExercise(lvl) {
        const ex = buildExercise(lvl);
        setExercise(ex);
        setNumberInput('');
        setWordInput('');
        setChoiceAnswers({});
        setFeedbackData(null);
        setStudyTimeLeft(ex.studyTime);
        setStudyTotal(ex.studyTime);
        setPhase('study');
      }

      function savePerf(finalLevel, sessionStats) {
        try {
          const existing = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
          const updated = {
            level: finalLevel,
            totalCorrect: (existing.totalCorrect || 0) + sessionStats.correct,
            totalQuestions: (existing.totalQuestions || 0) + sessionStats.total,
            sessions: (existing.sessions || 0) + 1,
            lastDate: new Date().toLocaleDateString(),
          };
          localStorage.setItem(CACHE_KEY, JSON.stringify(updated));
          setLastPerf(updated);
        } catch(e) {}
      }

      function submitAnswers() {
        let results, numCorrect, totalQs, ratio;

        if (exercise.type === 'numbers') {
          const given = numberInput.trim();
          const correct = given === exercise.digits;
          let matched = 0;
          for (let i = 0; i < Math.min(exercise.digits.length, given.length); i++) {
            if (exercise.digits[i] === given[i]) matched++;
          }
          const partialRatio = correct ? 1 : matched / exercise.digits.length;
          const numLabel = correct ? 'Perfect recall!' : `${matched} of ${exercise.digits.length} digits correct`;
          results = [{ kind: 'numbers', digits: exercise.digits, given, correct, partialRatio, matched, label: numLabel, tip: NUMBER_TIPS[Math.floor(Math.random() * NUMBER_TIPS.length)] }];
          numCorrect = correct ? 1 : 0; totalQs = 1; ratio = partialRatio;
        } else if (exercise.type === 'words') {
          const userWords = wordInput.toLowerCase().split(/[\s,;\n]+/).map(w => w.trim()).filter(w => w.length > 0);
          const targetLower = exercise.words.map(w => w.toLowerCase());
          const recalled = exercise.words.filter(w => userWords.includes(w.toLowerCase()));
          const missed = exercise.words.filter(w => !userWords.includes(w.toLowerCase()));
          const extra = userWords.filter(w => !targetLower.includes(w));
          numCorrect = recalled.length; totalQs = exercise.words.length;
          ratio = numCorrect / totalQs;
          const wordLabel = ratio === 1 ? 'Full recall!' : ratio >= 0.7 ? 'Strong effort!' : ratio >= 0.4 ? 'Partial recall' : 'Tough one';
          results = [{ kind: 'words', words: exercise.words, recalled, missed, extra, correct: recalled.length === exercise.words.length, ratio, label: `${recalled.length}/${exercise.words.length} — ${wordLabel}`, tip: WORD_TIPS[Math.floor(Math.random() * WORD_TIPS.length)] }];
        } else {
          results = exercise.questions.map(q => {
            const given = choiceAnswers[q.id] || '';
            const correct = given === q.answer;
            const label = correct
              ? CORRECT_LABELS[Math.floor(Math.random() * CORRECT_LABELS.length)]
              : WRONG_LABELS[Math.floor(Math.random() * WRONG_LABELS.length)];
            return { kind: q.kind, prompt: q.prompt, given, answer: q.answer, correct, label, mnemonic: q.mnemonic, personName: q.personName, tip: NAME_TIPS[Math.floor(Math.random() * NAME_TIPS.length)] };
          });
          numCorrect = results.filter(r => r.correct).length;
          totalQs = results.length; ratio = numCorrect / totalQs;
        }

        const newStats = { correct: stats.correct + numCorrect, total: stats.total + totalQs, count: stats.count + 1 };
        setStats(newStats);

        const newScores = [...recentScores.slice(-4), ratio];
        setRecentScores(newScores);
        let newLevel = level;
        if (newScores.length >= 2) {
          const avg = newScores.reduce((s, v) => s + v, 0) / newScores.length;
          if (avg >= 0.8 && level < 8) newLevel = level + 1;
          else if (avg <= 0.35 && level > 1) newLevel = level - 1;
        }
        setLevel(newLevel);
        nextLevelRef.current = newLevel;
        savePerf(newLevel, newStats);
        setFeedbackData(results);
        setPhase('feedback');
      }

      function handleNext() {
        if (timeLeft <= 0) { setPhase('done'); return; }
        launchExercise(nextLevelRef.current);
      }

      function formatTime(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return `${m}:${String(s).padStart(2, '0')}`;
      }

      if (phase === 'setup') return (
        <div>
          <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
          <div className="memory-setup">
            <h1 className="title" style={{ fontSize: 'clamp(1.2rem,3vw,2rem)', marginBottom: '8px' }}>Memory Training</h1>
            <div className="tag" style={{ marginBottom: '24px' }}>Build your encoding and recall abilities</div>
            <div className="panel">
              <div className="section-head"><div className="section-title">Session Duration</div></div>
              <div className="memory-duration-row">
                {[2, 5, 10].map(m => (
                  <button key={m} className={`btn ${durationMins === m ? '' : 'gray'}`} onClick={() => setDurationMins(m)}>{m} min</button>
                ))}
                <input type="number" className="in" style={{ width: '80px', flex: 'none' }} min="1" max="60" value={durationMins}
                  onChange={e => setDurationMins(Math.max(1, Math.min(60, Number(e.target.value))))} />
              </div>
            </div>
            {lastPerf && (
              <div className="panel" style={{ borderLeftColor: 'var(--gold)' }}>
                <div style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '.1em', marginBottom: '6px' }}>Last Session</div>
                <div style={{ display: 'flex', gap: '20px', flexWrap: 'wrap' }}>
                  <span style={{ fontSize: '13px' }}>Level <strong style={{ color: 'var(--lime)' }}>{lastPerf.level}</strong></span>
                  <span style={{ fontSize: '13px' }}>Lifetime accuracy <strong style={{ color: 'var(--cyan)' }}>{lastPerf.totalQuestions > 0 ? Math.round((lastPerf.totalCorrect / lastPerf.totalQuestions) * 100) : 0}%</strong></span>
                  <span style={{ fontSize: '13px' }}>{lastPerf.sessions} session{lastPerf.sessions !== 1 ? 's' : ''}</span>
                  {lastPerf.lastDate && <span style={{ color: 'var(--muted)', fontSize: '12px' }}>Last: {lastPerf.lastDate}</span>}
                </div>
              </div>
            )}
            <div className="panel">
              <div className="section-head"><div className="section-title">What You'll Practice</div></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', color: 'var(--muted)', fontSize: '13px', lineHeight: '1.6' }}>
                <div><span style={{ color: 'var(--lime)' }}>■</span> <strong style={{ color: 'var(--text)' }}>Number Strings</strong> — Memorize digit sequences, then recall them exactly</div>
                <div><span style={{ color: 'var(--gold)' }}>■</span> <strong style={{ color: 'var(--text)' }}>Word Lists</strong> — Memorize a set of words, then type back as many as you can (any order)</div>
                <div><span style={{ color: 'var(--cyan)' }}>■</span> <strong style={{ color: 'var(--text)' }}>Names & Details</strong> — Study people with face descriptions and details, then answer questions</div>
                <div style={{ marginTop: '4px' }}>Difficulty adapts to your performance. Your level carries over between sessions.</div>
              </div>
            </div>
            <button className="btn" style={{ width: '100%', padding: '14px', fontSize: '14px', marginTop: '8px' }} onClick={startSession}>
              {lastPerf ? `Resume at Level ${nextLevelRef.current} →` : 'Start Session →'}
            </button>
          </div>
        </div>
      );

      if (phase === 'done') {
        const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
        return (
          <div>
            <button className="btn gray" style={{ marginBottom: '16px' }} onClick={onBack}>← Back</button>
            <div className="memory-setup">
              <h1 className="title" style={{ fontSize: 'clamp(1.2rem,3vw,2rem)', marginBottom: '8px' }}>Session Complete</h1>
              <div className="tag" style={{ marginBottom: '24px' }}>Here's how you did</div>
              <div className="panel">
                <div className="memory-stat-grid">
                  <div><div className="memory-stat-value" style={{ color: 'var(--lime)' }}>{accuracy}%</div><div className="memory-stat-label">Accuracy</div></div>
                  <div><div className="memory-stat-value" style={{ color: 'var(--cyan)' }}>{stats.correct}/{stats.total}</div><div className="memory-stat-label">Questions</div></div>
                  <div><div className="memory-stat-value" style={{ color: 'var(--gold)' }}>{stats.count}</div><div className="memory-stat-label">Exercises</div></div>
                </div>
              </div>
              <div className="panel" style={{ color: 'var(--muted)', fontSize: '13px', lineHeight: '1.6' }}>
                {accuracy >= 80 && <span style={{ color: 'var(--lime)' }}>Excellent encoding — you're operating at a high level. Push with longer sessions.</span>}
                {accuracy >= 50 && accuracy < 80 && <span style={{ color: 'var(--text)' }}>Solid progress. The techniques in the feedback tips will sharpen your encoding significantly.</span>}
                {accuracy < 50 && <span style={{ color: 'var(--red)' }}>Keep practicing. Memory is a skill — consistency matters more than any single session result.</span>}
              </div>
              <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                <button className="btn" style={{ flex: 1 }} onClick={startSession}>Train Again</button>
                <button className="btn gray" onClick={onBack}>← Tasks</button>
              </div>
            </div>
          </div>
        );
      }

      const studyPct = studyTotal > 0 ? (studyTimeLeft / studyTotal) * 100 : 0;

      return (
        <div>
          <div className="memory-header">
            <button className="btn gray" style={{ padding: '4px 8px', fontSize: '11px' }} onClick={onBack}>← Back</button>
            <div className="memory-timer" style={{ color: timeLeft === 0 ? 'var(--red)' : timeLeft <= 30 ? 'var(--gold)' : 'var(--lime)' }}>{timeLeft === 0 ? "Time's up" : formatTime(timeLeft)}</div>
            <div style={{ color: 'var(--muted)', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '.1em' }}>Level {level}</div>
          </div>

          {phase === 'study' && (
            <div>
              <div style={{ marginBottom: '14px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', color: 'var(--muted)', fontSize: '11px', marginBottom: '4px' }}>
                  <span>Study window</span><span>{studyTimeLeft}s</span>
                </div>
                <div className="memory-progress-bar">
                  <div className="memory-progress-fill" style={{ width: `${studyPct}%` }} />
                </div>
              </div>

              {exercise.type === 'numbers' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '12px' }}>Memorize this number</div>
                  <div className="memory-digits-display">
                    {exercise.digits.split('').map((d, i) => (
                      <React.Fragment key={i}>
                        {i > 0 && i % 3 === 0 && <span style={{ color: 'var(--panel2)', fontSize: '1.5rem' }}>·</span>}
                        <span className="memory-digit-char">{d}</span>
                      </React.Fragment>
                    ))}
                  </div>
                  <div style={{ color: 'var(--muted)', fontSize: '11px', marginTop: '10px' }}>{exercise.digits.length} digits — try chunking or linking each group to a vivid image</div>
                </div>
              )}

              {exercise.type === 'words' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '12px' }}>Memorize these words</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', margin: '8px 0' }}>
                    {exercise.words.map((word, i) => (
                      <span key={i} className="memory-word-chip">{word}</span>
                    ))}
                  </div>
                  <div style={{ color: 'var(--muted)', fontSize: '11px', marginTop: '10px' }}>{exercise.words.length} words — any order counts. Try linking them into a vivid story.</div>
                </div>
              )}

              {exercise.type === 'names' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  <div className="section-title" style={{ marginBottom: '2px' }}>Memorize these people</div>
                  {exercise.persons.map((person, i) => (
                    <div key={i} className="memory-card">
                      <div className="memory-card-name">{person.name}</div>
                      <div className="memory-card-face">{person.face}</div>
                      <div className="memory-card-detail">{person.detail}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {phase === 'quiz' && (
            <div>
              {timeLeft === 0 && (
                <div className="panel" style={{ borderLeftColor: 'var(--red)', color: 'var(--red)', marginBottom: '12px', fontSize: '13px' }}>
                  Time's up — submit your answer to see the results.
                </div>
              )}
              {exercise.type === 'numbers' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '10px' }}>Recall the number string</div>
                  <div style={{ color: 'var(--muted)', fontSize: '12px', marginBottom: '12px' }}>Type exactly what you memorized — no spaces</div>
                  <input className="in" type="text" inputMode="numeric" placeholder="Enter digits..." value={numberInput}
                    onChange={e => setNumberInput(e.target.value.replace(/\D/g, ''))} autoFocus />
                  <button className="btn" style={{ marginTop: '10px', width: '100%' }} disabled={numberInput.length === 0} onClick={submitAnswers}>Submit Answer</button>
                </div>
              )}

              {exercise.type === 'words' && (
                <div className="panel">
                  <div className="section-title" style={{ marginBottom: '10px' }}>Recall the word list</div>
                  <div style={{ color: 'var(--muted)', fontSize: '12px', marginBottom: '12px' }}>Type every word you remember — spaces, commas, or new lines. Order doesn't matter.</div>
                  <textarea className="in" style={{ minHeight: '100px', resize: 'vertical' }}
                    placeholder="apple, bridge, rocket..." value={wordInput}
                    onChange={e => setWordInput(e.target.value)} autoFocus />
                  <button className="btn" style={{ marginTop: '10px', width: '100%' }} disabled={wordInput.trim().length === 0} onClick={submitAnswers}>Submit Answer</button>
                </div>
              )}

              {exercise.type === 'names' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <div className="section-title">Answer the questions</div>
                  {exercise.questions.map(q => (
                    <div key={q.id} className="panel">
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                        {q.kind === 'face-to-name' ? 'This person looks like:' : 'What do you know about:'}
                      </div>
                      <div style={{ color: 'var(--text)', fontWeight: 700, fontSize: '13px', lineHeight: '1.5', marginBottom: '12px' }}>"{q.prompt}"</div>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                        {q.kind === 'face-to-name' ? 'Who is this?' : 'What is their detail?'}
                      </div>
                      <div className="memory-choices">
                        {q.choices.map((choice, ci) => (
                          <button key={ci} className={`memory-choice ${choiceAnswers[q.id] === choice ? 'selected' : ''}`}
                            onClick={() => setChoiceAnswers(prev => ({ ...prev, [q.id]: choice }))}>
                            {choice}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                  <button className="btn" disabled={exercise.questions.some(q => !choiceAnswers[q.id])} onClick={submitAnswers}>Submit Answers</button>
                </div>
              )}
            </div>
          )}

          {phase === 'feedback' && feedbackData && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              <div className="section-title">Results</div>
              {feedbackData.map((result, i) => (
                <div key={i} className="panel" style={{ borderLeftColor: result.correct ? 'var(--lime)' : 'var(--red)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                    <span style={{ color: result.correct ? 'var(--lime)' : 'var(--red)', fontSize: '16px', fontWeight: 800 }}>{result.correct ? '✓' : '✗'}</span>
                    <span style={{ color: result.correct ? 'var(--lime)' : 'var(--red)', fontWeight: 700, fontSize: '13px' }}>
                      {result.label || (result.correct ? 'Correct' : 'Incorrect')}
                    </span>
                  </div>

                  {result.kind === 'words' && (
                    <div>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '8px' }}>The words were:</div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: result.extra.length > 0 ? '10px' : 0 }}>
                        {result.words.map((w, wi) => {
                          const got = result.recalled.map(r => r.toLowerCase()).includes(w.toLowerCase());
                          return <span key={wi} className="memory-word-chip" style={{ color: got ? 'var(--lime)' : 'var(--red)', borderColor: got ? 'var(--lime)' : 'var(--red)' }}>{w}</span>;
                        })}
                      </div>
                      {result.extra.length > 0 && (
                        <div style={{ color: 'var(--muted)', fontSize: '11px' }}>Not on the list: <span>{result.extra.join(', ')}</span></div>
                      )}
                    </div>
                  )}

                  {result.kind === 'numbers' && (
                    <div>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '6px' }}>The number was:</div>
                      <div className="memory-digits-display">
                        {result.digits.split('').map((d, di) => {
                          const hit = result.given[di] === d;
                          return (
                            <React.Fragment key={di}>
                              {di > 0 && di % 3 === 0 && <span style={{ color: 'var(--panel2)', fontSize: '1.5rem' }}>·</span>}
                              <span className="memory-digit-char" style={{ color: result.correct || hit ? 'var(--lime)' : 'var(--red)', borderColor: result.correct || hit ? 'var(--lime)' : 'var(--red)' }}>{d}</span>
                            </React.Fragment>
                          );
                        })}
                      </div>
                      {!result.correct && (
                        <div style={{ marginTop: '8px' }}>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>You entered: <span style={{ color: 'var(--red)' }}>{result.given || '(nothing)'}</span></div>
                          <div style={{ color: 'var(--muted)', fontSize: '11px', marginTop: '2px' }}>{result.matched}/{result.digits.length} digits in the correct position</div>
                        </div>
                      )}
                    </div>
                  )}

                  {result.kind !== 'numbers' && result.kind !== 'words' && (
                    <div style={{ marginBottom: '6px' }}>
                      <div style={{ color: 'var(--muted)', fontSize: '11px', marginBottom: '4px' }}>
                        {result.kind === 'face-to-name' ? 'Face: ' : 'Name: '}
                        <span style={{ color: 'var(--text)' }}>{result.prompt}</span>
                      </div>
                      {!result.correct && (
                        <div style={{ marginBottom: '4px' }}>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>You chose: <span style={{ color: 'var(--red)' }}>{result.given || '(none)'}</span></div>
                          <div style={{ color: 'var(--muted)', fontSize: '11px' }}>Correct: <span style={{ color: 'var(--lime)' }}>{result.answer}</span></div>
                        </div>
                      )}
                    </div>
                  )}

                  {result.mnemonic && (
                    <div className="memory-mnemonic-box">
                      <div style={{ color: 'var(--cyan)', fontWeight: 700, fontSize: '11px', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '.08em' }}>
                        Memory Anchor — {result.personName}
                      </div>
                      {result.mnemonic}
                    </div>
                  )}

                  {!result.correct && result.tip && (
                    <div className="memory-tip-box">
                      <span style={{ color: 'var(--gold)', fontWeight: 700 }}>Technique: </span>{result.tip}
                    </div>
                  )}
                </div>
              ))}
              <button className="btn" style={{ width: '100%' }} onClick={handleNext}>
                {timeLeft <= 0 ? 'End Session' : 'Next Exercise →'}
              </button>
            </div>
          )}
        </div>
      );
    }

    function App() {
      return <MainApp />;
    }

    function MainApp() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sections, setSections] = useState([]);
      const [archive, setArchive] = useState(null);
      const [showArchive, setShowArchive] = useState(false);
      const [loadInfo, setLoadInfo] = useState(null);
      const userRef = useRef(null);
      const dateRef = useRef(getCurrentDate());

      useEffect(() => {
        userRef.current = user;
      }, [user]);

      useEffect(() => {
        const failsafe = setTimeout(() => {
          setLoading((prev) => {
            if (prev) setError("Startup took too long. If you are signed in, press Refresh.");
            return false;
          });
        }, 9000);

        const { data: authListener } = supabase.auth.onAuthStateChange(async (event, session) => {
          const nextUser = session?.user || null;
          setUser(nextUser);
          setLoading(false);

          if (event === "SIGNED_OUT") {
            if (userRef.current?.id) cache.clear(userRef.current.id);
            if (userRef.current?.id) historyCache.clear(userRef.current.id);
            if (userRef.current?.id) learningCache.clear(userRef.current.id);
            setSections([]);
            setArchive(null);
            setShowArchive(false);
            setLoadInfo(null);
            return;
          }

          if (nextUser) {
            const cached = cache.get(nextUser.id);
            if (cached) setSections(cached);
            ensureDailyTasks(getCurrentDate(), nextUser.id)
              .catch((e) => console.warn("ensureDailyTasks:", e.message))
              .finally(() => loadSections(nextUser.id, true).catch((e) => setError("Failed to load: " + e.message)));
          }
        });

        const midnightWatcher = setInterval(async () => {
          const currentDate = getCurrentDate();
          if (currentDate === dateRef.current) return;

          dateRef.current = currentDate;
          const uid = userRef.current?.id;
          if (!uid) return;

          try {
            cache.clear(uid);
            historyCache.clear(uid);
            learningCache.clear(uid);
            await ensureDailyTasks(currentDate, uid);
            await loadSections(uid, true);
            setArchive(null);
          } catch (e) {
            setError("Midnight refresh failed: " + e.message);
          }
        }, 60000);

        return () => {
          clearTimeout(failsafe);
          clearInterval(midnightWatcher);
          authListener?.subscription?.unsubscribe();
        };
      }, []);

      async function ensureDailyTasks(date, userId) {
        if (!userId) return;

        const { data: templates, error: templateError } = await supabase
          .from("task_templates")
          .select("id,section_id,text,parent_task_id,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (templateError) throw templateError;

        if (!templates || templates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const { data: existingDailyTasks, error: existingError } = await supabase
          .from("tasks")
          .select("id,template_id")
          .eq("user_id", userId)
          .eq("date", date)
          .not("template_id", "is", null);

        if (existingError) throw existingError;

        const existingTemplateIds = new Set(
          (existingDailyTasks || []).map((task) => String(task.template_id))
        );

        const missingTemplates = templates.filter(
          (template) => !existingTemplateIds.has(String(template.id))
        );

        if (missingTemplates.length === 0) {
          safeStorage.setItem(`last_init_${userId}`, date);
          return;
        }

        const rows = missingTemplates.map((template) => ({
          section_id: template.section_id,
          user_id: userId,
          text: template.text,
          completed: false,
          date,
          template_id: template.id,
          parent_task_id: null,
          order_index: template.order_index || 0
        }));

        const { data: createdTasks, error: insertError } = await supabase
          .from("tasks")
          .insert(rows)
          .select("id,template_id");

        if (insertError && insertError.code !== "23505") throw insertError;

        const taskByTemplateId = {};
        (existingDailyTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });
        (createdTasks || []).forEach((task) => {
          taskByTemplateId[String(task.template_id)] = task.id;
        });

        const parentUpdates = missingTemplates
          .filter((template) => (
            template.parent_task_id &&
            taskByTemplateId[String(template.parent_task_id)] &&
            taskByTemplateId[String(template.id)]
          ))
          .map((template) => supabase
            .from("tasks")
            .update({ parent_task_id: taskByTemplateId[String(template.parent_task_id)] })
            .eq("id", taskByTemplateId[String(template.id)]));

        if (parentUpdates.length > 0) await Promise.all(parentUpdates);

        safeStorage.setItem(`last_init_${userId}`, date);
      }

      async function createDefaultSection(userId) {
        const { data, error } = await supabase
          .from("sections")
          .insert([{ user_id: userId, name: "Tasks", order_index: 0 }])
          .select("id,user_id,name,order_index")
          .single();

        if (error) throw error;
        return data;
      }

      async function loadSections(userIdFromCall, force = false) {
        const userId = userIdFromCall || userRef.current?.id;
        if (!userId) return;

        if (force) {
          cache.clear(userId);
          safeStorage.removeItem(`last_init_${userId}`);
        }

        if (!force) {
          const cached = cache.get(userId);
          if (cached) {
            setSections(cached);
            const hasTasks = cached.some((section) => (section.tasks || []).length > 0);
            if (hasTasks) return;
          }
        }

        const today = getCurrentDate();

        const { data: sectionsData, error: sectionsError } = await supabase
          .from("sections")
          .select("id,user_id,name,order_index")
          .eq("user_id", userId)
          .order("order_index", { ascending: true });

        if (sectionsError) throw sectionsError;

        let availableSections = sectionsData || [];

        if (availableSections.length === 0) {
          availableSections = [await createDefaultSection(userId)];
        }

        const { data: tasksData, error: tasksError } = await supabase
          .from("tasks")
          .select("id,section_id,user_id,text,completed,date,template_id,parent_task_id,order_index")
          .eq("user_id", userId)
          .eq("date", today)
          .order("order_index", { ascending: true });

        if (tasksError) throw tasksError;

        const effectiveTasks = tasksData || [];

        let merged = availableSections.map((section) => ({
          ...section,
          tasks: effectiveTasks.filter((task) => String(task.section_id) === String(section.id))
        }));

        const knownSectionIds = new Set(availableSections.map((section) => String(section.id)));
        const orphanTasks = effectiveTasks.filter((task) => !knownSectionIds.has(String(task.section_id)));

        if (orphanTasks.length > 0) {
          const fallbackSection = availableSections[0];
          const movedTasks = orphanTasks.map((task) => ({ ...task, section_id: fallbackSection.id }));

          const movedTaskResults = await Promise.all(orphanTasks.map((task) => (
            supabase.from("tasks").update({ section_id: fallbackSection.id }).eq("id", task.id)
          )));
          const movedTaskError = movedTaskResults.find((result) => result.error)?.error;
          if (movedTaskError) throw movedTaskError;

          const movedTemplateResults = await Promise.all(orphanTasks
            .filter((task) => task.template_id)
            .map((task) => (
              supabase.from("task_templates").update({ section_id: fallbackSection.id }).eq("id", task.template_id)
            )));
          const movedTemplateError = movedTemplateResults.find((result) => result.error)?.error;
          if (movedTemplateError) throw movedTemplateError;

          merged = merged.map((section, index) => (
            index === 0
              ? { ...section, tasks: [...(section.tasks || []), ...movedTasks] }
              : section
          ));
        }

        if (effectiveTasks.length > 0 && merged.every((section) => (section.tasks || []).length === 0)) {
          merged = [{
            ...availableSections[0],
            user_id: userId,
            name: "Tasks",
            tasks: effectiveTasks
          }];
        }

        setSections(merged);
        cache.set(userId, merged);

        setLoadInfo({
          today,
          taskCount: effectiveTasks.length,
          sectionCount: availableSections.length,
          templateBackedCount: effectiveTasks.filter((task) => task.template_id).length
        });
      }

      async function loadArchive() {
        if (showArchive) {
          setShowArchive(false);
          return;
        }

        try {
          const currentUser = userRef.current;
          if (!currentUser) {
            setError("History is available after sign in.");
            return;
          }

          const { data: rawTasks, error: taskError } = await supabase
            .from("tasks")
            .select("text,completed,date,template_id,section_id")
            .eq("user_id", currentUser.id)
            .lte("date", getCurrentDate())
            .gte("date", getDateDaysAgo(30))
            .order("date", { ascending: false });

          if (taskError) throw taskError;

          const sectionIds = Array.from(new Set(
            (rawTasks || []).map((task) => task.section_id).filter(Boolean)
          ));
          const sectionNames = {};

          if (sectionIds.length > 0) {
            const { data: sectionData } = await supabase
              .from("sections")
              .select("id,name")
              .eq("user_id", currentUser.id)
              .in("id", sectionIds);

            (sectionData || []).forEach((section) => {
              sectionNames[String(section.id)] = section.name;
            });
          }

          const data = (rawTasks || [])
            .map((task) => ({
              ...task,
              sections: { name: sectionNames[String(task.section_id)] || "Tasks" }
            }))
            .sort((a, b) => String(b.date).localeCompare(String(a.date)));

          setArchive(data || []);
          historyCache.set(currentUser.id, data || []);
          setShowArchive(true);
          setError(null);
        } catch (e) {
          setError("Failed to load archive: " + e.message);
        }
      }

      if (loading) return <div className="loading">Loading System...</div>;
      if (!user) return <AuthScreen setError={setError} />;

      return (
        <>
          {error && <div className="panel error">{error}</div>}
          <TaskApp
            user={user}
            sections={sections}
            setSections={setSections}
            setError={setError}
            loadSections={loadSections}
            loadArchive={loadArchive}
            archive={archive}
            showArchive={showArchive}
            loadInfo={loadInfo}
          />
        </>
      );
    }

    function AuthScreen({ setError }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [localError, setLocalError] = useState(null);

      async function handleAuth(e) {
        e.preventDefault();
        setLoading(true);
        setLocalError(null);

        try {
          if (isLogin) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            alert("Check your email to confirm your account.");
          }
        } catch (e) {
          setLocalError(e.message);
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="auth">
          <h2 className="title" style={{ fontSize: "1.6rem", marginBottom: "8px" }}>
            {isLogin ? "Login" : "Sign Up"}
          </h2>

          {localError && <div className="panel error">{localError}</div>}

          <form onSubmit={handleAuth}>
            <div>
              <label>Email</label>
              <input
                className="in"
                type="email"
                required
                disabled={loading}
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
            </div>

            <div style={{ marginTop: "8px" }}>
              <label>Password</label>
              <input
                className="in"
                type="password"
                required
                disabled={loading}
                value={password}
                onChange={(e) => setPassword(e.target.value)}
              />
            </div>

            <div className="row">
              <button className="btn" type="submit" disabled={loading}>
                {loading ? "Please wait..." : (isLogin ? "Login" : "Sign Up")}
              </button>
              <button
                className="btn gray"
                type="button"
                disabled={loading}
                onClick={() => setIsLogin(!isLogin)}
              >
                {isLogin ? "Need an account?" : "Have an account?"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function AccomplishmentsPage({ onBack, user }) {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [pageError, setPageError] = useState(null);
      const [view, setView] = useState('log');

      const [formDate, setFormDate] = useState(getCurrentDate());
      const [formDelivery, setFormDelivery] = useState('');
      const [formManagement, setFormManagement] = useState('');
      const [formUnblocking, setFormUnblocking] = useState('');
      const [saving, setSaving] = useState(false);
      const [editId, setEditId] = useState(null);
      const [saved, setSaved] = useState(false);

      const [summaryWindow, setSummaryWindow] = useState('week');
      const [exportWindow, setExportWindow] = useState('30d');
      const [copied, setCopied] = useState(false);
      const [auditLog, setAuditLog] = useState([]);

      useEffect(() => { loadData(); }, []);

      const existingForDate = entries.find(e => e.entry_date === formDate);
      useEffect(() => {
        if (existingForDate) {
          setEditId(existingForDate.id);
          setFormDelivery(existingForDate.delivery === 'none' ? '' : existingForDate.delivery);
          setFormManagement(existingForDate.management === 'none' ? '' : existingForDate.management);
          setFormUnblocking(existingForDate.unblocking === 'none' ? '' : existingForDate.unblocking);
        } else {
          setEditId(null);
          setFormDelivery('');
          setFormManagement('');
          setFormUnblocking('');
        }
      }, [formDate, entries]);

      async function loadData() {
        setLoading(true);
        setPageError(null);
        try {
          const [{ data: aData, error: aErr }, { data: auData, error: auErr }] = await Promise.all([
            supabase.from('accomplishments').select('*').eq('user_id', user.id)
              .is('deleted_at', null).order('entry_date', { ascending: false }),
            supabase.from('accomplishment_audit').select('*').eq('user_id', user.id)
              .order('created_at', { ascending: false }).limit(200)
          ]);
          if (aErr) throw aErr;
          if (auErr) throw auErr;
          setEntries(aData || []);
          setAuditLog(auData || []);
        } catch (e) { setPageError(e.message); }
        setLoading(false);
      }

      async function saveEntry() {
        setSaving(true);
        setSaved(false);
        try {
          const payload = {
            delivery:   formDelivery.trim()   || 'none',
            management: formManagement.trim() || 'none',
            unblocking: formUnblocking.trim() || 'none'
          };
          let resolvedId = editId;
          if (editId) {
            const { error } = await supabase.from('accomplishments').update(payload).eq('id', editId);
            if (error) throw error;
          } else {
            const { data, error } = await supabase.from('accomplishments')
              .insert([{ ...payload, user_id: user.id, entry_date: formDate }]).select();
            if (error) throw error;
            resolvedId = data[0].id;
          }
          await supabase.from('accomplishment_audit').insert([{
            user_id: user.id,
            accomplishment_id: resolvedId,
            action: editId ? 'update' : 'insert',
            entry_date: formDate,
            snapshot: payload
          }]);
          setSaved(true);
          await loadData();
        } catch (e) { setPageError(e.message); }
        setSaving(false);
      }

      async function deleteEntry(id) {
        if (!confirm('Delete this entry?')) return;
        try {
          const entry = entries.find(e => e.id === id);
          const { error } = await supabase.from('accomplishments')
            .update({ deleted_at: new Date().toISOString() }).eq('id', id);
          if (error) throw error;
          if (entry) {
            await supabase.from('accomplishment_audit').insert([{
              user_id: user.id,
              accomplishment_id: id,
              action: 'delete',
              entry_date: entry.entry_date,
              snapshot: { delivery: entry.delivery, management: entry.management, unblocking: entry.unblocking }
            }]);
          }
          await loadData();
        } catch (e) { setPageError(e.message); }
      }

      function jumpToEdit(entry) {
        setFormDate(entry.entry_date);
        setSaved(false);
        setView('log');
      }

      function shiftDate(delta) {
        const d = new Date(formDate + 'T12:00:00');
        d.setDate(d.getDate() + delta);
        const next = d.toISOString().split('T')[0];
        if (delta > 0 && next > getCurrentDate()) return;
        setFormDate(next);
        setSaved(false);
      }

      function getMondayOf(ds) {
        const d = new Date(ds + 'T12:00:00');
        const day = d.getDay();
        d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
        return d.toISOString().split('T')[0];
      }

      function weekLabel(mondayStr) {
        const mon = new Date(mondayStr + 'T12:00:00');
        const fri = new Date(mondayStr + 'T12:00:00');
        fri.setDate(mon.getDate() + 4);
        const o = { month: 'short', day: 'numeric' };
        return `${mon.toLocaleDateString('en-US', o)} – ${fri.toLocaleDateString('en-US', { ...o, year: 'numeric' })}`;
      }

      function weekGaps(mondayStr, weekEntries) {
        const today = getCurrentDate();
        const entryDates = new Set(weekEntries.map(e => e.entry_date));
        const gaps = [];
        for (let i = 0; i < 5; i++) {
          const d = new Date(mondayStr + 'T12:00:00');
          d.setDate(d.getDate() + i);
          const ds = d.toISOString().split('T')[0];
          if (ds > today) break;
          if (!entryDates.has(ds)) {
            gaps.push(ds);
          } else {
            const e = weekEntries.find(x => x.entry_date === ds);
            if (e && e.delivery === 'none' && e.management === 'none' && e.unblocking === 'none')
              gaps.push(ds + ':allnone');
          }
        }
        return gaps;
      }

      function buildWeekGroups() {
        const map = {};
        for (const e of entries) {
          const w = getMondayOf(e.entry_date);
          if (!map[w]) map[w] = [];
          map[w].push(e);
        }
        return Object.entries(map)
          .sort(([a], [b]) => b.localeCompare(a))
          .map(([w, we]) => ({
            key: w, label: weekLabel(w),
            entries: we.sort((a, b) => a.entry_date.localeCompare(b.entry_date)),
            gaps: weekGaps(w, we)
          }));
      }

      function buildMonthGroups() {
        const map = {};
        for (const e of entries) {
          const m = e.entry_date.slice(0, 7);
          if (!map[m]) map[m] = [];
          map[m].push(e);
        }
        return Object.entries(map)
          .sort(([a], [b]) => b.localeCompare(a))
          .map(([m, me]) => ({
            key: m,
            label: new Date(m + '-15T12:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
            entries: me.sort((a, b) => a.entry_date.localeCompare(b.entry_date))
          }));
      }

      function buildExport() {
        const cutoff = exportWindow === '30d' ? getDateDaysAgo(30)
                     : exportWindow === '90d' ? getDateDaysAgo(90) : null;
        const filtered = cutoff ? entries.filter(e => e.entry_date >= cutoff) : entries;
        const nn = v => v && v !== 'none';
        const section = (label, field) => {
          const items = filtered.filter(e => nn(e[field]));
          if (!items.length) return '';
          return `**${label}**\n${items.map(e => `• ${e[field]} (${e.entry_date})`).join('\n')}`;
        };
        return [section('Delivery', 'delivery'), section('Management', 'management'), section('Unblocking', 'unblocking')]
          .filter(Boolean).join('\n\n');
      }

      function copyExport() {
        const text = buildExport();
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {});
      }

      const nn = v => v && v !== 'none';

      const fmtDate = (ds, opts) =>
        new Date(ds + 'T12:00:00').toLocaleDateString('en-US', opts);

      function SummaryEntryList({ groupEntries }) {
        return (
          <>
            {[['Delivery', 'delivery'], ['Management', 'management'], ['Unblocking', 'unblocking']].map(([label, field]) => {
              const items = groupEntries.filter(e => nn(e[field]));
              if (!items.length) return null;
              return (
                <div key={field} style={{ marginBottom: '8px' }}>
