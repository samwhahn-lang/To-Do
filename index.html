    function SectionComponent({ user, section, sections, setSections, deleteSection, moveSection, setError, pushUndo }) {
      const [tasks, setTasks] = useState(section.tasks || []);
      const [newTaskText, setNewTaskText] = useState("");
      const [taskType, setTaskType] = useState("daily");
      const [isSubtaskMode, setIsSubtaskMode] = useState(false);
      const [forcedParentTaskId, setForcedParentTaskId] = useState(null);
      const [draggedId, setDraggedId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      const [dropAbove, setDropAbove] = useState(true);
      const newTaskInputRef = useRef(null);
      const sectionsRef = useRef(sections);
      const today = getCurrentDate();

      useEffect(() => setTasks(section.tasks || []), [section.tasks]);
      useEffect(() => { sectionsRef.current = sections; }, [sections]);

      function sameId(a, b) {
        return String(a) === String(b);
      }

      function applyTasks(nextTasks) {
        setTasks(nextTasks);
        const nextSections = sectionsRef.current.map((s) => (
          String(s.id) === String(section.id) ? { ...s, tasks: nextTasks } : s
        ));
        setSections(nextSections);
        cache.set(user.id, nextSections);
      }

      function reindexTasks(taskList) {
        return taskList.map((task, index) => ({ ...task, order_index: index }));
      }

      async function persistTaskOrder(taskList) {
        const updates = [];
        for (const task of taskList) {
          updates.push(supabase.from("tasks").update({ order_index: task.order_index }).eq("id", task.id));
          if (task.template_id) {
            updates.push(supabase.from("task_templates").update({ order_index: task.order_index }).eq("id", task.template_id));
          }
        }
        await Promise.all(updates);
      }

      function isDescendantOf(candidateId, ancestorId) {
        let current = tasks.find((task) => sameId(task.id, candidateId));
        const seen = new Set();

        while (current?.parent_task_id) {
          const key = String(current.id);
          if (seen.has(key)) break;
          seen.add(key);

          if (sameId(current.parent_task_id, ancestorId)) return true;
          current = tasks.find((task) => sameId(task.id, current.parent_task_id));
        }

        return false;
      }

      function findTaskBranchIds(rootId) {
        const ids = new Set([String(rootId)]);
        let changed = true;

        while (changed) {
          changed = false;
          tasks.forEach((task) => {
            if (task.parent_task_id && ids.has(String(task.parent_task_id)) && !ids.has(String(task.id))) {
              ids.add(String(task.id));
              changed = true;
            }
          });
        }

        return ids;
      }

      function findInsertIndexForParent(parentId) {
        const parentIndex = tasks.findIndex((task) => sameId(task.id, parentId));
        if (parentIndex < 0) return tasks.length;

        let i = parentIndex + 1;
        while (i < tasks.length && isDescendantOf(tasks[i].id, parentId)) i += 1;

        return i;
      }

      function startSubtaskFor(parentId) {
        setForcedParentTaskId(parentId);
        setIsSubtaskMode(true);
        setTimeout(() => newTaskInputRef.current?.focus(), 0);
      }

      async function addTask(e) {
        e.preventDefault();

        const text = newTaskText.trim();
        if (!text) return;

        const previousTasks = tasks;

        const last = tasks[tasks.length - 1];
        const parentTaskId = forcedParentTaskId || (isSubtaskMode && last ? (last.parent_task_id || last.id) : null);
        const parentTask = parentTaskId ? tasks.find((task) => sameId(task.id, parentTaskId)) : null;
        const parentTemplateId = parentTask?.template_id || null;
        const insertIndex = parentTaskId ? findInsertIndexForParent(parentTaskId) : tasks.length;

        try {
          let createdTask = null;

          if (taskType === "daily") {
            const { data: templateData, error: templateError } = await supabase
              .from("task_templates")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                parent_task_id: parentTemplateId,
                order_index: insertIndex
              }])
              .select("id");

            if (templateError) throw templateError;

            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: templateData[0].id,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          } else {
            const { data, error } = await supabase
              .from("tasks")
              .insert([{
                section_id: section.id,
                user_id: user.id,
                text,
                completed: false,
                date: today,
                template_id: null,
                parent_task_id: parentTaskId,
                order_index: insertIndex
              }])
              .select();

            if (error) throw error;
            createdTask = data[0];
          }

          const next = [...tasks];
          next.splice(insertIndex, 0, createdTask);
          const normalized = reindexTasks(next);

          applyTasks(normalized);
          await persistTaskOrder(normalized);

          pushUndo(`Add "${text}"`, async () => {
            await supabase.from("tasks").delete().eq("id", createdTask.id).eq("user_id", user.id);
            if (createdTask.template_id) {
              await supabase.from("task_templates").delete().eq("id", createdTask.template_id).eq("user_id", user.id);
            }
            applyTasks(previousTasks);
          });

          setNewTaskText("");
          setIsSubtaskMode(false);
          setForcedParentTaskId(null);
        } catch (e) {
          setError("Failed to add task: " + e.message);
        }
      }

      async function toggleTask(taskId, completed) {
        const previousTasks = tasks;
        const nextTasks = tasks.map((task) => (
          sameId(task.id, taskId) ? { ...task, completed } : task
        ));

        const taskText = previousTasks.find(t => sameId(t.id, taskId))?.text ?? '';
        pushUndo(`${completed ? "Complete" : "Uncomplete"} "${taskText}"`, async () => {
          await supabase.from("tasks").update({ completed: !completed }).eq("id", taskId).eq("user_id", user.id);
          applyTasks(previousTasks);
        });

        applyTasks(nextTasks);

        try {
          const { data, error } = await supabase
            .from("tasks")
            .update({ completed })
            .eq("id", taskId)
            .eq("user_id", user.id)
            .select("id")
            .maybeSingle();

          if (error) throw error;
          if (!data) throw new Error("Supabase did not update this task.");

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to update task: " + e.message);
        }
      }

      async function deleteTask(taskId) {
        const branchIds = findTaskBranchIds(taskId);
        const tasksToDelete = tasks.filter((task) => branchIds.has(String(task.id)));
        if (tasksToDelete.length === 0) return;

        const templateIds = Array.from(new Set(
          tasksToDelete
            .map((task) => task.template_id)
            .filter(Boolean)
        ));

        let templatesToRestore = [];
        if (templateIds.length > 0) {
          const { data } = await supabase
            .from("task_templates")
            .select("*")
            .in("id", templateIds)
            .eq("user_id", user.id);
          templatesToRestore = data || [];
        }

        const previousTasks = tasks;
        applyTasks(tasks.filter((task) => !branchIds.has(String(task.id))));

        const rootText = tasksToDelete.find(t => sameId(t.id, taskId))?.text ?? "task";
        pushUndo(`Delete "${rootText}"`, async () => {
          if (templatesToRestore.length > 0) {
            await supabase.from("task_templates").insert(templatesToRestore);
          }
          await supabase.from("tasks").insert(tasksToDelete.map(t => ({ ...t, user_id: user.id })));
          applyTasks(previousTasks);
        });

        try {
          const { error } = await supabase
            .from("tasks")
            .delete()
            .in("id", Array.from(branchIds))
            .eq("user_id", user.id);

          if (error) throw error;

          if (templateIds.length > 0) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .in("id", templateIds)
              .eq("user_id", user.id);

            if (templateError) throw templateError;
          }

          setError(null);
        } catch (e) {
          applyTasks(previousTasks);
          setError("Failed to delete task: " + e.message);
        }
      }

      async function updateTaskType(taskId, nextType) {
        const task = tasks.find((t) => sameId(t.id, taskId));
        if (!task) return;

        const isDaily = Boolean(task.template_id);
        if ((nextType === "daily" && isDaily) || (nextType === "one-time" && !isDaily)) return;

        const previousTasks = tasks;

        if (nextType === "one-time") {
          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, template_id: null } : t));

          try {
            const { error: taskError } = await supabase
              .from("tasks")
              .update({ template_id: null })
              .eq("id", taskId)
              .eq("user_id", user.id);

            if (taskError) throw taskError;

            const { error: templateError } = await supabase
              .from("task_templates")
              .delete()
              .eq("id", task.template_id)
              .eq("user_id", user.id);

            if (templateError) throw templateError;

            setError(null);
          } catch (e) {
            applyTasks(previousTasks);
            setError("Failed to switch task type: " + e.message);
          }

          return;
        }

        let newTemplateId = null;

        try {
          const parentTask = task.parent_task_id
            ? tasks.find((t) => sameId(t.id, task.parent_task_id))
            : null;
          const parentTemplateId = parentTask?.template_id || null;

          const { data: templateData, error: templateError } = await supabase
            .from("task_templates")
            .insert([{
              section_id: task.section_id,
              user_id: user.id,
              text: task.text,
              parent_task_id: parentTemplateId,
              order_index: task.order_index || 0
            }])
            .select("id")
            .single();

          if (templateError) throw templateError;
          newTemplateId = templateData.id;

          applyTasks(tasks.map((t) => (
            sameId(t.id, taskId) ? { ...t, template_id: newTemplateId } : t
          )));

          const { error: taskError } = await supabase
            .from("tasks")
            .update({ template_id: newTemplateId })
            .eq("id", taskId)
            .eq("user_id", user.id);

          if (taskError) throw taskError;

          setError(null);
        } catch (e) {
          if (newTemplateId) {
            try {
              await supabase
                .from("task_templates")
                .delete()
                .eq("id", newTemplateId)
                .eq("user_id", user.id);
            } catch {}
          }

          applyTasks(previousTasks);
          setError("Failed to switch task type: " + e.message);
        }
      }

      async function updateTaskParent(taskId, parentId) {
        const task = tasks.find((t) => sameId(t.id, taskId));

        try {
          if (parentId && isDescendantOf(parentId, taskId)) {
            setError("Cannot set parent to a descendant task.");
            return;
          }

          const { error } = await supabase
            .from("tasks")
            .update({ parent_task_id: parentId })
            .eq("id", taskId);

          if (error) throw error;

          if (task?.template_id) {
            const parentTask = parentId ? tasks.find((t) => sameId(t.id, parentId)) : null;
            const templateParentId = parentTask?.template_id || null;

            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ parent_task_id: templateParentId })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, parent_task_id: parentId } : t));
        } catch (e) {
          setError("Failed to update subtask status: " + e.message);
        }
      }

      async function moveTask(taskId, direction) {
        const previousNormalized = reindexTasks([...tasks]);
        const blockStart = tasks.findIndex((task) => sameId(task.id, taskId));
        if (blockStart < 0) return;

        // Collect the entire branch (this task + all descendants)
        const branchIds = findTaskBranchIds(taskId);
        const branchTasks = tasks.filter((t) => branchIds.has(String(t.id)));
        const otherTasks = tasks.filter((t) => !branchIds.has(String(t.id)));

        // No branch elements appear before the root, so position in otherTasks equals blockStart
        const newPos = blockStart + direction;
        if (newPos < 0 || newPos > otherTasks.length) return;

        const next = [
          ...otherTasks.slice(0, newPos),
          ...branchTasks,
          ...otherTasks.slice(newPos)
        ];

        const normalized = reindexTasks(next);
        applyTasks(normalized);

        const movedText = tasks.find(t => sameId(t.id, taskId))?.text ?? "task";
        pushUndo(`Move "${movedText}"`, async () => {
          applyTasks(previousNormalized);
          await persistTaskOrder(previousNormalized);
        });

        try {
          await persistTaskOrder(normalized);
        } catch (e) {
          setError("Order sync failed: " + e.message);
        }
      }

      async function moveTaskToPosition(fromTaskId, toTaskId, above) {
        if (sameId(fromTaskId, toTaskId)) return;
        const previousNormalized = reindexTasks([...tasks]);
        const branchIds = findTaskBranchIds(fromTaskId);
        if (branchIds.has(String(toTaskId))) return;

        const branchTasks = tasks.filter(t => branchIds.has(String(t.id)));
        const otherTasks = tasks.filter(t => !branchIds.has(String(t.id)));

        const targetIdx = otherTasks.findIndex(t => sameId(t.id, toTaskId));
        if (targetIdx < 0) return;

        const insertAt = above ? targetIdx : targetIdx + 1;
        const next = [
          ...otherTasks.slice(0, insertAt),
          ...branchTasks,
          ...otherTasks.slice(insertAt)
        ];

        const normalized = reindexTasks(next);
        applyTasks(normalized);

        const movedText = tasks.find(t => sameId(t.id, fromTaskId))?.text ?? "task";
        pushUndo(`Move "${movedText}"`, async () => {
          applyTasks(previousNormalized);
          await persistTaskOrder(previousNormalized);
        });

        try {
          await persistTaskOrder(normalized);
        } catch (e) {
          setError("Order sync failed: " + e.message);
        }
      }

      async function updateTaskText(taskId, newText) {
        const text = newText.trim();
        if (!text) return;

        try {
          const { error } = await supabase.from("tasks").update({ text }).eq("id", taskId);
          if (error) throw error;

          const task = tasks.find((t) => sameId(t.id, taskId));
          if (task?.template_id) {
            const { error: templateError } = await supabase
              .from("task_templates")
              .update({ text })
              .eq("id", task.template_id);

            if (templateError) throw templateError;
          }

          applyTasks(tasks.map((t) => sameId(t.id, taskId) ? { ...t, text } : t));
        } catch (e) {
          setError("Update failed: " + e.message);
        }
      }

      function renderTaskComposer(isInline) {
        return (
          <form className={`row ${isInline ? "subtask-form" : ""}`} onSubmit={addTask}>
            <input
              className="in"
              ref={newTaskInputRef}
              type="text"
              value={newTaskText}
              placeholder={forcedParentTaskId ? "Add subtask under selected task..." : (isSubtaskMode ? "Add as subtask..." : "Add task...")}
              onChange={(e) => setNewTaskText(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Tab" && !forcedParentTaskId) {
                  e.preventDefault();
                  setIsSubtaskMode((v) => !v);
                }
              }}
            />
            <button type="button" className={`btn ${taskType === "daily" ? "" : "gray"}`} onClick={() => setTaskType("daily")}>Daily</button>
            <button type="button" className={`btn ${taskType === "one-time" ? "" : "gray"}`} onClick={() => setTaskType("one-time")}>One-Time</button>
            <button type="submit" className="btn">Add</button>
            {isInline && (
              <button
                type="button"
                className="btn gray"
                onClick={() => {
                  setForcedParentTaskId(null);
                  setIsSubtaskMode(false);
                  setNewTaskText("");
                }}
              >
                Cancel
              </button>
            )}
          </form>
        );
      }

      return (
        <>
          <div className="section-head">
            <div className="section-title">{section.name}</div>
            <div className="meta">
              <button className="icon" onClick={() => moveSection(section.id, -1)}>Up</button>
              <button className="icon" onClick={() => moveSection(section.id, 1)}>Dn</button>
              <button className="icon" onClick={() => deleteSection(section.id)}>Del</button>
            </div>
          </div>

          <ul className="tasks">
            {tasks.map((task) => (
              <React.Fragment key={task.id}>
                <TaskItem
                  task={task}
                  toggleTask={toggleTask}
                  deleteTask={deleteTask}
                  updateTaskText={updateTaskText}
                  updateTaskParent={updateTaskParent}
                  updateTaskType={updateTaskType}
                  startSubtaskFor={startSubtaskFor}
                  draggedId={draggedId}
                  dragOverId={dragOverId}
                  dropAbove={dropAbove}
                  onDragStart={(id) => setDraggedId(id)}
                  onDragOver={(id, above) => { setDragOverId(id); setDropAbove(above); }}
                  onDragEnd={() => { setDraggedId(null); setDragOverId(null); }}
                  onDrop={(targetId, above) => {
                    if (draggedId && !sameId(draggedId, targetId)) {
                      moveTaskToPosition(draggedId, targetId, above);
                    }
                    setDraggedId(null);
                    setDragOverId(null);
                  }}
                />
                {forcedParentTaskId && sameId(forcedParentTaskId, task.id) && renderTaskComposer(true)}
              </React.Fragment>
            ))}
          </ul>

          {!forcedParentTaskId && renderTaskComposer(false)}
        </>
      );
    }

    function TaskItem({ task, toggleTask, deleteTask, updateTaskText, updateTaskParent, updateTaskType, startSubtaskFor, draggedId, dragOverId, dropAbove, onDragStart, onDragOver, onDragEnd, onDrop }) {
      const [editing, setEditing] = useState(false);
      const [text, setText] = useState(task.text);

      useEffect(() => setText(task.text), [task.text]);

      function save() {
        const trimmed = text.trim();
        if (trimmed && trimmed !== task.text) updateTaskText(task.id, trimmed);
        setEditing(false);
      }

      const isDragging = String(draggedId) === String(task.id);
      const isDragOver = String(dragOverId) === String(task.id) && !isDragging;

      return (
        <li
          className={`task ${task.completed ? "done" : ""} ${task.parent_task_id ? "sub" : ""} ${isDragging ? "dragging" : ""} ${isDragOver && dropAbove ? "drag-over-top" : ""} ${isDragOver && !dropAbove ? "drag-over-bottom" : ""}`}
          draggable={true}
          onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; onDragStart(task.id); }}
          onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; const rect = e.currentTarget.getBoundingClientRect(); onDragOver(task.id, e.clientY < rect.top + rect.height / 2); }}
          onDragEnd={onDragEnd}
          onDrop={(e) => { e.preventDefault(); const rect = e.currentTarget.getBoundingClientRect(); onDrop(task.id, e.clientY < rect.top + rect.height / 2); }}
        >
          <input
            className="check"
            type="checkbox"
            checked={Boolean(task.completed)}
            onChange={(e) => toggleTask(task.id, e.target.checked)}
          />

          <div style={{ flex: 1, minWidth: 0 }}>
            {editing ? (
              <input
                className="in"
                value={text}
                onChange={(e) => setText(e.target.value)}
                onBlur={save}
                onKeyDown={(e) => {
                  if (e.key === "Enter") save();
                  if (e.key === "Escape") {
                    setText(task.text);
                    setEditing(false);
                  }
                }}
                autoFocus
              />
            ) : (
              <span className="task-text" title="Click to edit" onClick={() => setEditing(true)}>
                {task.text}
              </span>
            )}
          </div>

          <div className="meta">
            <div className="drag-handle" title="Drag to reorder">
              <span></span><span></span><span></span>
            </div>
            <button className="icon" title="Add subtask below this task" onClick={() => startSubtaskFor(task.id)}>+</button>
            {task.parent_task_id && (
              <button className="icon" title="Remove parent" onClick={() => updateTaskParent(task.id, null)}>-</button>
            )}
            <button
              className={`badge type-toggle ${task.template_id ? "b1" : "b2"}`}
              title={task.template_id ? "Switch to one-time" : "Switch to daily"}
              type="button"
              onClick={() => updateTaskType(task.id, task.template_id ? "one-time" : "daily")}
            >
              {task.template_id ? "Daily" : "One-Time"}
            </button>
            <button className="icon" title="Delete task" onClick={() => deleteTask(task.id)}>{"\u00D7"}</button>
          </div>
        </li>
      );
    }

    const root = window.ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
